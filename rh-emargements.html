<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<title>ALTEORE — Émargements & Signatures</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --rh-dark:#052e16;--rh-main:#059669;--rh-mid:#10b981;--rh-bright:#34d399;
  --rh-ghost:#f0fdf4;--rh-border:#d1fae5;
  --text:#1a1f36;--muted:#6b7280;--border:#e5e7eb;--bg:#f5f7f6;--sidebar-w:252px;--radius:14px;
  --red:#ef4444;--orange:#f59e0b;--blue:#3b82f6;--purple:#8b5cf6;
  --shadow-sm:0 2px 8px rgba(0,0,0,0.06);

      --glass-bg:rgba(255,255,255,0.6);--glass-bg-heavy:rgba(255,255,255,0.72);
      --glass-border:rgba(0,0,0,0.06);--glass-border-top:rgba(255,255,255,0.9);
      --glass-shine:linear-gradient(135deg,rgba(255,255,255,0.5) 0%,rgba(255,255,255,0.05) 50%,rgba(255,255,255,0) 100%);
      --glass-blur:blur(24px) saturate(180%);
      --glass-shadow:0 2px 8px rgba(0,0,0,0.04),0 8px 32px rgba(0,0,0,0.06);
      --glass-shadow-hover:0 4px 12px rgba(0,0,0,0.06),0 20px 60px rgba(0,0,0,0.1);
      --glass-inset:inset 0 1px 1px rgba(255,255,255,0.6),inset 0 -1px 1px rgba(0,0,0,0.04);
    }
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh;font-size:13px;-webkit-font-smoothing:antialiased;}
    body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:-1;background:radial-gradient(ellipse 60% 50% at 20% 15%,rgba(167,243,208,0.12),transparent),radial-gradient(ellipse 50% 40% at 80% 20%,rgba(196,181,253,0.06),transparent),radial-gradient(ellipse 40% 50% at 50% 80%,rgba(147,197,253,0.06),transparent);}

.main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-width:0;}

/* TOPBAR */
.topbar{background:rgba(255,255,255,0.85);backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,0,0,0.06);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;gap:10px;flex-wrap:wrap;}
.topbar-left h1{font-size:17px;font-weight:800;letter-spacing:-0.3px;}
.topbar-left p{font-size:11px;color:var(--muted);}
.topbar-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.btn{padding:7px 15px;border:none;border-radius:10px;font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
.btn:active{transform:scale(0.97);}
.btn-rh{background:linear-gradient(135deg,var(--rh-main),var(--rh-bright));color:white;box-shadow:0 2px 10px rgba(5,150,105,.3);}
.btn-rh:hover{box-shadow:0 4px 16px rgba(5,150,105,.4);transform:translateY(-1px);}
.btn-outline{background:white;color:var(--text);border:1.5px solid var(--border);box-shadow:0 1px 2px rgba(0,0,0,.04);}
.btn-outline:hover{border-color:var(--rh-main);color:var(--rh-main);}
.btn-sm{padding:6px 12px;font-size:11px;border-radius:9px;}
.btn-xs{padding:3px 9px;font-size:10px;border-radius:7px;}
.btn-danger{background:#fef2f2;color:var(--red);border:1.5px solid #fecaca;}

/* TABS */
.view-tabs{display:flex;gap:2px;background:rgba(0,0,0,0.03);border-radius:10px;padding:3px;margin:0 24px 0;}
.vtab{padding:7px 16px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;color:var(--muted);border:none;background:transparent;transition:all .15s;font-family:inherit;}
.vtab.active{background:white;color:var(--rh-main);box-shadow:0 1px 6px rgba(0,0,0,.1);}

/* CONTENT */
.content{padding:20px 24px;flex:1;}

/* KPI ROW */
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px;}
.kpi{background:var(--glass-bg);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border:1px solid var(--glass-border);border-top:1px solid var(--glass-border-top);box-shadow:var(--glass-shadow),var(--glass-inset);transition:transform 0.3s cubic-bezier(.4,0,.2,1),box-shadow 0.3s;border-radius:var(--radius);padding:16px 18px;position:relative;overflow:hidden;}
.kpi:hover{box-shadow:var(--glass-shadow-hover),var(--glass-inset);transform:translateY(-3px);}
.kpi:hover{box-shadow:var(--shadow-sm);transform:translateY(-1px);}
.kpi-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:4px;}
.kpi-val{font-size:22px;font-weight:800;}
.kpi-val.green{color:var(--rh-main);}
.kpi-val.red{color:var(--red);}
.kpi-val.orange{color:var(--orange);}
.kpi-val.blue{color:var(--blue);}
.kpi-sub{font-size:10px;color:var(--muted);margin-top:3px;}

/* CARD */
.card{background:var(--glass-bg-heavy);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border:1px solid var(--glass-border);border-top:1px solid var(--glass-border-top);box-shadow:var(--glass-shadow),var(--glass-inset);transition:transform 0.25s cubic-bezier(.4,0,.2,1),box-shadow 0.25s;border-radius:var(--radius);overflow:hidden;margin-bottom:16px;}
.card:hover{box-shadow:var(--glass-shadow-hover),var(--glass-inset);transform:translateY(-2px);}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid rgba(0,0,0,.05);flex-wrap:wrap;gap:8px;}
.card-title{font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px;}

/* TABLE */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{padding:10px 14px;text-align:left;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;background:rgba(0,0,0,.015);border-bottom:1px solid rgba(0,0,0,.06);letter-spacing:.3px;}
td{padding:10px 14px;border-bottom:1px solid rgba(0,0,0,.04);}
tr:hover td{background:rgba(16,185,129,.02);}

/* TAGS */
.tag{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:8px;font-size:10px;font-weight:700;}
.tag-pending{background:#fef3c7;color:#92400e;}
.tag-signed{background:#dcfce7;color:#166534;}
.tag-validated{background:#d1fae5;color:#065f46;}
.tag-contested{background:#fee2e2;color:#991b1b;}
.tag-expired{background:#f3f4f6;color:#6b7280;}

/* EMP CHIP */
.emp-chip{display:inline-flex;align-items:center;gap:6px;font-weight:600;}
.emp-av{width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:white;flex-shrink:0;}
.time-mono{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:12px;}

/* PERIOD SELECTOR */
.period-bar{background:white;border-bottom:1px solid rgba(0,0,0,.06);padding:12px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:sticky;top:56px;z-index:40;}
.period-select{padding:6px 12px;border:1.5px solid var(--border);border-radius:9px;font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:600;outline:none;background:white;cursor:pointer;}
.period-select:focus{border-color:var(--rh-main);}

/* FILTER PILLS */
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.fpill{padding:5px 13px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:white;color:var(--muted);transition:all .15s;font-family:inherit;}
.fpill.active{background:var(--rh-main);color:white;border-color:var(--rh-main);}

/* PROOF BLOCK */
.proof{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:8px 10px;font-family:'JetBrains Mono',monospace;font-size:10px;color:#64748b;word-break:break-all;line-height:1.6;}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center;}
.overlay.show{display:flex;}
.modal{background:white;border-radius:16px;width:100%;max-width:640px;max-height:90vh;overflow:auto;box-shadow:0 24px 60px rgba(0,0,0,.2);}
.modal-head{padding:18px 22px;border-bottom:1px solid rgba(0,0,0,.06);display:flex;align-items:center;justify-content:space-between;}
.modal-head h3{font-size:15px;font-weight:700;}
.modal-close{background:none;border:none;font-size:18px;cursor:pointer;color:var(--muted);}
.modal-body{padding:20px 22px;}
.modal-foot{padding:14px 22px;border-top:1px solid rgba(0,0,0,.06);display:flex;gap:8px;justify-content:flex-end;}

/* SPINNER */
.spin{width:20px;height:20px;border:2.5px solid rgba(5,150,105,.15);border-top-color:var(--rh-main);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loader{display:flex;align-items:center;justify-content:center;gap:12px;padding:60px;color:var(--muted);}
@keyframes fadeInUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.empty{padding:40px;text-align:center;color:var(--muted);font-size:12px;}
.empty-icon{font-size:36px;margin-bottom:8px;}

/* MOBILE */
.hamburger{display:none;position:fixed;top:14px;left:14px;z-index:1001;width:44px;height:44px;background:var(--rh-main);border:none;border-radius:12px;cursor:pointer;flex-direction:column;align-items:center;justify-content:center;gap:5px;box-shadow:0 4px 16px rgba(5,150,105,.4);}
.hamburger span{display:block;width:20px;height:2.5px;background:#fff;border-radius:2px;transition:all .25s ease;}
.hamburger.open span:nth-child(1){transform:translateY(7.5px) rotate(45deg);}
.hamburger.open span:nth-child(2){opacity:0;}
.hamburger.open span:nth-child(3){transform:translateY(-7.5px) rotate(-45deg);}
.nav-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;}
.nav-overlay.show{display:block;}
@media(max-width:768px){
  .hamburger{display:flex!important;}
  .main{margin-left:0!important;width:100vw!important;}
  .topbar{padding:12px 12px 12px 62px!important;}
  .kpi-row{grid-template-columns:1fr 1fr!important;gap:8px!important;}
  .content{padding:14px 12px;}
  .period-bar{padding:10px 12px!important;top:auto!important;position:relative!important;}
  table{min-width:600px!important;}
  input[type=date],select{font-size:16px!important;}
  .view-tabs{margin:0 12px;}
  .overlay{align-items:flex-end!important;padding:0!important;}
  .modal{max-width:100%!important;border-radius:18px 18px 0 0!important;max-height:92vh!important;}
}
@media(max-width:420px){
  .kpi-row{grid-template-columns:1fr!important;}
}
</style>
</head>

<script type="module">

const auth=getAuth(app);const db=getFirestore(app);
window._db=db;window._doc=doc;window._setDoc=setDoc;window._getDoc=getDoc;
window._getDocs=getDocs;window._deleteDoc=deleteDoc;

<script>
// ══════════════════════════════════════════
//   ÉMARGEMENTS & SIGNATURES — ALTEORE
// ══════════════════════════════════════════
const COLORS=['#059669','#2563eb','#7c3aed','#d97706','#dc2626','#0d9488','#ea580c','#4f46e5'];
const JOURS_FR=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
const MOIS_FR=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const STATUS_LABELS={pending:'En attente',signed:'Signé',validated:'Validé',contested:'Contesté',expired:'Expiré',acknowledged:'Accusé'};
const STATUS_CLS={pending:'tag-pending',signed:'tag-signed',validated:'tag-validated',contested:'tag-contested',expired:'tag-expired',acknowledged:'tag-signed'};

let _emps=[], _fiches=[], _planningAcks=[], _auditLog=[], _signatures=[], _daily=[];
let _view='daily', _periodType='mois', _cur=new Date(), _filter='all';

// ── UTILS ──
function empName(e){return `${e.prenom||''} ${e.nom||''}`.trim()||'?';}
function empInit(e){return ((e.prenom||'?')[0]+(e.nom||'')[0]).toUpperCase();}
function fmt(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function fmtFR(ds){if(!ds)return '—';try{return new Date(ds+'T12:00:00').toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'});}catch(e){return ds;}}
function toMin(t){if(!t)return 0;const[h,m]=(t||'0:0').split(':').map(Number);return h*60+(m||0);}
function fmtDur(mins){const h=Math.floor(Math.abs(mins)/60),m=Math.abs(mins)%60;return `${h}h${String(m).padStart(2,'0')}`;}
function fmtTS(ts){if(!ts)return '—';const d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'})+' '+d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});}

// ── SHA-256 ──
async function sha256(str){
  const buf=new TextEncoder().encode(str);
  const hash=await crypto.subtle.digest('SHA-256',buf);
  return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// ── PERIOD LOGIC ──
function getPeriodRange(){
  const y=_cur.getFullYear(), m=_cur.getMonth();
  if(_periodType==='mois'){
    return {start:new Date(y,m,1), end:new Date(y,m+1,0), label:MOIS_FR[m]+' '+y};
  } else {
    const d=new Date(_cur);d.setHours(12);
    const day=d.getDay(), diff=day===0?-6:1-day;
    d.setDate(d.getDate()+diff);
    const mon=new Date(d);
    const sun=new Date(d);sun.setDate(d.getDate()+6);
    const wn=getISOWeek(mon);
    return {start:mon, end:sun, label:'Semaine '+wn+' ('+fmtFR(fmt(mon))+' → '+fmtFR(fmt(sun))+')'};
  }
}

function getISOWeek(d){
  const dt=new Date(d);dt.setHours(0,0,0,0);
  dt.setDate(dt.getDate()+3-(dt.getDay()+6)%7);
  const wk1=new Date(dt.getFullYear(),0,4);
  return 1+Math.round(((dt-wk1)/86400000-3+(wk1.getDay()+6)%7)/7);
}

function navPeriod(dir){
  if(_periodType==='mois') _cur.setMonth(_cur.getMonth()+dir);
  else _cur.setDate(_cur.getDate()+dir*7);
  loadData();
}
function goCurrentPeriod(){_cur=new Date();loadData();}
function onTypeChange(){_periodType=document.getElementById('selType').value;loadData();}

// ── INIT ──
async function initEmargements(){
  if(!window._uid||!window._col){setTimeout(initEmargements,400);return;}
  await loadEmps();
  await loadData();
}
window.initEmargements=initEmargements;

async function loadEmps(){
  _emps=[];
  try{
    const snap=await window._getDocs(window._col(window._db,'rh',window._uid,'employes'));
    snap.forEach(d=>{const e=d.data();e.id=d.id;if(e.statut!=='inactif')_emps.push(e);});
  }catch(e){console.error(e);}
  _emps.sort((a,b)=>empName(a).localeCompare(empName(b)));
}

async function loadData(){
  const {label}=getPeriodRange();
  document.getElementById('periodLabel').textContent=label;
  // Signatures MUST load before daily (Source 3 depends on _signatures)
  await Promise.all([loadFiches(), loadPlanningAcks(), loadSignatures(), loadAudit()]);
  await loadDaily();
  await syncMissingAudit();
  render();
}

// ── AUTO-SYNC AUDIT (pour les actions mobile/salarié sans auth) ──
async function syncMissingAudit(){
  const auditTargetIds=new Set(_auditLog.map(a=>a.targetId));
  let synced=0;

  // 1. Daily signés sans entrée audit
  for(const d of _daily){
    if(d.status!=='signed') continue;
    const tid=d._id||d.date+'_'+d.employeId;
    if(auditTargetIds.has(tid)) continue;
    try{
      const auditId='aud_sync_'+Date.now()+'_'+Math.random().toString(36).slice(2,8);
      const hash=await sha256('daily_signed'+tid+(d.signedAt||'')+d.employeId);
      const entry={
        action:'daily_signed',targetType:'daily',targetId:tid,
        actorType:'employe',actorId:d.employeId,actorNom:d.employeNom||'—',
        timestamp:d.createdAt||Date.now(),ip:d.ip||'—',hash,
        detail:'Émargement quotidien '+(d.source||'mobile')+' — '+fmtFR(d.date)
      };
      await window._setDoc(window._doc(window._db,'rh_emargements',window._uid,'audit',auditId),entry);
      _auditLog.push({...entry,_id:auditId});
      auditTargetIds.add(tid);
      synced++;
    }catch(e){console.warn('[audit sync daily]',e);}
  }

  // 2. Planning acks accusés sans entrée audit
  for(const a of _planningAcks){
    if(a.status!=='acknowledged') continue;
    if(auditTargetIds.has(a._id)) continue;
    try{
      const auditId='aud_sync_'+Date.now()+'_'+Math.random().toString(36).slice(2,8);
      const hash=await sha256('planning_acknowledged'+a._id+(a.signatureEmploye?.signedAt||'')+a.employeId);
      const entry={
        action:'planning_acknowledged',targetType:'planning_ack',targetId:a._id,
        actorType:'employe',actorId:a.employeId,actorNom:a.employeNom||'—',
        timestamp:a.updatedAt||Date.now(),ip:a.signatureEmploye?.ip||'—',hash,
        detail:'Accusé réception planning — '+(a.periodeLabel||a.planningDebut||'')
      };
      await window._setDoc(window._doc(window._db,'rh_emargements',window._uid,'audit',auditId),entry);
      _auditLog.push({...entry,_id:auditId});
      auditTargetIds.add(a._id);
      synced++;
    }catch(e){console.warn('[audit sync ack]',e);}
  }

  // 3. Fiches signées/contestées par salarié sans entrée audit
  for(const f of _fiches){
    if(f.status!=='signed'&&f.status!=='contested') continue;
    // Check si l'audit a déjà fiche_signed ou fiche_contested pour cette fiche
    const hasAudit=_auditLog.find(a=>(a.action==='fiche_signed'||a.action==='fiche_contested')&&a.targetId===f._id);
    if(hasAudit) continue;
    // Auto-signed (daily_aggregate) → pas besoin d'audit individuel, les dailys suffisent
    if(f.signatureEmploye?.status==='daily_aggregate') continue;
    try{
      const action=f.status==='contested'?'fiche_contested':'fiche_signed';
      const auditId='aud_sync_'+Date.now()+'_'+Math.random().toString(36).slice(2,8);
      const hash=await sha256(action+f._id+(f.signatureEmploye?.signedAt||'')+f.employeId);
      const entry={
        action,targetType:'fiche',targetId:f._id,
        actorType:'employe',actorId:f.employeId,actorNom:f.employeNom||'—',
        timestamp:f.updatedAt||Date.now(),ip:f.signatureEmploye?.ip||'—',hash,
        detail:action==='fiche_contested'?'Fiche contestée par le salarié':'Fiche signée par le salarié — '+f.periodeLabel
      };
      await window._setDoc(window._doc(window._db,'rh_emargements',window._uid,'audit',auditId),entry);
      _auditLog.push({...entry,_id:auditId});
      synced++;
    }catch(e){console.warn('[audit sync fiche]',e);}
  }

  if(synced>0){
    console.log(`[AUDIT] ${synced} entrée(s) synchronisée(s)`);
    _auditLog.sort((a,b)=>(b.timestamp||0)-(a.timestamp||0));
  }
}

async function loadDaily(){
  _daily=[];
  const collected=[]; // temp array before dedup

  const {start,end}=getPeriodRange();
  const startStr=fmt(start), endStr=fmt(end);
  const days=[];
  const dd2=new Date(start);dd2.setHours(12);
  while(dd2<=end){days.push(fmt(dd2));dd2.setDate(dd2.getDate()+1);}

  // ── Source 1 : rh_emargements/{uid}/daily/ (tablette kiosk) ──
  try{
    const snap=await window._getDocs(window._col(window._db,'rh_emargements',window._uid,'daily'));
    snap.forEach(d=>{
      const dd=d.data();dd._id=d.id;dd._src='emarg';dd._ts=dd.createdAt||0;
      if(dd.date>=startStr && dd.date<=endStr) collected.push(dd);
    });
  }catch(e){console.warn('loadDaily emarg',e);}

  // ── Source 2 : rh_pointages_public events → emarg_* fields (mobile) ──
  const pointagesCache={};
  try{
    for(const ds of days){
      try{
        const ref=window._doc(window._db,'rh_pointages_public',window._uid,'events',ds);
        const snap=await window._getDoc(ref);
        if(!snap.exists()) continue;
        const data=snap.data();
        pointagesCache[ds]=data.events||[];
        Object.keys(data).forEach(k=>{
          if(!k.startsWith('emarg_')) return;
          const ed=data[k];
          if(!ed||!ed.date) return;
          ed._id=ds+'_'+ed.employeId;
          ed._src='pointage_emarg';
          ed._ts=ed.createdAt||0;
          collected.push(ed);
        });
      }catch(e){}
    }
  }catch(e){console.warn('loadDaily pointage',e);}

  // ── Source 3 : _signatures type='daily' → reconstruct from pointages ──
  // Sort signatures most recent first
  const dailySigs=[..._signatures].filter(s=>s.type==='daily').sort((a,b)=>{
    const ta=new Date(a.signedAt||0).getTime(), tb=new Date(b.signedAt||0).getTime();
    return tb-ta;
  });

  for(const sig of dailySigs){
    const fid=sig.ficheId||'';
    // ficheId format: "YYYY-MM-DD_empId" where empId can contain underscores
    const dateMatch=fid.match(/^(\d{4}-\d{2}-\d{2})_(.+)$/);
    if(!dateMatch) continue;
    const sigDate=dateMatch[1], sigEmpId=dateMatch[2];
    if(sigDate<startStr||sigDate>endStr) continue;

    // Build from pointages
    const ptEvents=(pointagesCache[sigDate]||[]).filter(e=>e.empId===sigEmpId);
    const arrives=ptEvents.filter(e=>e.type==='arrivee').sort((a,b)=>(a.timestamp||0)-(b.timestamp||0));
    const departs=ptEvents.filter(e=>e.type==='depart').sort((a,b)=>(a.timestamp||0)-(b.timestamp||0));
    const arrTime=arrives.length?arrives[0].heure:'—';
    const depTime=departs.length?departs[departs.length-1].heure:'—';
    let pauseMin=0,lastPD=null;
    ptEvents.forEach(e=>{
      if(e.type==='pause_deb') lastPD=toMin(e.heure);
      else if(e.type==='pause_fin'&&lastPD!==null){pauseMin+=toMin(e.heure)-lastPD;lastPD=null;}
    });
    const totalMin=arrTime!=='—'&&depTime!=='—'?Math.max(0,toMin(depTime)-toMin(arrTime)-pauseMin):0;

    collected.push({
      _id:fid,
      _src:'signature',
      _ts:new Date(sig.signedAt||0).getTime(),
      employeId:sigEmpId,
      employeNom:sig.employeNom||'—',
      date:sigDate,
      arrivee:arrTime,
      depart:depTime,
      pauseMin,
      totalMinutes:totalMin,
      totalHeures:Math.round(totalMin/60*10)/10,
      signedAt:sig.signedAt,
      ip:sig.ip||'—',
      proofHash:sig.proofHash||'',
      contentHash:'',
      status:'signed',
      source:sig.hasSignatureImage?'tablette':'mobile',
      signatureImage:null
    });
  }

  // Debug: log collected entries by source
  const bySrc={};
  collected.forEach(d=>{bySrc[d._src]=(bySrc[d._src]||0)+1;});
  console.log('[DAILY] Collectés par source:',JSON.stringify(bySrc),
    '| Détail:',collected.map(d=>d.employeNom+' '+d.date+' src='+d._src+' ts='+d._ts).join(' | '));

  // ── DEDUP : par employeId+date, priorité source réelle > reconstruite, puis le plus récent ──
  const SRC_PRIORITY={'emarg':3,'pointage_emarg':2,'signature':1};
  const best={};
  collected.forEach(d=>{
    const key=(d.employeId||'')+'|'+(d.date||'');
    const existing=best[key];
    if(!existing){
      best[key]=d;
      return;
    }
    const existPri=SRC_PRIORITY[existing._src]||0;
    const newPri=SRC_PRIORITY[d._src]||0;
    // Higher source priority wins. If same priority, newer timestamp wins.
    if(newPri>existPri || (newPri===existPri && (d._ts||0)>(existing._ts||0))){
      best[key]=d;
    }
  });
  _daily=Object.values(best);
  _daily.sort((a,b)=>(b.date||'').localeCompare(a.date||'')||(a.employeNom||'').localeCompare(b.employeNom||''));
  console.log(`[DAILY] ${_daily.length} entrée(s) chargées (${collected.length} collectées avant dedup)`);
}

  document.getElementById('vt-'+v)?.classList.add('active');
  render();
}

  const c=document.getElementById('content');

}

function renderFiches(c){
  const {start,end}=getPeriodRange();
  // Filter fiches by period
  const fichesInPeriod=_fiches.filter(f=>{
    if(!f.periode) return false;
    if(_periodType==='mois'){
      const ym=start.getFullYear()+'-'+String(start.getMonth()+1).padStart(2,'0');
      return f.periode===ym || (f.type==='heures_semaine' && f.periodeDebut && f.periodeDebut>=fmt(start) && f.periodeDebut<=fmt(end));
    } else {
      return f.periodeDebut && f.periodeDebut>=fmt(start) && f.periodeDebut<=fmt(end);
    }
  });

  // Filter by status
  const filtered=_filter==='all'?fichesInPeriod:fichesInPeriod.filter(f=>f.status===_filter);

  // KPI
  const total=fichesInPeriod.length;
  const pending=fichesInPeriod.filter(f=>f.status==='pending').length;
  const signed=fichesInPeriod.filter(f=>f.status==='signed'||f.status==='validated').length;
  const contested=fichesInPeriod.filter(f=>f.status==='contested').length;
  const pctSigned=total>0?Math.round(signed/total*100):0;

  let h=`
  <div class="kpi-row">
    <div class="kpi"><div class="kpi-label">Total fiches</div><div class="kpi-val blue">${total}</div><div class="kpi-sub">sur la période</div></div>
    <div class="kpi"><div class="kpi-label">En attente</div><div class="kpi-val orange">${pending}</div><div class="kpi-sub">non signées</div></div>
    <div class="kpi"><div class="kpi-label">Signées / Validées</div><div class="kpi-val green">${signed}</div><div class="kpi-sub">${pctSigned}% complétés</div></div>
    <div class="kpi"><div class="kpi-label">Contestées</div><div class="kpi-val red">${contested}</div><div class="kpi-sub">à traiter</div></div>
    <div class="kpi"><div class="kpi-label">Conformité</div><div class="kpi-val ${pctSigned>=90?'green':pctSigned>=50?'orange':'red'}">${pctSigned}%</div><div class="kpi-sub">taux d'émargement</div></div>
  </div>`;

  // Filter pills
  h+=`<div class="filter-row">
    <button class="fpill ${_filter==='all'?'active':''}" onclick="setFilter('all')">Tous (${fichesInPeriod.length})</button>
    <button class="fpill ${_filter==='pending'?'active':''}" onclick="setFilter('pending')">⏳ En attente (${pending})</button>
    <button class="fpill ${_filter==='signed'?'active':''}" onclick="setFilter('signed')">✅ Signées (${fichesInPeriod.filter(f=>f.status==='signed').length})</button>
    <button class="fpill ${_filter==='validated'?'active':''}" onclick="setFilter('validated')">✓ Validées (${fichesInPeriod.filter(f=>f.status==='validated').length})</button>
    <button class="fpill ${_filter==='contested'?'active':''}" onclick="setFilter('contested')">⚠️ Contestées (${contested})</button>
  </div>`;

  if(filtered.length===0){
    h+=`<div class="card"><div class="empty"><div class="empty-icon">📋</div>
      ${total===0?'Aucune fiche pour cette période.<br><br><button class="btn btn-rh" onclick="generateFiches()">⚡ Générer les fiches depuis les pointages</button>':'Aucune fiche avec ce filtre.'}
    </div></div>`;
  } else {
    h+=`<div class="card">
      <div class="card-head">
        <div class="card-title">📋 Fiches d'heures — ${filtered.length} résultat(s)</div>
        <button class="btn btn-outline btn-xs" onclick="exportAllPDF()">📄 Export PDF</button>
      </div>
      <div class="table-wrap"><table>
        <thead><tr><th>Salarié</th><th>Période</th><th>Heures</th><th>Statut</th><th>Signé le</th><th>Hash preuve</th><th>Actions</th></tr></thead>
        <tbody>`;

    filtered.forEach(f=>{
      const emp=_emps.find(e=>e.id===f.employeId);
      // Signature lookup: _signatures first, then daily data
      const sig=_signatures.find(s=>s.ficheId===f._id && (s.type==='heures'||s.type==='daily'));
      const empDailys=_daily.filter(d=>d.employeId===f.employeId && d.date>=f.periodeDebut && d.date<=f.periodeFin && d.status==='signed');
      const bestSig=sig||empDailys[0]||null;
      const signedDate=bestSig?(bestSig.signedAt||bestSig.signedAt):null;
      const sigHash=bestSig?(bestSig.proofHash||bestSig.contentHash||''):null;
      const color=COLORS[_emps.indexOf(emp)%COLORS.length]||'#059669';
      h+=`<tr>
        <td><div class="emp-chip"><div class="emp-av" style="background:${color}">${emp?empInit(emp):'?'}</div>${f.employeNom||'?'}</div></td>
        <td><span class="time-mono">${f.periodeLabel||f.periode||'—'}</span></td>

        <td style="font-size:11px">${signedDate?fmtTS(signedDate):'—'}</td>

          ${f.status==='pending'?`<button class="btn btn-outline btn-xs" style="border-color:var(--blue);color:var(--blue)" onclick="refreshFiche('${f._id}')">🔄</button>`:''}
          ${f.status==='signed'?`<button class="btn btn-rh btn-xs" onclick="validateFiche('${f._id}')">✓ Valider</button>`:''}
          <button class="btn btn-outline btn-xs" onclick="exportFichePDF('${f._id}')">📄</button>
        </td>
      </tr>`;
    });

    h+=`</tbody></table></div></div>`;
  }

  c.innerHTML=h;
}

// ══════════════════════════════════════════
//   GÉNÉRATION DE FICHES DEPUIS DAILY + POINTAGES
// ══════════════════════════════════════════
async function generateFiches(){
  if(!window._uid) return;
  const {start,end}=getPeriodRange();
  const btn=document.querySelector('[onclick="generateFiches()"]');
  if(btn){btn.disabled=true;btn.textContent='⏳ Génération...';}

  try{
    // 1. Load daily émargements for the period (source primaire — déjà signés)
    const dailyByEmp={}; // {empId: {date: dailyDoc}}
    _daily.filter(d=>{
      if(!d.date) return false;
      return d.date>=fmt(start) && d.date<=fmt(end);
    }).forEach(d=>{
      if(!dailyByEmp[d.employeId]) dailyByEmp[d.employeId]={};
      dailyByEmp[d.employeId][d.date]=d;
    });

    // 2. Load pointages bruts pour compléter les jours sans émargement quotidien
    const days=[];
    const dd=new Date(start);dd.setHours(12);
    while(dd<=end){days.push(fmt(dd));dd.setDate(dd.getDate()+1);}

    const pointagesMap={};
    for(const ds of days){
      try{
        const ref=window._doc(window._db,'rh_pointages_public',window._uid,'events',ds);
        const snap=await window._getDoc(ref);
        if(snap.exists()){pointagesMap[ds]=snap.data().events||[];}
      }catch(e){}
    }

    // Group pointages by employee (fallback)
    const ptByEmp={};
    for(const [ds,events] of Object.entries(pointagesMap)){
      events.forEach(evt=>{
        if(!evt.empId) return;
        if(!ptByEmp[evt.empId]) ptByEmp[evt.empId]={};
        if(!ptByEmp[evt.empId][ds]) ptByEmp[evt.empId][ds]={};
        if(evt.type==='arrivee' && !ptByEmp[evt.empId][ds].arrivee) ptByEmp[evt.empId][ds].arrivee=evt.heure;
        if(evt.type==='depart') ptByEmp[evt.empId][ds].depart=evt.heure;
        if(evt.type==='pause_deb') ptByEmp[evt.empId][ds].pause_deb=evt.heure;
        if(evt.type==='pause_fin') ptByEmp[evt.empId][ds].pause_fin=evt.heure;
      });
    }

    // 3. Pre-load publicIds
    const publicIdMap={};
    try{
      const pubSnap=await window._getDocs(window._col(window._db,'rh_employes_public'));
      pubSnap.forEach(d=>{const p=d.data();if(p.uid===window._uid) publicIdMap[p.empId]=d.id;});
    }catch(e){}

    let created=0, updated=0;
    const periode=_periodType==='mois'?fmt(start).slice(0,7):'W'+getISOWeek(start);
    const periodeLabel=_periodType==='mois'?MOIS_FR[start.getMonth()]+' '+start.getFullYear():'Semaine '+getISOWeek(start);

    // 4. Merge all employee IDs (from daily + pointages)
    const allEmpIds=new Set([...Object.keys(dailyByEmp),...Object.keys(ptByEmp)]);

    for(const empId of allEmpIds){
      const emp=_emps.find(e=>e.id===empId);
      if(!emp) continue;

      // Check existing fiche
      const existing=_fiches.find(f=>f.employeId===empId && f.periode===periode);
      // Only lock fiches manually signed/validated/contested by a human
      // Auto-signed (daily_aggregate) can be refreshed with fresh data
      if(existing && existing.status!=='pending'){
        const isAutoSigned=existing.signatureEmploye&&existing.signatureEmploye.status==='daily_aggregate';
        if(!isAutoSigned) continue;
      }

      // Build lignes : daily first, pointage fallback
      const empDaily=dailyByEmp[empId]||{};
      const empPt=ptByEmp[empId]||{};
      const allDates=new Set([...Object.keys(empDaily),...Object.keys(empPt)]);
      if(allDates.size===0) continue;

      const lignes=[];
      let totalMin=0;
      let allSigned=true;

      Array.from(allDates).sort().forEach(ds=>{
        const daily=empDaily[ds];
        if(daily){
          // Source : émargement quotidien signé
          lignes.push({
            date:ds,
            debut:daily.arrivee||'',
            fin:daily.depart||'',
            pause:daily.pauseMin||0,
            totalMin:daily.totalMinutes||0,
            signed:daily.status==='signed',
            source:'daily'
          });
          totalMin+=daily.totalMinutes||0;
          if(daily.status!=='signed') allSigned=false;
        } else {
          // Fallback : pointages bruts (non signé)
          const pt=empPt[ds];
          if(!pt) return;
          const debut=pt.arrivee||'';
          const fin=pt.depart||'';
          const pauseDebMin=toMin(pt.pause_deb);
          const pauseFinMin=toMin(pt.pause_fin);
          const pauseMin=(pt.pause_deb&&pt.pause_fin)?Math.max(0,pauseFinMin-pauseDebMin):0;
          const workMin=debut&&fin?Math.max(0,toMin(fin)-toMin(debut)-pauseMin):0;
          lignes.push({date:ds, debut, fin, pause:pauseMin, totalMin:workMin, signed:false, source:'pointage'});
          totalMin+=workMin;
          allSigned=false;
        }
      });

      const hashInput=JSON.stringify(lignes)+empId+periode;
      const contentHash=await sha256(hashInput);

      let ficheId;
      if(existing){ficheId=existing._id;updated++;}
      else{ficheId='fiche_'+empId+'_'+periode+'_'+Date.now();created++;}

      // Si tous les jours sont signés via daily → fiche auto-signée
      const daysSignedCount=lignes.filter(l=>l.signed).length;
      const autoSigned=allSigned && daysSignedCount>0;

      const fiche={
        employeId:empId,
        publicId:publicIdMap[empId]||'',
        employeNom:empName(emp),
        type:_periodType==='mois'?'heures_mois':'heures_semaine',
        periode, periodeLabel,
        periodeDebut:fmt(start), periodeFin:fmt(end),
        lignes,
        totalMinutes:totalMin,
        totalHeures:Math.round(totalMin/60*10)/10,
        daysTotal:lignes.length,
        daysSigned:daysSignedCount,
        contentHash,
        signatureEmploye:autoSigned?{status:'daily_aggregate',daysSigned:daysSignedCount}:null,
        signatureAdmin:null,
        status:autoSigned?'signed':'pending',
        locked:autoSigned,
        createdAt:existing?existing.createdAt:Date.now(),
        updatedAt:Date.now()
      };

      await window._setDoc(window._doc(window._db,'rh_emargements',window._uid,'fiches',ficheId),fiche);
      await addAuditEntry(existing?'fiche_updated':'fiche_created','fiche',ficheId,empName(emp));
    }

    const msg=[];
    if(created>0) msg.push(created+' créée(s)');
    if(updated>0) msg.push(updated+' actualisée(s)');
    showToast(msg.length>0?'✅ Fiches : '+msg.join(', '):'Aucune nouvelle fiche (pas de pointages/émargements sur la période)');
    await loadFiches();await loadAudit();render();
  }catch(e){
    console.error('generateFiches',e);
    showToast('❌ Erreur : '+e.message);
  }
  if(btn){btn.disabled=false;btn.textContent='⚡ Générer les fiches';}
}
window.generateFiches=generateFiches;

// ── REFRESH SINGLE FICHE (pending only) ──
async function refreshFiche(ficheId){
  const f=_fiches.find(x=>x._id===ficheId);
  if(!f||f.status!=='pending'){showToast('Seules les fiches en attente peuvent être actualisées');return;}

  try{
    const start=new Date(f.periodeDebut+'T12:00:00');
    const end=new Date(f.periodeFin+'T12:00:00');
    const days=[];
    const d=new Date(start);d.setHours(12);
    while(d<=end){days.push(fmt(d));d.setDate(d.getDate()+1);}

    // Daily first
    const empDaily={};
    _daily.filter(dd=>dd.employeId===f.employeId && dd.date>=fmt(start) && dd.date<=fmt(end))
      .forEach(dd=>{empDaily[dd.date]=dd;});

    // Pointage fallback
    const empPt={};
    for(const ds of days){
      if(empDaily[ds]) continue; // daily exists, skip pointage
      try{
        const ref=window._doc(window._db,'rh_pointages_public',window._uid,'events',ds);
        const snap=await window._getDoc(ref);
        if(snap.exists()){
          (snap.data().events||[]).forEach(evt=>{
            if(evt.empId!==f.employeId) return;
            if(!empPt[ds]) empPt[ds]={};
            if(evt.type==='arrivee' && !empPt[ds].arrivee) empPt[ds].arrivee=evt.heure;
            if(evt.type==='depart') empPt[ds].depart=evt.heure;
            if(evt.type==='pause_deb') empPt[ds].pause_deb=evt.heure;
            if(evt.type==='pause_fin') empPt[ds].pause_fin=evt.heure;
          });
        }
      }catch(e){}
    }

    const lignes=[];
    let totalMin=0;
    let allSigned=true;
    const allDates=new Set([...Object.keys(empDaily),...Object.keys(empPt)]);

    Array.from(allDates).sort().forEach(ds=>{
      const daily=empDaily[ds];
      if(daily){
        lignes.push({date:ds,debut:daily.arrivee||'',fin:daily.depart||'',pause:daily.pauseMin||0,totalMin:daily.totalMinutes||0,signed:daily.status==='signed',source:'daily'});
        totalMin+=daily.totalMinutes||0;
        if(daily.status!=='signed') allSigned=false;
      } else {
        const pt=empPt[ds];
        if(!pt) return;
        const debut=pt.arrivee||'';const fin=pt.depart||'';
        const pauseMin=(pt.pause_deb&&pt.pause_fin)?Math.max(0,toMin(pt.pause_fin)-toMin(pt.pause_deb)):0;
        const workMin=debut&&fin?Math.max(0,toMin(fin)-toMin(debut)-pauseMin):0;
        lignes.push({date:ds,debut,fin,pause:pauseMin,totalMin:workMin,signed:false,source:'pointage'});
        totalMin+=workMin;
        allSigned=false;
      }
    });

    const contentHash=await sha256(JSON.stringify(lignes)+f.employeId+f.periode);
    const daysSignedCount=lignes.filter(l=>l.signed).length;
    const autoSigned=allSigned && daysSignedCount>0;

    const {_id:_rm,...ficheData}=f;
    await window._setDoc(window._doc(window._db,'rh_emargements',window._uid,'fiches',ficheId),{
      ...ficheData,
      lignes,
      totalMinutes:totalMin,
      totalHeures:Math.round(totalMin/60*10)/10,
      daysTotal:lignes.length,
      daysSigned:daysSignedCount,
      contentHash,
      status:autoSigned?'signed':ficheData.status,
      signatureEmploye:autoSigned?{status:'daily_aggregate',daysSigned:daysSignedCount}:ficheData.signatureEmploye,
      locked:autoSigned||ficheData.locked,
      updatedAt:Date.now()
    });

    await addAuditEntry('fiche_updated','fiche',ficheId,f.employeNom);
    showToast(`✅ ${f.employeNom} : ${Math.round(totalMin/60*10)/10}h (${daysSignedCount}/${lignes.length} jours signés)`);
    await loadFiches();await loadDaily();await loadAudit();render();
  }catch(e){
    console.error('refreshFiche',e);
    showToast('❌ Erreur : '+e.message);
  }
}
window.refreshFiche=refreshFiche;

// ── AUDIT ENTRY ──
async function addAuditEntry(action, targetType, targetId, actorNom){
  const auditId='aud_'+Date.now()+'_'+Math.random().toString(36).slice(2,8);
  const timestamp=Date.now();
  const hashStr=action+targetId+timestamp+window._uid;
  const hash=await sha256(hashStr);
  const entry={
    action, targetType, targetId,
    actorType:'admin', actorId:window._uid, actorNom,
    timestamp, ip:'—', hash
  };
  try{
    await window._setDoc(window._doc(window._db,'rh_emargements',window._uid,'audit',auditId),entry);
  }catch(e){console.warn('audit',e);}
}

  // Preuve cryptographique
  h+=`<div style="margin-top:14px;font-size:11px;font-weight:700;margin-bottom:6px">🔐 Preuve cryptographique</div>
    <div class="proof">Content hash : ${f.contentHash||'—'}</div>`;

  if(bestSig){
    h+=`<div style="margin-top:10px" class="proof">
      Signature salarié : ${bestSig.proofHash||bestSig.contentHash||'—'}<br>
      Signé le : ${fmtTS(bestSig.signedAt)}<br>
      IP : ${bestSig.ip||'—'}<br>
      Source : ${bestSig.source||'—'}
      ${f.daysSigned?' · '+f.daysSigned+'/'+f.daysTotal+' jour(s) émargé(s)':''}
    </div>`;
    if(dailyWithSig?.signatureImage){
      h+=`<div style="margin-top:10px;text-align:center">
        <div style="font-size:10px;font-weight:700;color:var(--muted);margin-bottom:4px">🖊️ Signature manuscrite (tablette)</div>
        <img src="${dailyWithSig.signatureImage}" style="max-width:300px;border:1px solid var(--border);border-radius:8px;background:white;padding:4px" alt="Signature"/>
      </div>`;
    }
  }

  document.getElementById('detailBody').innerHTML=h;

  // Footer actions
  let foot='';
  if(f.status==='signed'){
    foot=`<button class="btn btn-rh" onclick="validateFiche('${ficheId}');closeDetail()">✅ Contresigner (Valider)</button>`;
  }
  foot+=`<button class="btn btn-outline" onclick="exportFichePDF('${ficheId}')">📄 Export PDF</button>`;
  foot+=`<button class="btn btn-outline" onclick="closeDetail()">Fermer</button>`;
  document.getElementById('detailFoot').innerHTML=foot;

  document.getElementById('detailOverlay').classList.add('show');
}
window.viewFiche=viewFiche;

function closeDetail(){document.getElementById('detailOverlay').classList.remove('show');}
window.closeDetail=closeDetail;

// ── VALIDATE FICHE (admin countersign) ──
async function validateFiche(ficheId){
  const f=_fiches.find(x=>x._id===ficheId);
  if(!f) return;
  if(!confirm(`Valider et contresigner la fiche de ${f.employeNom} ?\n\nCette action est irréversible et sera enregistrée dans le journal d'audit.`)) return;

  f.signatureAdmin={validatedAt:Date.now(),status:'validated'};
  f.status='validated';
  f.updatedAt=Date.now();
  f.locked=true;

  try{
    await window._setDoc(window._doc(window._db,'rh_emargements',window._uid,'fiches',ficheId),f);
    const user=window._auth?.currentUser;
    await addAuditEntry('fiche_validated','fiche',ficheId,user?.displayName||'Admin');
    showToast('✅ Fiche validée et contresignée');
    await loadFiches();await loadAudit();render();
  }catch(e){showToast('❌ Erreur : '+e.message);}
}
window.validateFiche=validateFiche;

// ══════════════════════════════════════════
//   EXPORT PDF
// ══════════════════════════════════════════
function exportFichePDF(ficheId, existingPdf, noSave){
  const f=_fiches.find(x=>x._id===ficheId);
  if(!f){if(!existingPdf)showToast('Fiche introuvable');return existingPdf||null;}

  const sig=_signatures.find(s=>s.ficheId===ficheId && (s.type==='heures'||s.type==='daily'));
  const empDailys=_daily.filter(d=>d.employeId===f.employeId && d.date>=f.periodeDebut && d.date<=f.periodeFin && d.status==='signed');
  const dailyWithSig=empDailys.find(d=>d.signatureImage);
  const bestSig=dailyWithSig||sig||empDailys[0]||null;

  const {jsPDF}=window.jspdf;
  const pdf=existingPdf||(new jsPDF('p','mm','a4'));
  if(existingPdf) pdf.addPage();
  const pw=210, ph=297, margin=15, cw=pw-2*margin, bottomLimit=ph-15;

  function needPage(y,need){ if(y+need>bottomLimit){pdf.addPage();return 20;} return y; }

  // ── EN-TÊTE ──
  pdf.setFontSize(15);pdf.setFont(undefined,'bold');pdf.setTextColor(20,20,20);
  pdf.text('FICHE DE DÉCOMPTE DES HEURES DE TRAVAIL',margin,20);
  pdf.setFontSize(8);pdf.setFont(undefined,'normal');pdf.setTextColor(100);
  pdf.text('Articles L.3171-2, D.3171-8 et D.3171-16 du Code du travail',margin,25);

  // ── CADRE IDENTIFICATION ──
  pdf.setDrawColor(180);pdf.setLineWidth(0.4);
  pdf.roundedRect(margin,29,cw,22,2,2);
  const col1=margin+4, col2=margin+35, col3=margin+cw/2+4, col4=margin+cw/2+35;

  pdf.setTextColor(0);pdf.setFontSize(9);
  pdf.setFont(undefined,'bold');pdf.text('Salarié :',col1,36);
  pdf.setFont(undefined,'normal');pdf.text(f.employeNom||'—',col2,36);

  pdf.setFont(undefined,'bold');pdf.text('Période :',col1,42);
  pdf.setFont(undefined,'normal');pdf.text(f.periodeLabel||f.periode||'—',col2,42);

  pdf.setFont(undefined,'bold');pdf.text('Total :',col1,48);
  pdf.setFont(undefined,'normal');pdf.text((f.totalHeures?.toFixed(1)||0)+'h ('+(f.totalMinutes||0)+' min)',col2,48);

  pdf.setFont(undefined,'bold');pdf.text('Statut :',col3,36);
  pdf.setFont(undefined,'normal');pdf.text(STATUS_LABELS[f.status]||f.status,col4,36);

  pdf.setFont(undefined,'bold');pdf.text('Émis le :',col3,42);
  pdf.setFont(undefined,'normal');
  pdf.text(new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}),col4,42);

  // ── TABLEAU DES HEURES ──
  const rows=(f.lignes||[]).map(l=>{
    const dayName=l.date?new Date(l.date+'T12:00:00').toLocaleDateString('fr-FR',{weekday:'short'}):'';
    const srcBadge=l.source==='daily'?(l.signed?' ✓':''):'';
    return [dayName+' '+fmtFR(l.date), l.debut||'—', l.fin||'—', l.pause?fmtDur(l.pause):'—', fmtDur(l.totalMin)+srcBadge];
  });
  rows.push([{content:'TOTAL PÉRIODE',colSpan:4,styles:{fontStyle:'bold',halign:'right'}},(f.totalHeures?.toFixed(1)||0)+'h']);

  pdf.autoTable({
    startY:55,
    head:[['Jour / Date','Début','Fin','Pause','Durée']],
    body:rows,
    theme:'grid',
    headStyles:{fillColor:[5,150,105],textColor:255,fontStyle:'bold',fontSize:8,cellPadding:2.5},
    bodyStyles:{fontSize:8,cellPadding:2},
    columnStyles:{0:{cellWidth:48},4:{fontStyle:'bold',cellWidth:24}},
    margin:{left:margin,right:margin}
  });

  let y=pdf.lastAutoTable.finalY+8;

  // ── BLOC SIGNATURES (côte à côte) ──
  const hasSigImg=!!dailyWithSig?.signatureImage;
  const sigBoxH=hasSigImg?46:28; // plus grand si image signature
  y=needPage(y,sigBoxH+4);
  const halfW=(cw-6)/2;
  pdf.setDrawColor(190);pdf.setLineWidth(0.3);

  // Gauche — Salarié
  pdf.roundedRect(margin,y,halfW,sigBoxH,2,2);
  pdf.setFontSize(8);pdf.setFont(undefined,'bold');pdf.setTextColor(5,100,70);
  pdf.text('SIGNATURE DU SALARIÉ',margin+4,y+5);
  pdf.setFont(undefined,'normal');pdf.setTextColor(50);pdf.setFontSize(7.5);

  if(bestSig){
    const sigDate=bestSig.signedAt||bestSig.signedAt||'';
    const sigIP=bestSig.ip||'—';
    const sigHash=bestSig.proofHash||bestSig.contentHash||'—';
    const sigSource=bestSig.source||'—';

    pdf.text('Date : '+fmtTS(sigDate),margin+4,y+10);
    pdf.text('IP : '+sigIP+'  |  Source : '+sigSource,margin+4,y+14);
    pdf.setFontSize(6.5);pdf.setTextColor(100);
    const hashShort='Hash : '+sigHash.slice(0,48)+(sigHash.length>48?'…':'');
    pdf.text(hashShort,margin+4,y+18);

    if(f.daysSigned>0){
      pdf.setFontSize(7);pdf.setTextColor(5,100,70);
      pdf.text(f.daysSigned+'/'+f.daysTotal+' jour(s) émargé(s) individuellement',margin+4,y+22);
    }

    // ── IMAGE SIGNATURE MANUSCRITE ──
    if(hasSigImg){
      try{
        pdf.addImage(dailyWithSig.signatureImage,'PNG',margin+6,y+24,halfW-12,18);
      }catch(e){
        pdf.setFontSize(6.5);pdf.setTextColor(130);
        pdf.text('[Signature manuscrite — erreur affichage]',margin+4,y+30);
      }
    }
  } else {
    pdf.setTextColor(160);pdf.text('En attente de signature',margin+4,y+10);
  }

  // Droite — Employeur
  const rx=margin+halfW+6;
  pdf.setDrawColor(190);
  pdf.roundedRect(rx,y,halfW,sigBoxH,2,2);
  pdf.setFontSize(8);pdf.setFont(undefined,'bold');pdf.setTextColor(5,70,100);
  pdf.text('CONTRESIGNATURE EMPLOYEUR',rx+4,y+5);
  pdf.setFont(undefined,'normal');pdf.setTextColor(50);pdf.setFontSize(7.5);
  if(f.signatureAdmin){
    pdf.text('Date : '+fmtTS(f.signatureAdmin.validatedAt),rx+4,y+10);
    pdf.text('Statut : '+(f.signatureAdmin.status==='validated'?'Validé':'Rejeté'),rx+4,y+14);
  } else {
    pdf.setTextColor(160);pdf.text('En attente de validation',rx+4,y+10);
  }

  y+=sigBoxH+5;

  // ── BLOC INTÉGRITÉ ──
  y=needPage(y,16);
  pdf.setDrawColor(210);pdf.setFillColor(245,247,250);
  pdf.roundedRect(margin,y,cw,12,1.5,1.5,'FD');
  pdf.setFontSize(7);pdf.setFont(undefined,'bold');pdf.setTextColor(80);
  pdf.text('INTÉGRITÉ DU DOCUMENT',margin+4,y+4.5);
  pdf.setFont(undefined,'normal');pdf.setFontSize(6.5);pdf.setTextColor(110);
  // Hash tronqué pour rentrer dans la boîte
  const contentHashShort=(f.contentHash||'—').slice(0,64);
  pdf.text('SHA-256 : '+contentHashShort+(f.contentHash&&f.contentHash.length>64?'…':''),margin+4,y+8);
  pdf.text('ID : '+(f._id||'—').slice(0,50)+'   |   Créé : '+(f.createdAt?fmtTS(f.createdAt):'—'),margin+4,y+11);

  y+=16;

  // ── MENTIONS LÉGALES ──
  y=needPage(y,38);
  pdf.setDrawColor(220);pdf.setLineWidth(0.2);
  pdf.line(margin,y,margin+cw,y);
  y+=3;

  pdf.setFontSize(6.5);pdf.setFont(undefined,'bold');pdf.setTextColor(140);
  pdf.text('MENTIONS LÉGALES',margin,y);
  y+=3;

  pdf.setFont(undefined,'normal');pdf.setFontSize(6);pdf.setTextColor(140);
  const mentions=[
    'Ce document constitue le décompte individuel du temps de travail prévu par l\'article L.3171-2 du Code du travail.',
    'Signature électronique simple au sens de l\'article 1366 du Code civil et du règlement (UE) n°910/2014 (eIDAS, niveau 1).',
    'Conservation obligatoire : 5 ans à compter de l\'établissement, conformément à l\'article D.3171-16 du Code du travail.',
    'Ce document est tenu à la disposition de l\'inspecteur ou du contrôleur du travail (art. D.3171-14).',
    'Le salarié dispose d\'un droit de contestation (art. L.3171-4). Toute contestation est horodatée et tracée.',
    'Données personnelles traitées conformément au RGPD (art. 6.1.c — obligation légale). Responsable : l\'employeur.',
    'Système de décompte du temps de travail mis en œuvre après information des salariés (art. L.1222-4).',
  ];
  mentions.forEach(m=>{
    y=needPage(y,4);
    pdf.text('• '+m,margin,y);
    y+=3;
  });
  y+=2;
  pdf.setFontSize(6);pdf.setTextColor(160);
  pdf.text('Document généré par ALTEORE (alteore.com)',margin,y);

  if(!existingPdf && !noSave){
    pdf.save(`emargement_${f.employeNom.replace(/\s+/g,'_')}_${f.periode}.pdf`);
    showToast('📄 PDF exporté');
  }
  return pdf;
}
window.exportFichePDF=exportFichePDF;

function exportAllPDF(){
  const {start,end,label}=getPeriodRange();
  let fichesToExport=_fiches.filter(f=>f.periodeDebut && f.periodeDebut>=fmt(start) && f.periodeDebut<=fmt(end));
  if(fichesToExport.length===0){
    const ym=start.getFullYear()+'-'+String(start.getMonth()+1).padStart(2,'0');
    fichesToExport=_fiches.filter(f=>f.periode===ym);
  }
  if(fichesToExport.length===0){showToast('Aucune fiche à exporter');return;}

  if(fichesToExport.length===1){
    exportFichePDF(fichesToExport[0]._id);
    return;
  }

  // Plusieurs fiches → un seul PDF combiné
  let pdf=exportFichePDF(fichesToExport[0]._id, null, true); // première fiche, pas de save
  for(let i=1;i<fichesToExport.length;i++){
    pdf=exportFichePDF(fichesToExport[i]._id, pdf); // ajoute une page à chaque fiche
  }
  if(pdf){
    const periode=label.replace(/\s+/g,'_').replace(/[^\w-]/g,'');
    pdf.save(`emargements_inspection_${periode}.pdf`);
    showToast(`📄 ${fichesToExport.length} fiche(s) exportées en 1 PDF`);
  }
}
window.exportAllPDF=exportAllPDF;

// ── TOAST ──
function showToast(msg){
  const t=document.createElement('div');
  t.textContent=msg;
  t.style.cssText='position:fixed;bottom:24px;right:24px;background:linear-gradient(135deg,#059669,#10b981);color:white;padding:12px 20px;border-radius:14px;font-size:13px;font-weight:600;z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,.2);animation:fadeInUp .3s ease';
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),3500);
}
