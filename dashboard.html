<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <title>ALTEORE — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --blue-dark:#0f1f5c;--blue-main:#2563eb;--blue-light:#60a5fa;
      --blue-ghost:#eff6ff;--white:#fff;--text:#0f172a;--muted:#64748b;
      --border:rgba(0,0,0,0.06);--bg:#f9fafb;--sidebar-w:252px;--radius:20px;
      --green:#059669;--orange:#d97706;--red:#dc2626;--purple:#7c3aed;
      /* Liquid glass tokens */
      --glass-bg:rgba(255,255,255,0.6);
      --glass-bg-heavy:rgba(255,255,255,0.7);
      --glass-border:rgba(0,0,0,0.06);
      --glass-border-top:rgba(255,255,255,0.9);
      --glass-shine:linear-gradient(135deg,rgba(255,255,255,0.5) 0%,rgba(255,255,255,0.05) 50%,rgba(255,255,255,0) 100%);
      --glass-blur:blur(24px) saturate(180%);
      --glass-shadow:0 2px 8px rgba(0,0,0,0.04),0 8px 32px rgba(0,0,0,0.06);
      --glass-shadow-hover:0 4px 12px rgba(0,0,0,0.06),0 20px 60px rgba(0,0,0,0.1);
      --glass-inset:inset 0 1px 1px rgba(255,255,255,0.6),inset 0 -1px 1px rgba(0,0,0,0.04);
    }
    body{font-family:'Plus Jakarta Sans',sans-serif;background:#f9fafb;color:var(--text);display:flex;min-height:100vh;-webkit-font-smoothing:antialiased;}
    /* Mesh gradient overlay — very subtle on white */
    body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:-1;background:
      radial-gradient(ellipse 60% 50% at 15% 10%,rgba(147,197,253,0.1),transparent),
      radial-gradient(ellipse 50% 40% at 85% 25%,rgba(196,181,253,0.08),transparent),
      radial-gradient(ellipse 40% 50% at 50% 85%,rgba(167,243,208,0.06),transparent);
    }

    /* ═══ SIDEBAR ═══ */
    .sidebar{width:var(--sidebar-w);min-height:100vh;background:linear-gradient(180deg,#0f1f5c 0%,#162366 100%);display:flex;flex-direction:column;position:fixed;left:0;top:0;z-index:100;padding-bottom:24px;overflow-y:auto;}
    .sidebar-logo{display:flex;align-items:center;gap:10px;padding:26px 20px 22px;border-bottom:1px solid rgba(255,255,255,0.08);margin-bottom:10px;}
    .sidebar-logo-icon{width:36px;height:36px;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.2);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;}
    .sidebar-logo-text{font-size:18px;font-weight:800;color:white;letter-spacing:1px;}
    .sidebar-section-label{font-size:10px;font-weight:700;color:rgba(255,255,255,0.3);letter-spacing:1.2px;text-transform:uppercase;padding:14px 20px 5px;}
    .nav-item{display:flex;align-items:center;gap:11px;padding:10px 20px;color:rgba(255,255,255,0.6);font-size:13px;font-weight:500;cursor:pointer;border-left:3px solid transparent;transition:all 0.18s;user-select:none;}
    .nav-item:hover{color:white;background:rgba(255,255,255,0.06);}
    .nav-item.active{color:white;background:rgba(255,255,255,0.1);border-left-color:#60a5fa;}
    .nav-icon{font-size:15px;width:18px;text-align:center;flex-shrink:0;}
    .nav-label{flex:1;}
    .nav-badge{background:rgba(79,126,248,0.3);color:#a5b4fc;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;}
    .nav-chevron{font-size:11px;color:rgba(255,255,255,0.3);transition:transform 0.25s;margin-left:auto;}
    .nav-item.open .nav-chevron{transform:rotate(90deg);}
    .submenu{overflow:hidden;max-height:0;transition:max-height 0.3s ease;}
    .submenu.open{max-height:300px;}
    .sub-item{display:flex;align-items:center;gap:9px;padding:8px 20px 8px 44px;color:rgba(255,255,255,0.45);font-size:12.5px;font-weight:500;cursor:pointer;border-left:3px solid transparent;transition:all 0.18s;}
    .sub-item:hover{color:rgba(255,255,255,0.8);background:rgba(255,255,255,0.05);}
    .sub-item.active{color:white;background:rgba(79,126,248,0.15);border-left-color:rgba(79,126,248,0.6);}
    .sub-dot{width:5px;height:5px;background:rgba(255,255,255,0.3);border-radius:50%;flex-shrink:0;}
    .sub-item.active .sub-dot{background:#60a5fa;}
    .sub-year-badge{margin-left:auto;font-size:10px;color:rgba(255,255,255,0.25);font-weight:600;}
    .sidebar-footer{margin-top:auto;padding:16px 20px 0;border-top:1px solid rgba(255,255,255,0.08);}
    .user-card{display:flex;align-items:center;gap:10px;padding:10px;background:rgba(255,255,255,0.07);border-radius:10px;}
    .user-avatar{width:32px;height:32px;background:linear-gradient(135deg,var(--blue-light),#818cf8);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:white;flex-shrink:0;}
    .user-name{font-size:12px;font-weight:600;color:white;}
    .user-plan{font-size:10px;color:rgba(255,255,255,0.4);}
    .logout-btn{margin-left:auto;background:none;border:none;color:rgba(255,255,255,0.3);cursor:pointer;font-size:14px;padding:4px;}
    .logout-btn:hover{color:rgba(255,255,255,0.7);}

    /* ═══ MAIN / TOPBAR — Frosted bar ═══ */
    .main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh;}
    .topbar{
      background:rgba(255,255,255,0.5);
      backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);
      border-bottom:1px solid rgba(0,0,0,0.06);
      box-shadow:0 1px 0 rgba(255,255,255,0.8) inset,0 4px 16px rgba(0,0,0,0.04);
      padding:16px 36px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;
    }
    .topbar-left h1{font-size:20px;font-weight:800;letter-spacing:-0.04em;color:#0f172a;}
    .topbar-left p{font-size:12px;color:var(--muted);margin-top:2px;font-weight:500;}
    .topbar-right{display:flex;align-items:center;gap:10px;}
    .btn{padding:9px 18px;border:none;border-radius:14px;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.25s cubic-bezier(.4,0,.2,1);}
    .btn-primary{background:linear-gradient(135deg,#2563eb 0%,#3b82f6 100%);color:white;box-shadow:0 4px 14px rgba(37,99,235,0.3),inset 0 1px 0 rgba(255,255,255,0.2);}
    .btn-primary:hover{box-shadow:0 8px 24px rgba(37,99,235,0.4);transform:translateY(-1px);}
    .btn-outline{
      background:var(--glass-bg);backdrop-filter:blur(12px);
      color:#2563eb;border:1px solid var(--glass-border);
      box-shadow:var(--glass-inset);
    }
    .btn-outline:hover{background:rgba(255,255,255,0.7);border-color:rgba(37,99,235,0.3);transform:translateY(-1px);}
    .content{padding:28px 36px;flex:1;}

    /* ═══ CONTEXT BAR ═══ */
    .context-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
    .context-month{display:flex;align-items:center;gap:10px;}
    .context-pill{
      display:inline-flex;align-items:center;gap:7px;
      background:var(--glass-bg);backdrop-filter:var(--glass-blur);
      border:1px solid var(--glass-border);border-top:1px solid var(--glass-border-top);
      border-radius:24px;padding:8px 18px;font-size:12px;font-weight:600;color:var(--text);
      box-shadow:var(--glass-shadow),var(--glass-inset);
    }
    .context-pill .dot{width:8px;height:8px;background:#10b981;border-radius:50%;animation:pulse 2s infinite;box-shadow:0 0 10px rgba(16,185,129,0.5);}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
    .last-update{font-size:11px;color:var(--muted);}

    /* ═══ SECTION LABEL ═══ */
    .section-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:16px;display:flex;align-items:center;gap:10px;}
    .section-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(0,0,0,0.06),transparent);}

    /* ═══ KPI GRIDS ═══ */
    .kpi-grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px;}
    .kpi-grid-5{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:28px;}
    .kpi-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:28px;}

    /* ═══ KPI CARDS — LIQUID GLASS ═══ */
    .kpi-card{
      background:var(--glass-bg);
      backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);
      border:1px solid var(--glass-border);
      border-top:1px solid var(--glass-border-top);
      border-radius:var(--radius);
      padding:22px 20px;
      position:relative;overflow:hidden;
      transition:transform 0.35s cubic-bezier(.4,0,.2,1),box-shadow 0.35s;
      box-shadow:var(--glass-shadow),var(--glass-inset);
    }
    .kpi-card:hover{
      box-shadow:var(--glass-shadow-hover),var(--glass-inset);
      transform:translateY(-4px);
    }
    /* Top accent bar */
    .kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:3px 3px 0 0;}
    /* Specular highlight — the "liquid" reflection */
    .kpi-card::after{
      content:'';position:absolute;top:0;left:0;right:0;height:55%;
      background:var(--glass-shine);
      pointer-events:none;border-radius:var(--radius) var(--radius) 0 0;
    }
    .kpi-card.blue{background:linear-gradient(160deg,rgba(219,234,254,0.5) 0%,rgba(191,219,254,0.3) 100%);}
    .kpi-card.blue::before{background:linear-gradient(90deg,#2563eb,#60a5fa);}
    .kpi-card.blue:hover{box-shadow:0 8px 40px rgba(37,99,235,0.15),0 20px 60px rgba(0,0,0,0.06),var(--glass-inset);}
    .kpi-card.green{background:linear-gradient(160deg,rgba(209,250,229,0.5) 0%,rgba(167,243,208,0.3) 100%);}
    .kpi-card.green::before{background:linear-gradient(90deg,#059669,#34d399);}
    .kpi-card.green:hover{box-shadow:0 8px 40px rgba(5,150,105,0.15),0 20px 60px rgba(0,0,0,0.06),var(--glass-inset);}
    .kpi-card.orange{background:linear-gradient(160deg,rgba(254,243,199,0.5) 0%,rgba(253,230,138,0.3) 100%);}
    .kpi-card.orange::before{background:linear-gradient(90deg,#d97706,#fbbf24);}
    .kpi-card.orange:hover{box-shadow:0 8px 40px rgba(217,119,6,0.12),0 20px 60px rgba(0,0,0,0.06),var(--glass-inset);}
    .kpi-card.purple{background:linear-gradient(160deg,rgba(237,233,254,0.5) 0%,rgba(221,214,254,0.3) 100%);}
    .kpi-card.purple::before{background:linear-gradient(90deg,#7c3aed,#a78bfa);}
    .kpi-card.purple:hover{box-shadow:0 8px 40px rgba(124,58,237,0.12),0 20px 60px rgba(0,0,0,0.06),var(--glass-inset);}
    .kpi-card.red{background:linear-gradient(160deg,rgba(254,226,226,0.5) 0%,rgba(254,202,202,0.3) 100%);}
    .kpi-card.red::before{background:linear-gradient(90deg,#dc2626,#f87171);}
    .kpi-card.red:hover{box-shadow:0 8px 40px rgba(220,38,38,0.12),0 20px 60px rgba(0,0,0,0.06),var(--glass-inset);}
    .kpi-card.teal{background:linear-gradient(160deg,rgba(204,251,241,0.5) 0%,rgba(153,246,228,0.3) 100%);}
    .kpi-card.teal::before{background:linear-gradient(90deg,#0d9488,#2dd4bf);}
    .kpi-card.teal:hover{box-shadow:0 8px 40px rgba(13,148,136,0.12),0 20px 60px rgba(0,0,0,0.06),var(--glass-inset);}
    .kpi-card.pink{background:linear-gradient(160deg,rgba(252,231,243,0.5) 0%,rgba(251,207,232,0.3) 100%);}
    .kpi-card.pink::before{background:linear-gradient(90deg,#ec4899,#f9a8d4);}
    .kpi-card.indigo{background:linear-gradient(160deg,rgba(224,231,255,0.5) 0%,rgba(199,210,254,0.3) 100%);}
    .kpi-card.indigo::before{background:linear-gradient(90deg,#6366f1,#818cf8);}
    .kpi-icon{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:14px;position:relative;z-index:1;
      background:rgba(255,255,255,0.72);border:1px solid rgba(0,0,0,0.06);
      box-shadow:0 2px 8px rgba(0,0,0,0.04),inset 0 1px 1px rgba(255,255,255,0.8);
    }
    .kpi-card.blue .kpi-icon{background:rgba(37,99,235,0.1);border-color:rgba(37,99,235,0.15);}
    .kpi-card.green .kpi-icon{background:rgba(5,150,105,0.1);border-color:rgba(5,150,105,0.15);}
    .kpi-card.orange .kpi-icon{background:rgba(217,119,6,0.1);border-color:rgba(217,119,6,0.15);}
    .kpi-card.purple .kpi-icon{background:rgba(124,58,237,0.1);border-color:rgba(124,58,237,0.15);}
    .kpi-card.red .kpi-icon{background:rgba(220,38,38,0.1);border-color:rgba(220,38,38,0.15);}
    .kpi-card.teal .kpi-icon{background:rgba(13,148,136,0.1);border-color:rgba(13,148,136,0.15);}
    .kpi-card.pink .kpi-icon{background:rgba(236,72,153,0.1);border-color:rgba(236,72,153,0.15);}
    .kpi-card.indigo .kpi-icon{background:rgba(99,102,241,0.1);border-color:rgba(99,102,241,0.15);}
    .kpi-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;position:relative;z-index:1;}
    .kpi-value{font-size:24px;font-weight:800;color:var(--text);margin-bottom:6px;letter-spacing:-0.035em;line-height:1.1;position:relative;z-index:1;}
    .kpi-value.positive{color:var(--green);}
    .kpi-value.negative{color:var(--red);}
    .kpi-value.empty{color:#d1d5db;}
    .kpi-sub{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px;font-weight:500;position:relative;z-index:1;}
    .kpi-sub .up{color:#059669;font-weight:700;background:rgba(5,150,105,0.1);padding:2px 8px;border-radius:20px;font-size:10px;}
    .kpi-sub .down{color:#dc2626;font-weight:700;background:rgba(220,38,38,0.08);padding:2px 8px;border-radius:20px;font-size:10px;}
    .kpi-sub .neutral{color:var(--muted);}
    .kpi-progress{margin-top:12px;position:relative;z-index:1;}
    .kpi-progress-bar{height:5px;background:rgba(0,0,0,0.06);border-radius:99px;overflow:hidden;}
    .kpi-progress-fill{height:100%;border-radius:99px;transition:width 1.2s cubic-bezier(0.4,0,0.2,1);}
    .kpi-progress-label{font-size:10px;color:var(--muted);margin-top:5px;font-weight:500;}

    /* ═══ SEUIL DE RENTABILITÉ — Glass panel ═══ */
    .seuil-section{
      background:var(--glass-bg-heavy);backdrop-filter:var(--glass-blur);
      border:1px solid var(--glass-border);border-top:1px solid var(--glass-border-top);
      border-radius:22px;padding:26px 28px;margin-bottom:24px;
      box-shadow:var(--glass-shadow),var(--glass-inset);position:relative;overflow:hidden;
    }
    .seuil-section::after{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:var(--glass-shine);pointer-events:none;border-radius:22px 22px 0 0;}
    .seuil-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:8px;position:relative;z-index:1;}
    .seuil-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px;position:relative;z-index:1;}
    .seuil-kpi{padding:16px;border-radius:16px;border:1px solid rgba(0,0,0,0.06);background:rgba(255,255,255,0.65);backdrop-filter:blur(8px);transition:transform 0.25s,box-shadow 0.25s;box-shadow:var(--glass-inset);}
    .seuil-kpi:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.08),inset 0 1px 1px rgba(255,255,255,0.5);}
    .seuil-kpi .sk-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
    .seuil-kpi .sk-val{font-size:20px;font-weight:800;letter-spacing:-0.02em;}
    .seuil-kpi .sk-sub{font-size:10px;color:var(--muted);margin-top:3px;}
    .seuil-gauge{margin-bottom:16px;position:relative;z-index:1;}
    .seuil-gauge-bar{height:36px;background:rgba(0,0,0,0.05);border-radius:12px;overflow:hidden;position:relative;box-shadow:inset 0 2px 4px rgba(0,0,0,0.06);}
    .seuil-gauge-fill{height:100%;border-radius:12px;display:flex;align-items:center;justify-content:flex-end;padding-right:10px;font-size:10px;font-weight:700;color:white;transition:width 1s cubic-bezier(0.4,0,0.2,1);}
    .seuil-gauge-marker{position:absolute;top:-3px;bottom:-3px;width:3px;border-radius:2px;z-index:2;}
    .seuil-gauge-label{position:absolute;top:-18px;font-size:9px;font-weight:700;white-space:nowrap;transform:translateX(-50%);}
    .seuil-compare{display:grid;grid-template-columns:1fr 1fr;gap:14px;position:relative;z-index:1;}
    .seuil-card{padding:18px;border-radius:16px;border:1px solid rgba(0,0,0,0.06);background:rgba(255,255,255,0.6);backdrop-filter:blur(8px);transition:transform 0.25s,box-shadow 0.25s;box-shadow:var(--glass-inset);}
    .seuil-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.08),inset 0 1px 1px rgba(255,255,255,0.5);}
    .seuil-card-head{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
    .seuil-card-icon{width:36px;height:36px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:15px;}
    .seuil-card-title{font-size:13px;font-weight:700;}
    .seuil-row{display:flex;justify-content:space-between;font-size:12px;padding:5px 0;border-bottom:1px solid rgba(0,0,0,0.04);}
    .seuil-row:last-child{border-bottom:none;font-weight:700;}
    .seuil-row .sr-val{font-weight:700;}

    /* ═══ WIDGET ROW ═══ */
    .widget-row{display:grid;grid-template-columns:1fr 1fr 1.6fr;gap:12px;margin-bottom:22px;align-items:stretch;}

    /* ═══ WEATHER CARD ═══ */
    .weather-card{background:linear-gradient(135deg,#1e3a8a 0%,#3b82f6 100%);border-radius:var(--radius);padding:14px 16px;color:white;position:relative;overflow:hidden;display:flex;align-items:center;gap:12px;box-shadow:0 6px 24px rgba(30,58,138,0.25),inset 0 1px 0 rgba(255,255,255,0.15);}
    .weather-card::before{content:'';position:absolute;top:-20px;right:-20px;width:100px;height:100px;background:rgba(255,255,255,0.08);border-radius:50%;}
    .weather-card::after{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(255,255,255,0.1),transparent);pointer-events:none;border-radius:var(--radius) var(--radius) 0 0;}
    .w-icon{font-size:30px;line-height:1;flex-shrink:0;position:relative;z-index:1;}
    .w-info{flex:1;min-width:0;position:relative;z-index:1;}
    .w-city{font-size:10px;font-weight:600;opacity:0.7;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}
    .w-temprow{display:flex;align-items:baseline;gap:7px;}
    .w-temp{font-size:26px;font-weight:800;letter-spacing:-1px;line-height:1;}
    .w-feel{font-size:11px;opacity:0.65;}
    .w-bottom{display:flex;gap:10px;margin-top:4px;}
    .w-detail{font-size:10px;opacity:0.7;}

    /* ═══ QUOTE CARD — Glass ═══ */
    .quote-card{
      background:var(--glass-bg);backdrop-filter:var(--glass-blur);
      border:1px solid var(--glass-border);border-top:1px solid var(--glass-border-top);
      border-radius:var(--radius);padding:14px 16px;display:flex;flex-direction:column;justify-content:space-between;
      box-shadow:var(--glass-shadow),var(--glass-inset);position:relative;overflow:hidden;
    }
    .quote-card::after{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:var(--glass-shine);pointer-events:none;border-radius:var(--radius) var(--radius) 0 0;}
    .quote-header{display:flex;align-items:center;gap:6px;margin-bottom:7px;position:relative;z-index:1;}
    .quote-tag{font-size:9px;font-weight:700;color:#2563eb;background:rgba(37,99,235,0.08);padding:2px 7px;border-radius:20px;text-transform:uppercase;letter-spacing:0.5px;}
    .quote-text{font-size:11.5px;font-weight:500;color:var(--text);line-height:1.55;font-style:italic;flex:1;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;position:relative;z-index:1;}
    .quote-text::before{content:'\201C';font-size:20px;color:#c7d2fe;font-style:normal;line-height:0;vertical-align:-5px;margin-right:2px;}
    .quote-author{font-size:10px;font-weight:700;color:var(--muted);position:relative;z-index:1;}

    /* ═══ NEWS CARD — Glass ═══ */
    .news-card{
      background:var(--glass-bg);backdrop-filter:var(--glass-blur);
      border:1px solid var(--glass-border);border-top:1px solid var(--glass-border-top);
      border-radius:var(--radius);overflow:hidden;
      box-shadow:var(--glass-shadow),var(--glass-inset);
    }
    .news-header{padding:10px 14px;border-bottom:1px solid rgba(0,0,0,0.06);display:flex;align-items:center;justify-content:space-between;}
    .news-title{font-size:12px;font-weight:700;}
    .news-source{font-size:10px;color:var(--muted);}
    .news-list{padding:3px 0;}
    .news-item{padding:8px 14px;border-bottom:1px solid rgba(0,0,0,0.03);cursor:pointer;transition:all 0.15s;}
    .news-item:last-child{border-bottom:none;}
    .news-item:hover{background:rgba(37,99,235,0.04);}
    .news-item-title{font-size:11px;font-weight:600;color:var(--text);margin-bottom:2px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
    .news-item-meta{font-size:10px;color:var(--muted);}
    .news-loading{padding:14px;text-align:center;color:var(--muted);font-size:11px;}

    /* ═══ VOCAL ASSISTANT ═══ */
    .vocal-fab{position:fixed;bottom:28px;left:280px;width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#a78bfa);border:none;color:white;font-size:24px;cursor:pointer;box-shadow:0 8px 28px rgba(124,58,237,.35),inset 0 2px 0 rgba(255,255,255,0.2);z-index:200;display:flex;align-items:center;justify-content:center;transition:all .25s;font-family:inherit}
    .vocal-fab:hover{transform:scale(1.08);box-shadow:0 10px 36px rgba(124,58,237,.45)}
    .vocal-fab.listening{background:linear-gradient(135deg,#ef4444,#f97316);animation:vpulse 1.2s infinite;box-shadow:0 6px 24px rgba(239,68,68,.5)}
    .vocal-fab.thinking{background:linear-gradient(135deg,#f59e0b,#fbbf24);animation:none}
    .vocal-fab.speaking{background:linear-gradient(135deg,#10b981,#34d399);animation:vpulse 1.5s infinite}
    @keyframes vpulse{0%,100%{box-shadow:0 6px 24px rgba(239,68,68,.4)}50%{box-shadow:0 6px 24px rgba(239,68,68,.15),0 0 0 12px rgba(239,68,68,.08)}}
    .vocal-overlay{position:fixed;inset:0;background:rgba(10,15,40,.92);backdrop-filter:blur(20px);z-index:350;display:none;align-items:center;justify-content:center;flex-direction:column;gap:20px;padding:20px}
    .vocal-overlay.show{display:flex}
    .vocal-ring{width:140px;height:140px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative}
    .vocal-ring.listening{background:rgba(239,68,68,.1);border:3px solid rgba(239,68,68,.3);animation:vring 1.2s infinite}
    .vocal-ring.thinking{background:rgba(245,158,11,.1);border:3px solid rgba(245,158,11,.3)}
    .vocal-ring.speaking{background:rgba(16,185,129,.1);border:3px solid rgba(16,185,129,.3);animation:vring 1.5s infinite}
    @keyframes vring{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
    .vocal-ring-icon{font-size:48px}
    .vocal-status{font-size:16px;font-weight:800;color:white;text-align:center}
    .vocal-text{font-size:14px;color:rgba(255,255,255,.7);text-align:center;max-width:500px;line-height:1.7;min-height:24px}
    .vocal-answer{font-size:15px;color:white;text-align:center;max-width:520px;line-height:1.8;background:rgba(255,255,255,.08);padding:16px 24px;border-radius:16px;border:1px solid rgba(255,255,255,.12)}
    .vocal-close{position:absolute;top:20px;right:20px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:10px;color:white;font-size:14px;padding:10px 20px;cursor:pointer;font-family:inherit;font-weight:700;z-index:10}
    .vocal-close:hover{background:rgba(255,255,255,.2)}
    .vocal-hint{font-size:11px;color:rgba(255,255,255,.35);text-align:center;max-width:400px;line-height:1.6}

    /* ═══ COPILOTE IA — Deep glass ═══ */
    .copilote-card{background:linear-gradient(135deg,#0c1220 0%,#1a2744 50%,#111827 100%);border-radius:24px;padding:0;overflow:hidden;position:relative;box-shadow:0 8px 32px rgba(15,23,42,0.25),inset 0 1px 0 rgba(255,255,255,0.06);}
    .copilote-inner{padding:22px 24px;position:relative;z-index:1;}
    .copilote-card::before{content:'';position:absolute;top:-35%;right:-12%;width:260px;height:260px;background:radial-gradient(circle,rgba(124,58,237,.12) 0%,transparent 70%);border-radius:50%;}
    .copilote-card::after{content:'';position:absolute;bottom:-20%;left:-6%;width:220px;height:220px;background:radial-gradient(circle,rgba(16,185,129,.08) 0%,transparent 70%);border-radius:50%;}
    .copilote-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
    .copilote-tag{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:#a5b4fc;text-transform:uppercase;letter-spacing:.5px;}
    .copilote-tag .pulse{width:6px;height:6px;background:#10b981;border-radius:50%;animation:cpulse 2s infinite;box-shadow:0 0 8px rgba(16,185,129,0.5);}
    @keyframes cpulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(16,185,129,.4)}50%{opacity:.7;box-shadow:0 0 0 8px rgba(16,185,129,0)}}
    .copilote-score{display:flex;align-items:center;gap:8px;}
    .copilote-score-ring{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:white;position:relative;}
    .copilote-score-label{font-size:10px;color:rgba(255,255,255,.5);font-weight:600;}
    .copilote-greeting{font-size:15px;font-weight:700;color:white;margin-bottom:4px;}
    .copilote-headline{font-size:12px;color:rgba(255,255,255,.55);line-height:1.65;margin-bottom:14px;}
    .copilote-insights{display:flex;flex-direction:column;gap:7px;margin-bottom:12px;}
    .copilote-insight{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;border-radius:12px;font-size:11px;color:rgba(255,255,255,.85);line-height:1.55;border:1px solid rgba(255,255,255,0.04);}
    .copilote-insight.success{background:rgba(16,185,129,.06);}
    .copilote-insight.warning{background:rgba(245,158,11,.06);}
    .copilote-insight.danger{background:rgba(239,68,68,.08);}
    .copilote-insight.info{background:rgba(99,102,241,.06);}
    .copilote-insight.tip{background:rgba(20,184,166,.06);}
    .copilote-insight-icon{font-size:14px;flex-shrink:0;margin-top:1px;}
    .copilote-actions{display:flex;flex-wrap:wrap;gap:6px;}
    .copilote-action{display:flex;align-items:center;gap:5px;padding:7px 14px;border-radius:10px;font-size:10px;font-weight:700;color:white;cursor:pointer;transition:.2s;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.03);text-decoration:none;}
    .copilote-action:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.15);transform:translateY(-1px);}
    .copilote-action.high{border-color:rgba(239,68,68,.25);background:rgba(239,68,68,.06);}
    .copilote-action.medium{border-color:rgba(245,158,11,.2);background:rgba(245,158,11,.05);}
    .copilote-loading{display:flex;align-items:center;justify-content:center;gap:10px;padding:40px 20px;color:rgba(255,255,255,.5);font-size:12px;}
    .copilote-loading .dots{display:flex;gap:5px;}
    .copilote-loading .dot{width:6px;height:6px;background:#818cf8;border-radius:50%;animation:cdot .8s infinite alternate;}
    .copilote-loading .dot:nth-child(2){animation-delay:.2s}
    .copilote-loading .dot:nth-child(3){animation-delay:.4s}
    @keyframes cdot{0%{opacity:.3;transform:translateY(0)}100%{opacity:1;transform:translateY(-5px)}}
    .copilote-refresh{background:none;border:1px solid rgba(255,255,255,.1);border-radius:7px;color:rgba(255,255,255,.4);font-size:11px;padding:4px 10px;cursor:pointer;font-family:inherit;transition:.15s;}
    .copilote-refresh:hover{color:white;border-color:rgba(255,255,255,.25);}

    /* ═══ CHARTS — Glass cards ═══ */
    .charts-grid{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:24px;}
    .charts-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:24px;}
    .chart-card{
      background:var(--glass-bg-heavy);backdrop-filter:var(--glass-blur);
      border:1px solid var(--glass-border);border-top:1px solid var(--glass-border-top);
      border-radius:var(--radius);padding:24px;
      box-shadow:var(--glass-shadow),var(--glass-inset);
      transition:transform 0.25s,box-shadow 0.25s;position:relative;overflow:hidden;
    }
    .chart-card::after{content:'';position:absolute;top:0;left:0;right:0;height:40%;background:var(--glass-shine);pointer-events:none;border-radius:var(--radius) var(--radius) 0 0;}
    .chart-card:hover{box-shadow:var(--glass-shadow-hover),var(--glass-inset);transform:translateY(-2px);}
    .chart-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;position:relative;z-index:1;}
    .chart-title{font-size:14px;font-weight:700;color:var(--text);letter-spacing:-0.01em;}
    .chart-sub{font-size:11px;color:var(--muted);margin-top:3px;font-weight:500;}
    .chart-tag{font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px;backdrop-filter:blur(8px);}
    .tag-blue{background:rgba(37,99,235,0.08);color:#2563eb;}
    .tag-live{background:rgba(5,150,105,0.08);color:#059669;}
    .tag-orange{background:rgba(217,119,6,0.08);color:#d97706;}
    .tag-purple{background:rgba(124,58,237,0.08);color:#7c3aed;}
    .chart-wrap{position:relative;z-index:1;}
    .chart-wrap.h200{height:200px;}
    .chart-wrap.h220{height:220px;}
    .chart-wrap.h160{height:160px;}

    /* ═══ PRÉVISIONS — Glass ═══ */
    .prev-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;}
    .prev-card{
      background:var(--glass-bg-heavy);backdrop-filter:var(--glass-blur);
      border:1px solid var(--glass-border);border-top:1px solid var(--glass-border-top);
      border-radius:var(--radius);padding:24px;
      box-shadow:var(--glass-shadow),var(--glass-inset);
      transition:transform 0.25s,box-shadow 0.25s;position:relative;overflow:hidden;
    }
    .prev-card::after{content:'';position:absolute;top:0;left:0;right:0;height:40%;background:var(--glass-shine);pointer-events:none;border-radius:var(--radius) var(--radius) 0 0;}
    .prev-card:hover{box-shadow:var(--glass-shadow-hover),var(--glass-inset);transform:translateY(-2px);}
    .prev-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;position:relative;z-index:1;}
    .prev-title{font-size:14px;font-weight:700;letter-spacing:-0.01em;}
    .prev-badge{font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;background:rgba(217,119,6,0.08);color:#d97706;}
    .month-progress-list{display:flex;flex-direction:column;gap:8px;position:relative;z-index:1;}
    .month-row{display:flex;align-items:center;gap:10px;}
    .month-name{font-size:11px;font-weight:600;width:32px;color:var(--muted);}
    .month-bar-wrap{flex:1;height:8px;background:rgba(0,0,0,0.05);border-radius:99px;overflow:hidden;box-shadow:inset 0 1px 2px rgba(0,0,0,0.06);}
    .month-bar-fill{height:100%;border-radius:99px;transition:width 0.8s cubic-bezier(0.4,0,0.2,1);}
    .month-val{font-size:11px;font-weight:700;width:68px;text-align:right;}
    .month-val.pos{color:var(--green);}
    .month-val.neg{color:var(--red);}
    .month-val.fut{color:var(--orange);}

    /* ═══ DAILY SALES ═══ */
    .daily-wrap{margin-top:14px;position:relative;z-index:1;}
    .daily-label{font-size:11px;color:var(--muted);margin-bottom:6px;font-weight:600;}
    .daily-scroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;}
    .daily-scroll::-webkit-scrollbar{height:3px;}
    .daily-scroll::-webkit-scrollbar-track{background:rgba(0,0,0,0.03);border-radius:99px;}
    .daily-scroll::-webkit-scrollbar-thumb{background:#c7d2fe;border-radius:99px;}
    .daily-item{flex-shrink:0;text-align:center;min-width:36px;}
    .daily-bar-wrap{height:40px;display:flex;align-items:flex-end;justify-content:center;margin-bottom:3px;}
    .daily-bar{width:22px;border-radius:6px 6px 0 0;background:linear-gradient(180deg,#93c5fd,#2563eb);opacity:0.85;transition:height 0.6s cubic-bezier(0.4,0,0.2,1);box-shadow:0 -2px 8px rgba(37,99,235,0.15);}
    .daily-item.today .daily-bar{background:linear-gradient(180deg,#6ee7b7,#059669);opacity:1;box-shadow:0 -2px 10px rgba(5,150,105,0.25);}
    .daily-day{font-size:9px;color:var(--muted);}
    .daily-amt{font-size:9px;font-weight:700;color:var(--text);}

    /* ═══ FIDÉLISATION — Glass ═══ */
    .fid-card{
      background:var(--glass-bg-heavy);backdrop-filter:var(--glass-blur);
      border:1px solid var(--glass-border);border-top:1px solid var(--glass-border-top);
      border-radius:var(--radius);padding:22px;
      box-shadow:var(--glass-shadow),var(--glass-inset);position:relative;overflow:hidden;
    }
    .fid-card::after{content:'';position:absolute;top:0;left:0;right:0;height:45%;background:var(--glass-shine);pointer-events:none;border-radius:var(--radius) var(--radius) 0 0;}
    .fid-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;position:relative;z-index:1;}
    .fid-title{font-size:13px;font-weight:700;}
    .fid-badge{background:rgba(124,58,237,0.08);color:#7c3aed;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;}
    .fid-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;position:relative;z-index:1;}
    .fid-stat{text-align:center;padding:12px;background:rgba(255,255,255,0.65);border:1px solid rgba(0,0,0,0.06);border-radius:14px;backdrop-filter:blur(8px);}
    .fid-stat-val{font-size:20px;font-weight:800;color:#7c3aed;}
    .fid-stat-lbl{font-size:10px;color:var(--muted);margin-top:3px;}
    .fid-locked{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:20px;text-align:center;color:var(--muted);position:relative;z-index:1;}
    .fid-locked-icon{font-size:28px;opacity:0.5;}
    .fid-locked-text{font-size:12px;line-height:1.5;}
    .fid-locked-btn{font-size:11px;font-weight:700;color:#2563eb;background:rgba(37,99,235,0.08);border:1px solid rgba(37,99,235,0.15);padding:7px 16px;border-radius:12px;cursor:pointer;transition:all 0.2s;backdrop-filter:blur(8px);}
    .fid-locked-btn:hover{background:rgba(37,99,235,0.15);}

    /* ═══ TABLE — Glass ═══ */
    .table-card{
      background:var(--glass-bg-heavy);backdrop-filter:var(--glass-blur);
      border:1px solid var(--glass-border);border-top:1px solid var(--glass-border-top);
      border-radius:var(--radius);overflow:hidden;margin-bottom:24px;
      box-shadow:var(--glass-shadow),var(--glass-inset);
    }
    .table-head{padding:18px 24px;border-bottom:1px solid rgba(0,0,0,0.06);display:flex;justify-content:space-between;align-items:center;}
    .table-title{font-size:14px;font-weight:700;letter-spacing:-0.01em;}
    table{width:100%;border-collapse:collapse;}
    th{padding:10px 20px;text-align:left;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;background:rgba(255,255,255,0.25);border-bottom:1px solid rgba(0,0,0,0.04);}
    td{padding:12px 20px;font-size:12.5px;border-bottom:1px solid rgba(0,0,0,0.03);transition:background 0.15s;}
    tr:hover td{background:rgba(37,99,235,0.03);}
    tr:last-child td{border-bottom:none;}
    .td-pos{color:var(--green);font-weight:700;}
    .td-neg{color:var(--red);font-weight:700;}
    .td-muted{color:var(--muted);}
    .td-fut{color:var(--orange);font-weight:600;}
    .status-pill{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px;}
    .sp-empty{background:rgba(0,0,0,0.04);color:var(--muted);}
    .sp-ok{background:rgba(5,150,105,0.08);color:#059669;}
    .sp-warn{background:rgba(217,119,6,0.08);color:#d97706;}
    .sp-bad{background:rgba(220,38,38,0.08);color:#dc2626;}
    .sp-fut{background:rgba(217,119,6,0.08);color:#d97706;}

    /* ═══ LOADER ═══ */
    .loader{display:flex;align-items:center;justify-content:center;min-height:400px;color:var(--muted);gap:10px;font-size:13px;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .spin{width:18px;height:18px;border:2px solid rgba(0,0,0,0.06);border-top-color:#2563eb;border-radius:50%;animation:spin .7s linear infinite;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    .content{animation:fadeIn 0.45s cubic-bezier(.4,0,.2,1) both;}

    /* ═══ TOGGLE ═══ */
    .view-toggle{display:flex;align-items:center;gap:4px;background:rgba(0,0,0,0.05);border-radius:14px;padding:3px}
    .view-toggle button{border:none;background:none;padding:6px 14px;border-radius:11px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;transition:.25s}
    .view-toggle button.active{background:rgba(255,255,255,0.75);color:#1e3a8a;box-shadow:0 2px 8px rgba(0,0,0,0.06),inset 0 1px 0 rgba(255,255,255,0.8);backdrop-filter:blur(8px);}
    .exercice-config{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)}
    .exercice-config select{padding:4px 8px;border-radius:8px;border:1px solid rgba(0,0,0,0.08);font-size:12px;background:rgba(255,255,255,0.6);backdrop-filter:blur(8px);}

    /* ═══ NAV ═══ */
    .nav-section-label{font-size:10px;font-weight:700;color:rgba(255,255,255,.28);letter-spacing:1px;text-transform:uppercase;padding:12px 20px 4px}

    /* ═══ HAMBURGER + MOBILE ═══ */
    .hamburger{display:none;position:fixed;top:14px;left:14px;z-index:1001;width:44px;height:44px;background:#0f1f5c;border:none;border-radius:12px;cursor:pointer;flex-direction:column;align-items:center;justify-content:center;gap:5px;box-shadow:0 4px 16px rgba(15,31,92,.45);-webkit-tap-highlight-color:transparent;transition:background .2s;}
    .hamburger:active{background:#1a3dce;}
    .hamburger span{display:block;width:20px;height:2.5px;background:#fff;border-radius:2px;transition:all .25s ease;pointer-events:none;}
    .hamburger.open span:nth-child(1){transform:translateY(7.5px) rotate(45deg);}
    .hamburger.open span:nth-child(2){opacity:0;transform:scaleX(0);}
    .hamburger.open span:nth-child(3){transform:translateY(-7.5px) rotate(-45deg);}
    .nav-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;}
    .nav-overlay.show{display:block;}
    html,body{overflow-x:hidden;max-width:100vw;}
    @media(max-width:768px){
      .hamburger{display:flex!important;}
      nav,aside.sidebar,.sidebar{position:fixed!important;top:0!important;left:0!important;height:100vh!important;width:min(280px,84vw)!important;z-index:1001!important;transform:translateX(-105%)!important;transition:transform .3s cubic-bezier(.4,0,.2,1)!important;overflow-y:auto!important;margin:0!important;}
      nav.open,aside.sidebar.open,.sidebar.open{transform:translateX(0)!important;box-shadow:8px 0 32px rgba(0,0,0,.3)!important;}
      .main,main,div.main{margin-left:0!important;width:100vw!important;overflow-x:hidden!important;}
      .topbar{padding:10px 10px 10px 62px!important;flex-wrap:wrap!important;gap:6px!important;width:100%!important;}
      .topbar h1,.topbar-left h1{font-size:14px!important;}
      .topbar-right{width:100%!important;flex-wrap:wrap!important;gap:6px!important;}
      .topbar-right .btn{flex:1 1 auto!important;font-size:11px!important;padding:7px 8px!important;}
      .content{padding:12px 10px!important;}

async function fetchWeatherFromCoords(lat, lon, cityHint){
  try{
    const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,apparent_temperature,precipitation,weather_code,wind_speed_10m&wind_speed_unit=kmh&timezone=auto`,{signal:AbortSignal.timeout(5000)});
    const j=await r.json();
    return{city:cityHint||'Ma position',data:j.current};
  }catch(e){return null;}
}
async function fetchWeather(){
  // Priorité 1 : code postal du profil utilisateur (Firestore)
  try{
    if(window._uid && window._getDoc && window._doc && window._db){
      const snap=await window._getDoc(window._doc(window._db,'profil',window._uid,'data','profil'));
      if(snap.exists()){
        const cp=(snap.data().cp||'').trim();
        if(cp && /^\d{4,5}$/.test(cp)){
          const geo=await fetch(`/api/geocode-cp?cp=${encodeURIComponent(cp)}`,{signal:AbortSignal.timeout(5000)});
          const gj=await geo.json();
          if(gj&&gj.lat&&gj.lon){
            const w=await fetchWeatherFromCoords(gj.lat,gj.lon,gj.city);
            if(w)return w;
          }
        }
      }
    }
  }catch(e){}
  // Priorité 2 : GPS navigateur
  try{
    const pos=await new Promise((res,rej)=>navigator.geolocation
      ?navigator.geolocation.getCurrentPosition(res,rej,{timeout:4000})
      :rej());
    const w=await fetchWeatherFromCoords(pos.coords.latitude.toFixed(4),pos.coords.longitude.toFixed(4),'Ma position');
    if(w)return w;
  }catch(e){}
  // Fallback : France centre (Paris)
  return await fetchWeatherFromCoords('46.2276','2.2137','France');
}

/* ─── MASSE SALARIALE HELPER ─── */
function _calcMS(d) {
  var ms = d && d.masseSalariale;
  if (!ms) return 0;
  var total = 0;
  if (ms.mode === 'auto' && window._rhEmployes && window._rhEmployes.length > 0) {
    window._rhEmployes.forEach(function(e) {
      var brut = parseFloat(e.salaireBrut) || 0;
      var taux = (parseFloat(e.tauxCharges) || 42) / 100;
      total += brut * (1 + taux);
    });
  } else {
    (ms.lignes || []).forEach(function(l) {
      var brut = parseFloat((l.brut || '').toString().replace(',', '.')) || 0;
      var taux = (parseFloat(l.tauxCharges) || 42) / 100;
      total += brut * (1 + taux);
    });
  }
  var dir = ms.dirigeant || {};
  var remDir = parseFloat((dir.remuneration || '').toString().replace(',', '.')) || 0;
  total += remDir * (1 + (parseFloat(dir.tauxCharges) || 45) / 100);
  var divid = parseFloat((dir.dividendes || '').toString().replace(',', '.')) || 0;
  total += divid * (1 + (parseFloat(dir.tauxDividendes) || 30) / 100);
  return total;
}

  const varHT=d.chargesVar?d.chargesVar.reduce((s,r)=>s+(parseFloat(r.montantHT)||0),0):0;
  const varTTC=d.chargesVar?d.chargesVar.reduce((s,r)=>{var h=parseFloat(r.montantHT)||0;return s+h*(1+(parseFloat(r.tvaRate)||0)/100);},0):0;
  const leasingHT=d.leasing?d.leasing.reduce((s,r)=>s+(parseFloat(r.montantHT)||0),0):0;
  const leasingTTC=d.leasing?d.leasing.reduce((s,r)=>{var h=parseFloat(r.montantHT)||0;return s+h*(1+(parseFloat(r.tvaRate)||0)/100);},0):0;
  let creditsHT=0;
  if(d.credits)d.credits.forEach((r,i)=>{
    if(r.ligneType==='principal')creditsHT+=parseFloat(r.montant)||0;
    else{let mt=parseFloat(r.montant)||0;if(r.tvaAuto&&parseFloat(r.tauxInteret)>0){const p=d.credits.slice(0,i).reverse().find(c=>c.fournisseur===r.fournisseur&&c.ligneType==='principal');if(p)mt=(parseFloat(p.montant)||0)*parseFloat(r.tauxInteret)/100/12;}creditsHT+=mt;}
  });
  const masseSalHT=_calcMS(d);
  const chargesHT=fixesHT+varHT+creditsHT+leasingHT+masseSalHT;
  const prevCharges=isFuture?chargesHT:0;
  const prevCAFutur=isFuture?(caHT||0):0;
  const caHTReel=isFuture?0:caHT;
  const chargesReel=isFuture?0:chargesHT;
  const resultat=isFuture?0:(caHT+rentrees-chargesHT);
  const cashflow=isFuture?0:(caTTC+rentrees-(fixesTTC+varTTC+creditsHT+leasingTTC+masseSalHT));
  const prevCAFinal=isFuture?(prevCA||prevCAFutur):prevCA;
  // Extraire les ventes journalières du mois
  const caJournalier=d.ca||[];
  return{caHT:caHTReel,caTTC:isFuture?0:caTTC,tvaCollectee:isFuture?0:tvaCollectee,
    rentrees:isFuture?0:rentrees,prevCA:prevCAFinal,
    fixesHT:isFuture?0:fixesHT,varHT:isFuture?0:varHT,creditsHT:isFuture?0:creditsHT,
    leasingHT:isFuture?0:leasingHT,masseSalHT:isFuture?0:masseSalHT,chargesHT:chargesReel,resultat,cashflow,
    prevCharges,isFuture:!!isFuture,caJournalier};
}

/* ─── FIDÉLISATION ─── */
async function loadFidStats(){
  if(!window._uid||!window._getDocs||!window._collection||!window._db)return null;
  try{
    const snap=await window._getDocs(window._collection(window._db,'fidelite',window._uid,'clients'));
    if(!snap)return null;
    let total=0,actifs=0,pointsTotal=0;
    snap.forEach(doc=>{
      total++;
      const d=doc.data();
      const pts=d.points||0;
      pointsTotal+=pts;
      if(pts>0)actifs++;
    });
    return{total,actifs,pointsTotal};
  }catch(e){return null;}
}

/* ─── CHARGE PRINCIPALE ─── */
async function loadData(_tries){
  _tries=_tries||0;
  if(!window._uid){if(_tries<20){setTimeout(()=>loadData(_tries+1),300);}return;}
  if(window._userPlan===undefined&&window._userPlanDirect===undefined){
    if(_tries<30){setTimeout(()=>loadData(_tries+1),100);}
    else{window._userPlanDirect='pro';loadData(31);}
    return;
  }
  const plan=window._userPlan||window._userPlanDirect||'free';
  const CAN=['trial','pro','max','master','dev'];
  const CAN_MAX=['trial','max','master','dev'];
  if(!CAN.includes(plan)){console.log('Accès refusé plan:',plan);return;}
  // Hide vocal button for non-Max plans
  var vFab=document.getElementById('vocalFab');
  if(vFab) vFab.style.display=CAN_MAX.includes(plan)?'flex':'none';
  // Load stock data
  await loadStockData();
  // Load RH employees for masse salariale
  if (!window._rhEmployes) {
    window._rhEmployes = [];
    try {
      var empSnap = await window._getDocs(window._collection(window._db,'rh',window._uid,'employes'));
      empSnap.forEach(function(d2){ var e=d2.data(); e.id=d2.id; if(e.statut!=='inactif') window._rhEmployes.push(e); });
    } catch(e) {}
  }

  const now=new Date();
  const civilYear=now.getFullYear();
  const currentM=now.getMonth();
  const today=now.getDate();

  // En mode exercice, détecter la bonne année de base.
  // Ex : exercice mai(4)→avril, en février 2026 → year = 2025
  let year = civilYear;
  if (_viewMode === 'exercice' && _fiscalStart > 0) {
    // Si le mois courant est AVANT le mois de début d'exercice → exercice a commencé l'année passée
    if (currentM < _fiscalStart) year = civilYear - 1;
  }

  const fiscalMonths=(_viewMode==='exercice')?getFiscalMonths(year):
    Array.from({length:12},function(_,m){return{year:year,month:m};});

  // Charger les 12 mois
  const allMonths=[];
  for(let i=0;i<12;i++){
    const ym=fiscalMonths[i];
    const key=`${ym.year}-${String(ym.month+1).padStart(2,'0')}`;
    try{
      const snap=await window._getDoc(window._doc(window._db,'pilotage',window._uid,'months',key));
      allMonths.push(snap.exists()?snap.data():null);
    }catch(e){allMonths.push(null);}
  }

  const nowKey2=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const monthsData=allMonths.map((d,i)=>{
    const ym=fiscalMonths[i];
    const key=`${ym.year}-${String(ym.month+1).padStart(2,'0')}`;
    return extractMonthData(d,key>nowKey2);
  });

  // Données mois courant — trouver l'index du mois courant dans fiscalMonths
  let currentIdx = 0;
  const nowYear = now.getFullYear();
  for (let i = 0; i < 12; i++) {
    if (fiscalMonths[i].month === currentM && fiscalMonths[i].year === nowYear) {
      currentIdx = i; break;
    }
  }
  const current=monthsData[currentIdx]||monthsData[currentM];
  const prevMonthData=currentIdx>0?monthsData[currentIdx-1]:{caHT:0,chargesHT:0,resultat:0};

  // Totaux annuels
  const annualCA=monthsData.reduce((s,d)=>s+d.caHT,0);
  const annualCharges=monthsData.reduce((s,d)=>s+d.chargesHT,0);
  const annualResultat=monthsData.reduce((s,d)=>s+d.resultat,0);
  const annualCashflow=monthsData.reduce((s,d)=>s+d.cashflow,0);
  const annualPrevCharges=monthsData.reduce((s,d)=>s+d.prevCharges,0);
  const annualPrevCA=monthsData.reduce((s,d)=>s+d.prevCA,0);
  const annualPrevResultat=annualPrevCA-annualPrevCharges;
  const annualTotalResultat=annualResultat+annualPrevResultat;
  const annualTVA=monthsData.reduce((s,d)=>s+d.tvaCollectee,0);

  // Variation vs mois précédent
  const varCA=prevMonthData.caHT>0?((current.caHT-prevMonthData.caHT)/prevMonthData.caHT*100):null;
  const varCharges=prevMonthData.chargesHT>0?((current.chargesHT-prevMonthData.chargesHT)/prevMonthData.chargesHT*100):null;
  const txMarge=current.caHT>0?((current.caHT-current.chargesHT)/current.caHT*100):null;
  const txMargeAnnuel=annualCA>0?((annualCA-annualCharges)/annualCA*100):null;

  // ── SEUIL DE RENTABILITÉ ──
  const _annFixes=monthsData.reduce((s,d)=>s+d.fixesHT,0);
  const _annVar=monthsData.reduce((s,d)=>s+d.varHT,0);
  const _annCredLeas=monthsData.reduce((s,d)=>s+d.creditsHT+d.leasingHT,0);
  const _annMS=monthsData.reduce((s,d)=>s+(d.masseSalHT||0),0);
  const _txCV=annualCA>0?_annVar/annualCA:0;
  const _txMCV=1-_txCV;
  const _cfStruct=_annFixes+_annMS;
  const _seuilEcoAn=_txMCV>0.01?_cfStruct/_txMCV:0;
  const _seuilFinAn=_txMCV>0.01?(_cfStruct+_annCredLeas)/_txMCV:0;
  const _nbMoisSeuil=monthsData.filter(d=>!d.isFuture&&d.caHT>0).length;
  const _seuilEcoMens=_nbMoisSeuil>0?_seuilEcoAn/12:0;
  const _seuilFinMens=_nbMoisSeuil>0?_seuilFinAn/12:0;
  const _margeSecu=annualCA-_seuilEcoAn;
  const _margeSecuPct=annualCA>0?_margeSecu/annualCA*100:0;
  const _margeSecuFin=annualCA-_seuilFinAn;
  const _caJourMoy=_nbMoisSeuil>0?annualCA/(_nbMoisSeuil*30):0;
  const _pmEcoJ=_caJourMoy>0?_seuilEcoAn/_caJourMoy:0;
  const _pmFinJ=_caJourMoy>0?_seuilFinAn/_caJourMoy:0;
  const _seuilOK=annualCA>0&&_seuilEcoAn>0;

  const _seuilAlertIcon=_margeSecu>=0?'💡':'⚠️';
  const _seuilAlertBg=_margeSecu>=0?'#f0fdf4':'#fef2f2';
  const _seuilAlertBorder=_margeSecu>=0?'#bbf7d0':'#fecaca';
  const _seuilAlertColor=_margeSecu>=0?'#166534':'#991b1b';
  const _seuilConfort=_margeSecuPct>20?'Situation confortable.':_margeSecuPct>10?'Marge correcte mais à surveiller.':'Marge faible, vigilance requise.';
  const _seuilAlertText=_margeSecu>=0
    ?_seuilAlertIcon+' <b>Marge de sécurité économique : +'+_margeSecuPct.toFixed(1)+'%</b> — Votre CA est <b>supérieur</b> de <b>'+fmtE(_margeSecu)+'</b> au seuil économique. '+_seuilConfort
    :'⚠️ <b>Marge de sécurité : '+_margeSecuPct.toFixed(1)+'%</b> — CA <b>inférieur</b> de <b>'+fmtE(Math.abs(_margeSecu))+'</b> au seuil. Vous ne couvrez pas encore vos charges fixes.';
  const _seuilAlertFin=_margeSecuFin<0&&_margeSecu>=0?' <b>Attention</b> : le seuil financier (crédits inclus) n\'est pas encore atteint (écart : '+fmtE(Math.abs(_margeSecuFin))+').':'';

  // Projection fin d'année
  const moisPassesAvecCA=monthsData.filter((d,i)=>!d.isFuture&&d.caHT>0);
  const nbMoisReel=moisPassesAvecCA.length;
  const _ss=saisonGetStats(_saisonConfig);
  const _projTarget=_ss.active?_ss.moisEquivCA:12;
  const projCA=nbMoisReel>0?(annualCA/nbMoisReel*_projTarget):0;
  const projResultat=nbMoisReel>0?(annualResultat/nbMoisReel*_projTarget):0;

  // Ventes journalières du mois courant
  const caJour=current.caJournalier||[];

  const hasCurrentData=current.caHT>0||current.chargesHT>0;
  const hasAnnualData=annualCA>0||annualCharges>0;

  // Fetch async: météo, actu, fidélisation
  const [weather,news,fidStats]=await Promise.all([
    fetchWeather(),
    fetchNews(),
    (['max','master','trial','dev'].includes(plan))?loadFidStats():Promise.resolve(null)
  ]);

  // Quote du jour
  const quote=getDailyQuote();

  // Destroy old charts
  _charts.forEach(c=>{try{c.destroy();}catch(e){}});
  _charts=[];

  // Construire le HTML des ventes journalières
  const maxCA=caJour.length>0?Math.max(...caJour.map(r=>{const h055=parseFloat(r.ht055)||0,h10=parseFloat(r.ht10)||0,h20=parseFloat(r.ht20)||0;const m=h055+h10+h20;return m>0?m:(parseFloat(r.montantHT)||0);})):0;

  function buildDailyBars(){
    if(!caJour.length)return '<div style="color:var(--muted);font-size:11px;padding:8px 0;">Aucune vente enregistrée ce mois.</div>';
    // Grouper par jour
    const byDay={};
    caJour.forEach(r=>{

      const d=parseInt(parts[0]);

      byDay[d]=(byDay[d]||0)+val;

    return days.map(d=>{

<script>
// ══════════════════════════════════════════════════════════
// STOCK DATA HELPER — shared across dashboard/cashflow/suivi-ca/rapport
// Loads stock data and computes valuation + variation
// ══════════════════════════════════════════════════════════
var _stockData = {loaded:false, products:[], movements:[], value:0, variation:0, alerts:0, ruptures:0, refs:0, rotation:0, joursStock:0, snapshotPrev:null};

async function loadStockData(){
  if(!window._uid||!window._getDocs||!window._db||_stockData.loaded) return _stockData;
  try{
    var pSnap=await window._getDocs(window._collection(window._db,'stock',window._uid,'products'));
    _stockData.products=[];
    pSnap.forEach(function(d){_stockData.products.push(Object.assign({id:d.id},d.data()))});

    var mSnap=await window._getDocs(window._collection(window._db,'stock',window._uid,'movements'));
    _stockData.movements=[];
    mSnap.forEach(function(d){_stockData.movements.push(Object.assign({id:d.id},d.data()))});

    // Compute stock values (CMUP)
    var map={};
    _stockData.products.forEach(function(p){
      var ref=(p.ref||'').trim();if(!ref)return;
      var pa=parseFloat(String(p.pa||0).replace(',','.'))||0;
      var sq=parseFloat(String(p.stockBase||0).replace(',','.'))||0;
      map[ref]={qty:sq,cmup:pa,totalIn:sq*pa,totalQtyIn:sq};
    });
    var sorted=_stockData.movements.slice().sort(function(a,b){return(a.date||'').localeCompare(b.date||'')});
    sorted.forEach(function(m){
      var ref=(m.ref||'').trim();if(!ref)return;
      if(!map[ref])map[ref]={qty:0,cmup:0,totalIn:0,totalQtyIn:0};
      var q=parseFloat(String(m.qty||0).replace(',','.'))||0;
      var pa=parseFloat(String(m.pa||0).replace(',','.'))||0;
      var e=map[ref];
      if(m.type==='IN'||m.type==='RETURN_IN'){
        if(pa>0){e.totalIn+=q*pa;e.totalQtyIn+=q;e.cmup=e.totalQtyIn>0?e.totalIn/e.totalQtyIn:pa}
        e.qty+=q;
      } else if(m.type==='ADJUST'){e.qty=q}
      else {e.qty-=q}
    });

    var totalVal=0,alerts=0,ruptures=0;
    _stockData.products.forEach(function(p){
      var ref=(p.ref||'').trim();if(!ref)return;
      var s=map[ref]||{qty:0,cmup:0};
      var val=Math.max(s.qty,0)*s.cmup;
      totalVal+=val;
      var min=parseFloat(p.min||0)||0;
      if(s.qty<=0)ruptures++;
      else if(min>0&&s.qty<=min)alerts++;
    });
    _stockData.value=totalVal;
    _stockData.alerts=alerts;
    _stockData.ruptures=ruptures;
    _stockData.refs=_stockData.products.length;

    // Load previous month snapshot for variation
    var now=new Date();
    var prevM=now.getMonth()===0?12:now.getMonth();
    var prevY=now.getMonth()===0?now.getFullYear()-1:now.getFullYear();
    var prevKey=prevY+'-'+String(prevM).padStart(2,'0');
    try{
      var snapDoc=await window._getDoc(window._doc(window._db,'stock',window._uid,'snapshots',prevKey));
      if(snapDoc.exists()){
        _stockData.snapshotPrev=snapDoc.data();
        _stockData.variation=totalVal-(snapDoc.data().totalValue||0);
      }
    }catch(e){}

    // Rotation (sorties 12 mois / stock moyen)
    var cutoff=new Date();cutoff.setFullYear(cutoff.getFullYear()-1);
    var cutStr=cutoff.toISOString().slice(0,10);
    var totalOut=0;
    _stockData.movements.forEach(function(m){
      if((m.date||'')>=cutStr&&(m.type==='OUT'||m.type==='LOSS')){
        totalOut+=(parseFloat(String(m.qty||0).replace(',','.'))||0)*(parseFloat(String(m.pa||0).replace(',','.'))||0);
      }
    });
    _stockData.rotation=totalVal>0?totalOut/totalVal:0;
    _stockData.joursStock=_stockData.rotation>0?Math.round(365/_stockData.rotation):0;

    _stockData.loaded=true;
  }catch(e){console.warn('Stock helper load error:',e)}
  return _stockData;
}

// ── Auth helper for secured API calls ──
async function authFetch(url, body) {
  var token = '';
  try { if (window._auth && window._auth.currentUser) token = await window._auth.currentUser.getIdToken(); } catch(e) {}
  return fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': token ? 'Bearer ' + token : '' }, body: JSON.stringify(body) });
}

// COPILOTE IA — Briefing quotidien intelligent
// ══════════════════════════════════════════════════════════
var _copiloteCache = null;

async function loadCopilote(metrics) {
  var widget = document.getElementById('copilote-widget');
  if (!widget) return;

  // Hash des métriques pour détecter les changements
  var metricsStr = JSON.stringify(metrics);
  var hash = 0;
  for (var i = 0; i < metricsStr.length; i++) { hash = ((hash << 5) - hash + metricsStr.charCodeAt(i)) | 0; }
  var hashKey = 'h' + Math.abs(hash).toString(36);

  // Check cache (sessionStorage — valide tant que l'onglet est ouvert ET données identiques)
  try {
    var cached = sessionStorage.getItem('copilote_' + hashKey);
    if (cached) {
      _copiloteCache = JSON.parse(cached);
      renderCopilote(widget, _copiloteCache);
      return;
    }
  } catch(e) {}

  // Loading state
  widget.querySelector('.copilote-inner').innerHTML = '<div class="copilote-loading"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>🧠 Votre copilote analyse vos données...</div>';

  // Get user name
  var prenom = '';
  try { var uEl = document.getElementById('uname'); if(uEl) prenom = uEl.textContent.split(' ')[0]; } catch(e){}

  try {
    var resp = await authFetch('/api/copilote-ai', { metrics: metrics, prenom: prenom });
    var data = await resp.json();
    if (data.error) throw new Error(data.error);

    _copiloteCache = data;
    renderCopilote(widget, data);

    // Cache in sessionStorage (invalidé si données changent ou onglet fermé)
    try { sessionStorage.setItem('copilote_' + hashKey, JSON.stringify(data)); } catch(e) {}

  } catch(e) {
    console.error('Copilote error:', e);
    widget.querySelector('.copilote-inner').innerHTML =
      '<div class="copilote-head"><div class="copilote-tag"><span class="pulse"></span>Copilote IA</div></div>' +
      '<div class="copilote-greeting">Bonjour !</div>' +
      '<div class="copilote-headline" style="color:rgba(255,255,255,.4)">Analyse indisponible — ' + (e.message||'erreur') + '</div>' +
      '<button class="copilote-refresh" onclick="refreshCopilote()" style="margin-top:8px">↻ Réessayer</button>';
  }
}

function renderCopilote(widget, data) {
  var score = data.score || 50;
  var scoreColor = score >= 75 ? '#10b981' : score >= 50 ? '#f59e0b' : '#ef4444';
  var scoreBg = score >= 75 ? 'rgba(16,185,129,.2)' : score >= 50 ? 'rgba(245,158,11,.2)' : 'rgba(239,68,68,.2)';

  var html = '<div class="copilote-head">';
  html += '<div class="copilote-tag"><span class="pulse"></span>Copilote IA</div>';
  html += '<div class="copilote-score">';
  html += '<div class="copilote-score-ring" style="background:' + scoreBg + ';border:2px solid ' + scoreColor + '">' + score + '</div>';
  html += '<div><div style="font-size:12px;font-weight:800;color:white">' + (data.scoreLabel||'') + '</div><div class="copilote-score-label">Santé globale</div></div>';
  html += '</div></div>';

  html += '<div class="copilote-greeting">' + esc(data.greeting || 'Bonjour !') + '</div>';
  html += '<div class="copilote-headline">' + esc(data.headline || '') + '</div>';

  // Insights
  if (data.insights && data.insights.length) {
    html += '<div class="copilote-insights">';
    data.insights.forEach(function(ins) {
      html += '<div class="copilote-insight ' + (ins.type||'info') + '">';
      html += '<span class="copilote-insight-icon">' + (ins.icon||'💡') + '</span>';
      html += '<span>' + esc(ins.text||'') + '</span>';
      html += '</div>';
    });
    html += '</div>';
  }

  // KPI comment
  if (data.kpiComment) {
    html += '<div style="font-size:10px;color:rgba(255,255,255,.4);margin-bottom:8px;line-height:1.5">' + esc(data.kpiComment) + '</div>';
  }

  // Actions
  if (data.actions && data.actions.length) {
    html += '<div class="copilote-actions">';
    data.actions.forEach(function(act) {
      var cls = act.priority === 'high' ? 'high' : act.priority === 'medium' ? 'medium' : '';
      if (act.link) {
        html += '<a href="' + esc(act.link) + '" class="copilote-action ' + cls + '">' + (act.icon||'→') + ' ' + esc(act.text||'') + '</a>';
      } else {
        html += '<span class="copilote-action ' + cls + '">' + (act.icon||'→') + ' ' + esc(act.text||'') + '</span>';
      }
    });
    html += '<button class="copilote-refresh" onclick="refreshCopilote()" title="Actualiser">↻</button>';
    html += '</div>';
  }

  widget.querySelector('.copilote-inner').innerHTML = html;
}

async function refreshCopilote() {
  _copiloteCache = null;
  try { sessionStorage.clear(); } catch(e) {}
  var widget = document.getElementById('copilote-widget');
  if (widget) widget.querySelector('.copilote-inner').innerHTML = '<div class="copilote-loading"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>🧠 Actualisation en cours...</div>';
  window.loadData();
}
window.refreshCopilote = refreshCopilote;

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

</script>

  document.getElementById('vocalText').textContent = '';
  document.getElementById('vocalAnswer').style.display = 'none';
  document.getElementById('vocalFallback').style.display = '';
  document.getElementById('vocalTextInput').value = '';
  // Try speech recognition
  if (SpeechRecognition) {
    startListening();
  } else {
    // No speech support (Safari) — text-only mode
    setVocalState('idle');
    document.getElementById('vocalStatus').textContent = '💬 Posez votre question';
    document.getElementById('vocalIcon').textContent = '⌨️';
    document.getElementById('vocalRing').className = 'vocal-ring';
    document.getElementById('vocalText').textContent = 'La reconnaissance vocale n\'est pas disponible sur ce navigateur. Tapez votre question ci-dessous.';
    setTimeout(function(){ document.getElementById('vocalTextInput').focus(); }, 100);
  }
}

function stopVocal() {
  if (_recognition) try { _recognition.abort(); } catch(e) {}
  if (_synth) _synth.cancel();
  setVocalState('idle');
  document.getElementById('vocalOverlay').classList.remove('show');
}
window.stopVocal = stopVocal;

function setVocalState(state) {
  _vocalState = state;
  var fab = document.getElementById('vocalFab');
  var ring = document.getElementById('vocalRing');
  var icon = document.getElementById('vocalIcon');
  var status = document.getElementById('vocalStatus');

  fab.className = 'vocal-fab ' + state;
  ring.className = 'vocal-ring ' + state;

  if (state === 'idle') {
    fab.textContent = '🎤'; icon.textContent = '🎤';
    status.textContent = 'Appuyez et parlez';
  } else if (state === 'listening') {
    fab.textContent = '⏹'; icon.textContent = '👂';
    status.textContent = 'Je vous écoute...';
  } else if (state === 'thinking') {
    fab.textContent = '⏳'; icon.textContent = '🧠';
    status.textContent = 'Analyse en cours...';
  } else if (state === 'speaking') {
    fab.textContent = '⏹'; icon.textContent = '🗣';
    status.textContent = 'Réponse';
  }
}

function startListening() {
  if (!SpeechRecognition) return;

  _recognition = new SpeechRecognition();
  _recognition.lang = 'fr-FR';
  _recognition.continuous = false;
  _recognition.interimResults = true;
  _recognition.maxAlternatives = 1;

  _recognition.onstart = function() {
    _speechSupported = true;
    setVocalState('listening');
  };

  _recognition.onresult = function(event) {
    var transcript = '';
    for (var i = event.resultIndex; i < event.results.length; i++) {
      transcript += event.results[i][0].transcript;
    }
    document.getElementById('vocalText').textContent = '🗣 "' + transcript + '"';
    document.getElementById('vocalTextInput').value = transcript;

    if (event.results[event.results.length - 1].isFinal) {
      processQuestion(transcript);
    }
  };

  _recognition.onerror = function(event) {
    console.warn('Speech error:', event.error);
    if (event.error === 'service-not-allowed' || event.error === 'not-allowed') {
      // Safari or permission denied — switch to text mode silently
      document.getElementById('vocalStatus').textContent = '💬 Posez votre question';
      document.getElementById('vocalIcon').textContent = '⌨️';
      document.getElementById('vocalRing').className = 'vocal-ring';
      document.getElementById('vocalText').textContent = 'Micro non disponible — utilisez le champ texte ci-dessous.';
      setVocalState('idle');
      setTimeout(function(){ document.getElementById('vocalTextInput').focus(); }, 100);
    } else if (event.error === 'no-speech') {
      document.getElementById('vocalText').textContent = 'Aucune voix détectée';
      setVocalState('idle');
    } else if (event.error !== 'aborted') {
      document.getElementById('vocalStatus').textContent = 'Tapez votre question ci-dessous';
      document.getElementById('vocalIcon').textContent = '⌨️';
      setVocalState('idle');
      document.getElementById('vocalTextInput').focus();
    }
  };

  _recognition.onend = function() {
    if (_vocalState === 'listening') {
      if (!document.getElementById('vocalText').textContent) {
        document.getElementById('vocalText').textContent = '';
        setVocalState('idle');
      }
    }
  };

  try {
    _recognition.start();
  } catch(e) {
    // Fallback to text
    document.getElementById('vocalStatus').textContent = 'Tapez votre question ci-dessous';
    document.getElementById('vocalIcon').textContent = '⌨️';
    document.getElementById('vocalTextInput').focus();
  }
}

function stopListening() {
  if (_recognition) try { _recognition.stop(); } catch(e) {}
}

function sendTextQuestion() {
  var input = document.getElementById('vocalTextInput');
  var q = (input.value || '').trim();
  if (!q) return;
  document.getElementById('vocalText').textContent = '💬 "' + q + '"';
  processQuestion(q);
}
window.sendTextQuestion = sendTextQuestion;

async function processQuestion(question) {
  setVocalState('thinking');

  var metrics = window._vocalMetrics || {};
  var prenom = '';
  try { var uEl = document.getElementById('uname'); if (uEl) prenom = uEl.textContent.split(' ')[0]; } catch(e) {}

  try {
    var resp = await authFetch('/api/vocal-ai', { question: question, metrics: metrics, prenom: prenom });
    var data = await resp.json();
    if (data.error) throw new Error(data.error);

    var answer = data.answer || 'Désolé, je n\'ai pas de réponse.';
    document.getElementById('vocalAnswer').textContent = answer;
    document.getElementById('vocalAnswer').style.display = '';

    // Try to speak if supported
    if (_synth && _speechSupported) {
      speakAnswer(answer);
    } else {
      setVocalState('idle');
    }
  } catch(e) {
    document.getElementById('vocalAnswer').textContent = 'Erreur : ' + e.message;
    document.getElementById('vocalAnswer').style.display = '';
    setVocalState('idle');
  }
}

function speakAnswer(text) {
  if (!_synth) { setVocalState('idle'); return; }
  _synth.cancel();

  var utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'fr-FR';
  utterance.rate = 1.0;
  utterance.pitch = 1.0;

  var voices = _synth.getVoices();
  var frVoice = voices.find(function(v) { return v.lang.startsWith('fr'); });
  if (frVoice) utterance.voice = frVoice;

  utterance.onstart = function() { setVocalState('speaking'); };
  utterance.onend = function() { setVocalState('idle'); };
  utterance.onerror = function() { setVocalState('idle'); };

  _synth.speak(utterance);
}

function stopSpeaking() {
  if (_synth) _synth.cancel();
  setVocalState('idle');
}

// Store metrics for vocal when copilote loads — set directly in the metrics collector
// _vocalMetrics is set by the copilote metrics block in loadData (var _copiloteMetrics)
</script>
