<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <title>ALTEORE — Objectifs & Primes</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --rh-dark:#052e16;--rh-main:#059669;--rh-mid:#10b981;--rh-bright:#34d399;
      --rh-ghost:#f0fdf4;--rh-border:#d1fae5;
      --text:#0f172a;--muted:#64748b;--border:rgba(0,0,0,0.06);--bg:#f0fdf7;--radius:18px;
      --red:#dc2626;--red-light:#fee2e2;--orange:#d97706;--orange-light:#fef3c7;
      --blue:#2563eb;--blue-light:#eff6ff;--purple:#7c3aed;--purple-light:#eef2ff;
      --sidebar-w:250px;
    
      --glass-bg:rgba(255,255,255,0.6);--glass-bg-heavy:rgba(255,255,255,0.7);
      --glass-border:rgba(0,0,0,0.06);--glass-border-top:rgba(255,255,255,0.9);
      --glass-shine:linear-gradient(135deg,rgba(255,255,255,0.5) 0%,rgba(255,255,255,0.05) 50%,rgba(255,255,255,0) 100%);
      --glass-blur:blur(24px) saturate(180%);
      --glass-shadow:0 2px 8px rgba(0,0,0,0.04),0 8px 32px rgba(0,0,0,0.06);
      --glass-shadow-hover:0 4px 12px rgba(0,0,0,0.06),0 20px 60px rgba(0,0,0,0.1);
      --glass-inset:inset 0 1px 1px rgba(255,255,255,0.6),inset 0 -1px 1px rgba(0,0,0,0.04);
    }
    body{font-family:'Plus Jakarta Sans',sans-serif;background:#f9fafb;color:var(--text);display:flex;min-height:100vh;font-size:13px;}
    body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:-1;background:radial-gradient(ellipse 60% 50% at 15% 10%,rgba(147,197,253,0.1),transparent),radial-gradient(ellipse 50% 40% at 85% 25%,rgba(196,181,253,0.08),transparent),radial-gradient(ellipse 40% 50% at 50% 85%,rgba(167,243,208,0.06),transparent)}

    .main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-width:0;}

    /* TOPBAR */
    .topbar{background:rgba(255,255,255,0.72);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border-bottom:1px solid rgba(0,0,0,0.06);box-shadow:0 1px 0 rgba(255,255,255,0.8) inset,0 4px 16px rgba(0,0,0,0.03);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
    .topbar h1{font-size:17px;font-weight:700;}
    .topbar p{font-size:12px;color:var(--muted);}
    .topbar-right{display:flex;align-items:center;gap:10px;}
    .btn{padding:8px 16px;border:none;border-radius:12px;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .18s;}
    .btn-rh{background:linear-gradient(135deg,var(--rh-main),var(--rh-mid));color:white;box-shadow:0 3px 10px rgba(5,150,105,.25);}
    .btn-rh:hover{opacity:.9;transform:translateY(-1px);}
    .btn-outline{background:white;color:var(--rh-main);border:1.5px solid var(--rh-border);}
    .btn-outline:hover{background:var(--rh-ghost);}
    .btn-danger{background:#fef2f2;color:var(--red);border:1px solid #fecaca;}
    .btn-sm{padding:5px 12px;font-size:12px;}
    .btn-xs{padding:3px 8px;font-size:11px;}

    /* CONTENT */
    .content{padding:16px 24px;flex:1;display:flex;flex-direction:column;gap:16px;overflow-y:auto;}

    /* KPI ROW */
    .kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
    .kpi-box{background:var(--glass-bg-heavy);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border:1px solid var(--glass-border);border-top:1px solid var(--glass-border-top);border-radius:var(--radius);box-shadow:var(--glass-shadow),var(--glass-inset);transition:transform 0.25s cubic-bezier(.4,0,.2,1),box-shadow 0.25s;padding:14px 16px;}
    .kpi-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
    .kpi-val{font-size:22px;font-weight:800;}
    .kpi-sub{font-size:10px;color:var(--muted);margin-top:3px;}
    .kpi-val.green{color:var(--rh-main);}
    .kpi-val.orange{color:var(--orange);}
    .kpi-val.red{color:var(--red);}
    .kpi-val.blue{color:var(--blue);}
    .kpi-val.purple{color:var(--purple);}

    /* FILTERS */
    .filters-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
    .filter-sel{padding:6px 10px;border:1.5px solid var(--border);border-radius:8px;font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;color:var(--text);outline:none;background:white;cursor:pointer;min-width:130px;}
    .filter-sel:focus{border-color:var(--rh-main);}
    .search-input{flex:1;min-width:160px;padding:7px 10px;border:1.5px solid var(--border);border-radius:8px;font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;outline:none;color:var(--text);}
    .search-input:focus{border-color:var(--rh-main);}

    /* OBJ CARDS GRID */
    .obj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px;}
    .obj-card{background:white;border:1.5px solid var(--border);border-radius:var(--radius);padding:16px 18px;cursor:pointer;transition:all .18s;position:relative;}
    .obj-card:hover{border-color:var(--rh-border);box-shadow:0 4px 16px rgba(5,150,105,.08);transform:translateY(-1px);}
    .obj-card.active{border-color:var(--rh-main);box-shadow:0 4px 16px rgba(5,150,105,.12);}
    .obj-card-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;}
    .obj-card-title{font-size:14px;font-weight:700;line-height:1.3;}
    .obj-card-badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
    .badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap;}
    .badge-indiv{background:#eff6ff;color:#1d4ed8;}
    .badge-equipe{background:#fef3c7;color:#92400e;}
    .badge-except{background:#f3e8ff;color:#7c3aed;}
    .badge-brouillon{background:#f1f5f9;color:#64748b;}
    .badge-en_cours{background:#d1fae5;color:#065f46;}
    .badge-atteint{background:#10b981;color:white;}
    .badge-partiel{background:#fef3c7;color:#92400e;}
    .badge-non_atteint{background:#fee2e2;color:#991b1b;}
    .badge-annule{background:#f1f5f9;color:#94a3b8;}
    .badge-mensuel{background:#e0f2fe;color:#0369a1;}
    .badge-trimestriel{background:#fce7f3;color:#9d174d;}
    .badge-annuel{background:#ecfdf5;color:#065f46;}
    .badge-libre{background:#faf5ff;color:#6b21a8;}
    .obj-card-emp{display:flex;align-items:center;gap:6px;margin-bottom:8px;}
    .obj-card-emp-av{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:white;flex-shrink:0;}
    .obj-card-emp-name{font-size:11px;font-weight:600;color:var(--text);}

    /* PROGRESS BAR */
    .progress-wrap{margin:8px 0;}
    .progress-bar-bg{height:8px;background:#f1f5f9;border-radius:99px;overflow:hidden;}
    .progress-bar-fill{height:100%;border-radius:99px;transition:width .6s ease;}
    .progress-labels{display:flex;justify-content:space-between;margin-top:4px;}
    .progress-pct{font-size:11px;font-weight:700;}
    .progress-target{font-size:10px;color:var(--muted);}

    /* PRIME LINE */
    .prime-line{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--rh-ghost);border-radius:8px;margin-top:8px;}
    .prime-label{font-size:11px;color:var(--muted);}
    .prime-val{font-size:13px;font-weight:800;}
    .prime-val.green{color:var(--rh-main);}
    .prime-val.orange{color:var(--orange);}

    /* EMPTY STATE */
    .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;text-align:center;color:var(--muted);}
    .empty-icon{font-size:52px;margin-bottom:14px;}

    /* DETAIL PANEL */
    .detail-overlay{display:none;position:fixed;inset:0;z-index:200;}
    .detail-overlay.show{display:flex;}
    .detail-backdrop{position:absolute;inset:0;background:rgba(5,46,22,.3);backdrop-filter:blur(3px);}
    .detail-panel{position:absolute;right:0;top:0;bottom:0;width:min(680px,90vw);background:white;overflow-y:auto;box-shadow:-8px 0 40px rgba(0,0,0,.12);display:flex;flex-direction:column;}
    .detail-head{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:white;z-index:10;}
    .detail-head h2{font-size:17px;font-weight:800;}
    .detail-body{padding:20px 24px;flex:1;display:flex;flex-direction:column;gap:18px;}
    .detail-foot{padding:14px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;position:sticky;bottom:0;background:white;}

    /* SECTIONS */
    .section{background:var(--glass-bg-heavy);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border:1px solid var(--glass-border);border-top:1px solid var(--glass-border-top);border-radius:var(--radius);box-shadow:var(--glass-shadow),var(--glass-inset);transition:transform 0.25s cubic-bezier(.4,0,.2,1),box-shadow 0.25s;overflow:hidden;}
    .sec-head{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;background:#fafffe;border-bottom:1px solid var(--border);}
    .sec-title{font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px;}
    .sec-body{padding:16px 18px;}

    /* FORM */
    .form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
    .field-wrap{margin-bottom:12px;}
    .field-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-bottom:5px;display:block;}
    .rh-input{width:100%;padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;color:var(--text);outline:none;background:white;}
    .rh-input:focus{border-color:var(--rh-main);box-shadow:0 0 0 3px rgba(5,150,105,.08);}
    .rh-textarea{width:100%;padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;color:var(--text);outline:none;resize:vertical;background:white;}
    .rh-textarea:focus{border-color:var(--rh-main);}
    .rh-select{width:100%;padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;color:var(--text);outline:none;background:white;cursor:pointer;}
    .rh-select:focus{border-color:var(--rh-main);}

    /* CRITÈRES TABLE */
    .crit-row{display:grid;grid-template-columns:1fr 90px 70px 70px 36px;gap:8px;align-items:center;margin-bottom:8px;}
    .crit-row input,.crit-row select{padding:7px 8px;border:1.5px solid var(--border);border-radius:7px;font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;color:var(--text);outline:none;}
    .crit-row input:focus,.crit-row select:focus{border-color:var(--rh-main);}
    .btn-del{width:28px;height:28px;border:none;background:#fee2e2;color:var(--red);border-radius:7px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:.15s;}
    .btn-del:hover{background:var(--red);color:white;}

    /* PALIERS TABLE */
    .palier-row{display:grid;grid-template-columns:1fr 1fr 36px;gap:8px;align-items:center;margin-bottom:6px;}
    .palier-row input{padding:7px 8px;border:1.5px solid var(--border);border-radius:7px;font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;color:var(--text);outline:none;}

    /* ALERTES CONFORMITÉ */
    .alerte-box{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-radius:10px;margin-bottom:8px;font-size:12px;line-height:1.5;}
    .alerte-box.warn{background:#fef3c7;border:1px solid #fcd34d;color:#92400e;}
    .alerte-box.danger{background:#fee2e2;border:1px solid #fca5a5;color:#991b1b;}
    .alerte-box.info{background:var(--blue-light);border:1px solid #bfdbfe;color:#1e40af;}
    .alerte-box.ok{background:#d1fae5;border:1px solid #6ee7b7;color:#065f46;}
    .alerte-icon{font-size:16px;flex-shrink:0;margin-top:1px;}

    /* SIMULATEUR COÛT */
    .sim-box{background:linear-gradient(135deg,#1a1f36,#2d3561);border-radius:12px;padding:18px;color:white;}
    .sim-title{font-size:12px;font-weight:600;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;}
    .sim-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
    .sim-item{text-align:center;}
    .sim-item-label{font-size:10px;color:rgba(255,255,255,.5);margin-bottom:4px;}
    .sim-item-val{font-size:18px;font-weight:800;}
    .sim-item-val.green{color:#34d399;}
    .sim-item-val.orange{color:#fbbf24;}
    .sim-item-val.red{color:#f87171;}
    .sim-item-sub{font-size:10px;color:rgba(255,255,255,.4);margin-top:2px;}

    /* IA RESULT */
    .ia-result{background:rgba(248,250,255,0.6);border:1.5px solid #c7d2fe;border-radius:10px;padding:14px 16px;font-size:12px;line-height:1.7;color:#1a1f36;}
    .ia-result h4{font-size:13px;font-weight:700;color:var(--purple);margin-bottom:10px;}
    .ia-result h3{font-size:12px;font-weight:700;color:#1a1f36;margin:14px 0 6px;padding-bottom:4px;border-bottom:1px solid #e2e8f0;}
    .ia-result p{margin:0 0 8px;font-size:12px;line-height:1.6;}
    .ia-result ul{margin:4px 0 10px 16px;padding:0;}
    .ia-result li{margin-bottom:4px;font-size:12px;line-height:1.5;}
    .ia-result strong{font-weight:700;}
    .ia-result em{font-style:italic;color:var(--muted);}
    .ia-result table{width:100%;border-collapse:collapse;margin:8px 0;font-size:11px;}
    .ia-result th{background:#f0f4ff;padding:6px 10px;text-align:left;font-weight:700;font-size:10px;border-bottom:1px solid #c7d2fe;}
    .ia-result td{padding:6px 10px;border-bottom:1px solid #e2e8f0;}

    /* TABS in detail */
    .dtabs{display:flex;gap:2px;background:#f1f5f9;border-radius:10px;padding:3px;margin-bottom:16px;}
    .dtab{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;color:var(--muted);transition:.15s;border:none;background:transparent;font-family:'Plus Jakarta Sans',sans-serif;}
    .dtab.active{background:white;color:var(--rh-main);box-shadow:0 1px 4px rgba(0,0,0,.08);}

    /* TOAST */
    .toast{position:fixed;bottom:24px;right:24px;background:#1a1f36;color:white;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;transform:translateY(80px);opacity:0;transition:all .3s;}
    .toast.show{transform:translateY(0);opacity:1;}
    .toast.success{background:#10b981;}
    .toast.error{background:#ef4444;}

    .loader{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--muted);gap:10px;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .spin{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--rh-main);border-radius:50%;animation:spin .7s linear infinite;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .content{animation:fadeIn .25s ease both;}

    /* RESPONSIVE */
    html,body{overflow-x:hidden;max-width:100vw;}
    .hamburger{display:none;position:fixed;top:14px;left:14px;z-index:1001;width:44px;height:44px;background:#0f1f5c;border:none;border-radius:12px;cursor:pointer;flex-direction:column;align-items:center;justify-content:center;gap:5px;box-shadow:0 4px 16px rgba(15,31,92,.45);-webkit-tap-highlight-color:transparent;}
    .hamburger span{display:block;width:20px;height:2.5px;background:#fff;border-radius:2px;transition:all .25s ease;pointer-events:none;}
    .hamburger.open span:nth-child(1){transform:translateY(7.5px) rotate(45deg);}
    .hamburger.open span:nth-child(2){opacity:0;}
    .hamburger.open span:nth-child(3){transform:translateY(-7.5px) rotate(-45deg);}
    .nav-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;}
    .nav-overlay.show{display:block;}

    @media(max-width:768px){
      .hamburger{display:flex!important;}
      nav,.sidebar{position:fixed!important;top:0!important;left:0!important;height:100vh!important;width:min(280px,84vw)!important;z-index:1001!important;transform:translateX(-105%)!important;transition:transform .3s cubic-bezier(.4,0,.2,1)!important;overflow-y:auto!important;margin:0!important;}
      .sidebar.open{transform:translateX(0)!important;box-shadow:8px 0 32px rgba(0,0,0,.3)!important;}
      .main{margin-left:0!important;width:100vw!important;overflow-x:hidden!important;}
      .topbar{padding:10px 10px 10px 62px!important;flex-wrap:wrap!important;gap:6px!important;}
      .topbar h1{font-size:14px!important;}
      .topbar p{font-size:10px!important;}
      .topbar-right{width:100%!important;flex-wrap:wrap!important;gap:6px!important;}
      .topbar-right .btn{flex:1 1 auto!important;font-size:11px!important;padding:7px 8px!important;min-height:36px!important;}
      .content{padding:12px 10px!important;gap:12px!important;}
      .kpi-row{grid-template-columns:1fr 1fr!important;gap:8px!important;}
      .obj-grid{grid-template-columns:1fr!important;gap:10px!important;}
      .filters-bar{flex-direction:column!important;gap:6px!important;}
      .filter-sel,.search-input{width:100%!important;min-width:0!important;}
      .detail-panel{width:100vw!important;}
      .form-grid-2,.form-grid-3{grid-template-columns:1fr!important;}
      .crit-row{grid-template-columns:1fr!important;gap:4px!important;}
      .sim-grid{grid-template-columns:1fr 1fr!important;gap:8px!important;}
      input[type=text],input[type=number],input[type=date],select,textarea{font-size:16px!important;}
      .btn{min-height:40px!important;}
    }
    @media(max-width:420px){
      .kpi-row{grid-template-columns:1fr!important;}
      .sim-grid{grid-template-columns:1fr!important;}
    }
  
    /* === LIQUID GLASS — Colored KPI backgrounds + hover glows === */
    .kpi-card.blue,.kpi.blue,.sum-card.blue{background:linear-gradient(160deg,rgba(219,234,254,0.55),rgba(191,219,254,0.35)) !important}
    .kpi-card.blue:hover,.kpi.blue:hover,.sum-card.blue:hover{box-shadow:0 8px 40px rgba(37,99,235,0.18),var(--glass-inset) !important}
    .kpi-card.green,.kpi.green,.sum-card.green{background:linear-gradient(160deg,rgba(209,250,229,0.55),rgba(167,243,208,0.35)) !important}
    .kpi-card.green:hover,.kpi.green:hover,.sum-card.green:hover{box-shadow:0 8px 40px rgba(5,150,105,0.18),var(--glass-inset) !important}
    .kpi-card.orange,.kpi.orange,.sum-card.orange{background:linear-gradient(160deg,rgba(254,243,199,0.55),rgba(253,230,138,0.35)) !important}
    .kpi-card.orange:hover,.kpi.orange:hover,.sum-card.orange:hover{box-shadow:0 8px 40px rgba(217,119,6,0.15),var(--glass-inset) !important}
    .kpi-card.red,.kpi.red,.sum-card.red{background:linear-gradient(160deg,rgba(254,226,226,0.55),rgba(254,202,202,0.35)) !important}
    .kpi-card.red:hover,.kpi.red:hover,.sum-card.red:hover{box-shadow:0 8px 40px rgba(220,38,38,0.15),var(--glass-inset) !important}
    .kpi-card.purple,.kpi.purple,.sum-card.purple{background:linear-gradient(160deg,rgba(237,233,254,0.55),rgba(221,214,254,0.35)) !important}
    .kpi-card.purple:hover,.kpi.purple:hover,.sum-card.purple:hover{box-shadow:0 8px 40px rgba(124,58,237,0.15),var(--glass-inset) !important}
    .kpi-card.teal,.kpi.teal,.sum-card.teal{background:linear-gradient(160deg,rgba(204,251,241,0.55),rgba(153,246,228,0.35)) !important}
    .kpi-card.teal:hover,.kpi.teal:hover,.sum-card.teal:hover{box-shadow:0 8px 40px rgba(13,148,136,0.15),var(--glass-inset) !important}
    .kpi-card.pink,.kpi.pink{background:linear-gradient(160deg,rgba(252,231,243,0.55),rgba(251,207,232,0.35)) !important}
    .kpi-card.indigo,.kpi.indigo{background:linear-gradient(160deg,rgba(224,231,255,0.55),rgba(199,210,254,0.35)) !important}
    .impact-card.pos{background:linear-gradient(160deg,rgba(209,250,229,0.55),rgba(167,243,208,0.35)) !important}
    .impact-card.neg{background:linear-gradient(160deg,rgba(254,226,226,0.55),rgba(254,202,202,0.35)) !important}

<!-- ═══════════════════════════════════════ -->
<!-- APPLICATION SCRIPT                     -->
<!-- ═══════════════════════════════════════ -->
<script>
// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
var _employes = {};
var _objectifs = {};
var _currentObjId = null;
var COLORS = ['#059669','#3b82f6','#8b5cf6','#f59e0b','#ef4444','#14b8a6','#6366f1','#ec4899'];

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
window.initApp = async function(){
  await loadEmployes();
  await loadObjectifs();
  populateEmpFilter();
  renderObjGrid();
  renderKPIs();
  // Deep link : ?objId=xxx
  var p = new URLSearchParams(location.search);
  if(p.get('objId') && _objectifs[p.get('objId')]){
    openDetail(p.get('objId'));
  }
  // Deep link : ?empId=xxx&create=1 (depuis fiche salarié)
  if(p.get('empId') && p.get('create')){
    openCreateModal(p.get('empId'));
  }
};

// ═══════════════════════════════════════════
//  LOAD DATA
// ═══════════════════════════════════════════
async function loadEmployes(){
  if(!window._uid)return;
  try{
    var snap=await window._getDocs(window._collection(window._db,'rh',window._uid,'employes'));
    _employes={};
    snap.forEach(function(d){_employes[d.id]=Object.assign({id:d.id},d.data());});
  }catch(e){console.warn('loadEmployes',e);}
}

async function loadObjectifs(){
  if(!window._uid)return;
  try{
    var snap=await window._getDocs(window._collection(window._db,'rh',window._uid,'objectifs'));
    _objectifs={};
    snap.forEach(function(d){_objectifs[d.id]=Object.assign({id:d.id},d.data());});
  }catch(e){console.warn('loadObjectifs',e);}
}

function populateEmpFilter(){
  var sel=document.getElementById('f-emp');
  sel.innerHTML='<option value="">Tous les employés</option>';
  Object.values(_employes).sort(function(a,b){return(a.prenom||'').localeCompare(b.prenom||'');}).forEach(function(e){
    if(e.statut==='inactif')return;
    sel.innerHTML+='<option value="'+e.id+'">'+(e.prenom||'')+' '+(e.nom||'')+'</option>';
  });
}

// ═══════════════════════════════════════════
//  CALCULS
// ═══════════════════════════════════════════
function calcAvancementGlobal(obj){
  var criteres=obj.criteres||[];
  if(criteres.length===0)return 0;
  var totalPoids=0, totalAvance=0;
  criteres.forEach(function(c){
    var poids=parseFloat(c.poids)||0;
    var cible=parseFloat(c.cible)||0;
    var avancement=parseFloat(c.avancement)||0;
    if(cible<=0){totalPoids+=poids;return;}
    var pct=Math.min(avancement/cible*100,150); // cap 150%
    totalAvance+=pct*poids;
    totalPoids+=poids;
  });
  return totalPoids>0?totalAvance/totalPoids:0;
}

function calcPrimeAcquise(obj){
  var prime=obj.prime||{};
  var montant=parseFloat(prime.montantBrut)||0;
  var mode=prime.modePalier||'tout_ou_rien';
  var avGlobal=calcAvancementGlobal(obj);

  // Si mode pct_salaire → calculer montant
  if(prime.mode==='pct_salaire'){
    var emp=_employes[obj.employeId];
    if(emp){
      var salaire=parseFloat(emp.salaireBrut)||0;
      montant=salaire*(parseFloat(prime.montantBrut)||0)/100;
    }
  }

  if(mode==='tout_ou_rien'){
    return avGlobal>=100?montant:0;
  }
  if(mode==='proportionnel'){
    return montant*Math.min(avGlobal,100)/100;
  }
  if(mode==='paliers'){
    var paliers=(prime.paliers||[]).slice().sort(function(a,b){return(parseFloat(b.seuil)||0)-(parseFloat(a.seuil)||0);});
    for(var i=0;i<paliers.length;i++){
      if(avGlobal>=(parseFloat(paliers[i].seuil)||0)){
        return montant*(parseFloat(paliers[i].primePct)||0)/100;
      }
    }
    return 0;
  }
  return 0;
}

function calcCoutEmployeur(obj){
  var primeAcq=calcPrimeAcquise(obj);
  var taux=parseFloat((obj.prime||{}).tauxCharges)||45;
  return primeAcq*(1+taux/100);
}

function getStatutAuto(obj){
  if(obj.statut==='annule'||obj.statut==='brouillon')return obj.statut;
  // Vérifier si la date de fin est passée
  var now=new Date();
  var fin=obj.dateFin?new Date(obj.dateFin):null;
  var av=calcAvancementGlobal(obj);
  if(fin && now>fin){
    if(av>=100)return 'atteint';
    if(av>=50)return 'partiel';
    return 'non_atteint';
  }
  if(av>=100)return 'atteint';
  return 'en_cours';
}

// ═══════════════════════════════════════════
//  GARDE-FOUS CONFORMITÉ (automatiques)
// ═══════════════════════════════════════════
function checkGardeFous(obj){
  var alertes=[];
  // 1. Égalité de traitement
  if(obj.type==='individuel' && obj.employeId){
    var emp=_employes[obj.employeId];
    if(emp){
      var memeCat=Object.values(_employes).filter(function(e){
        return e.id!==emp.id && e.statut!=='inactif' && e.poste && emp.poste && e.poste.toLowerCase()===emp.poste.toLowerCase();
      });
      if(memeCat.length>0){
        var autresAvecObj=memeCat.filter(function(e){
          return Object.values(_objectifs).some(function(o){return o.employeId===e.id && o.statut!=='annule';});
        });
        if(autresAvecObj.length<memeCat.length){
          alertes.push({type:'warn',icon:'⚖️',msg:'<b>Égalité de traitement</b> — '+memeCat.length+' autre(s) salarié(s) au même poste ('+emp.poste+') n\'ont pas d\'objectif similaire. Assurez-vous que cette prime ne crée pas de discrimination.'});
        }
      }
    }
  }

  // 2. Risque d'usage (prime exceptionnelle récurrente)
  if(obj.type==='exceptionnel' && obj.employeId){
    var nbExcept=Object.values(_objectifs).filter(function(o){
      return o.type==='exceptionnel' && o.employeId===obj.employeId && o.statut!=='annule';
    }).length;
    if(nbExcept>=3){
      alertes.push({type:'danger',icon:'🔄',msg:'<b>Risque d\'usage</b> — Ce salarié a déjà '+nbExcept+' primes exceptionnelles. Au-delà de 3 occurrences, la prime peut être requalifiée en avantage acquis et devenir obligatoire.'});
    }
  }

  // 3. Critères flous
  var criteres=obj.criteres||[];
  var flouCount=criteres.filter(function(c){return !c.cible || parseFloat(c.cible)<=0;}).length;
  if(flouCount>0){
    alertes.push({type:'warn',icon:'📝',msg:'<b>Critères non mesurables</b> — '+flouCount+' critère(s) sans valeur cible. Les objectifs doivent être objectifs et vérifiables pour être juridiquement opposables.'});
  }

  // 4. Prime > 10% salaire annuel
  if(obj.employeId){
    var emp2=_employes[obj.employeId];
    if(emp2 && emp2.salaireBrut){
      var salAnnuel=(parseFloat(emp2.salaireBrut)||0)*12;
      var primeBrut=parseFloat((obj.prime||{}).montantBrut)||0;
      if((obj.prime||{}).mode==='pct_salaire') primeBrut=(parseFloat(emp2.salaireBrut)||0)*primeBrut/100;
      if(salAnnuel>0 && primeBrut>salAnnuel*0.1){
        alertes.push({type:'info',icon:'💰',msg:'<b>Prime significative</b> — La prime représente '+((primeBrut/salAnnuel*100).toFixed(1))+'% du salaire annuel brut. Vérifiez que ce montant est justifié par les objectifs fixés.'});
      }
    }
  }

  // 5. Prime collective : rappel
  if(obj.type==='equipe'){
    alertes.push({type:'info',icon:'👥',msg:'<b>Prime collective</b> — Une prime d\'équipe doit bénéficier à tous les membres concernés selon des critères objectifs et identiques. Documentez les critères de répartition.'});
  }

  return alertes;
}

// ═══════════════════════════════════════════
//  RENDER KPIs
// ═══════════════════════════════════════════
function renderKPIs(){
  var objs=Object.values(_objectifs);
  var enCours=objs.filter(function(o){return getStatutAuto(o)==='en_cours';});
  var avecAvancement=objs.filter(function(o){return o.statut!=='annule'&&o.statut!=='brouillon';});
  var moyAtteinte=0;
  if(avecAvancement.length>0){
    moyAtteinte=avecAvancement.reduce(function(s,o){return s+calcAvancementGlobal(o);},0)/avecAvancement.length;
  }
  var totalPrimes=0, totalCout=0;
  objs.forEach(function(o){
    if(o.statut==='annule')return;
    var p=calcPrimeAcquise(o);
    totalPrimes+=p;
    totalCout+=calcCoutEmployeur(o);
  });

  document.getElementById('kpi-encours').textContent=enCours.length;
  document.getElementById('kpi-encours-sub').textContent=objs.length+' objectif(s) au total';
  document.getElementById('kpi-atteinte').textContent=moyAtteinte.toFixed(0)+'%';
  document.getElementById('kpi-atteinte').className='kpi-val '+(moyAtteinte>=80?'green':moyAtteinte>=50?'orange':'red');
  document.getElementById('kpi-atteinte-sub').textContent='sur '+avecAvancement.length+' objectif(s) actifs';
  document.getElementById('kpi-primes').textContent=fmtE(totalPrimes);
  document.getElementById('kpi-cout').textContent=fmtE(totalCout);
  document.getElementById('kpi-cout-sub').textContent='charges patronales incluses';
}

// ═══════════════════════════════════════════
//  RENDER GRID
// ═══════════════════════════════════════════
function renderObjGrid(){
  var container=document.getElementById('obj-container');
  var objs=Object.values(_objectifs);

  // Filtres
  var search=(document.getElementById('search-obj').value||'').toLowerCase();
  var fType=document.getElementById('f-type').value;
  var fStatut=document.getElementById('f-statut').value;
  var fPeriode=document.getElementById('f-periode').value;
  var fEmp=document.getElementById('f-emp').value;

  objs=objs.filter(function(o){
    if(fType && o.type!==fType)return false;
    if(fStatut && getStatutAuto(o)!==fStatut)return false;
    if(fPeriode && o.periodicite!==fPeriode)return false;
    if(fEmp){
      if(o.type==='equipe'){
        if(!(o.employeIds||[]).includes(fEmp))return false;
      } else {
        if(o.employeId!==fEmp)return false;
      }
    }
    if(search){
      var empNom='';
      if(o.employeId && _employes[o.employeId]) empNom=(_employes[o.employeId].prenom||'')+' '+(_employes[o.employeId].nom||'');
      var haystack=(o.titre||'')+' '+(o.description||'')+' '+empNom;
      if(!haystack.toLowerCase().includes(search))return false;
    }
    return true;
  });

  // Tri : en cours d'abord, puis par date de fin
  objs.sort(function(a,b){
    var sa=getStatutAuto(a)==='en_cours'?0:1;
    var sb=getStatutAuto(b)==='en_cours'?0:1;
    if(sa!==sb)return sa-sb;
    return(b.dateFin||'').localeCompare(a.dateFin||'');
  });

  if(objs.length===0){
    container.innerHTML='<div class="empty-state"><div class="empty-icon">🎯</div><h3 style="font-size:16px;font-weight:700;margin-bottom:8px">Aucun objectif</h3><p style="font-size:13px;line-height:1.7;max-width:320px">Créez votre premier objectif pour commencer à suivre les performances de vos collaborateurs et calculer l\'impact des primes.</p><button class="btn btn-rh" style="margin-top:16px" onclick="openCreateModal()">+ Créer un objectif</button></div>';
    return;
  }

  var html='<div class="obj-grid">';
  objs.forEach(function(o){
    var statut=getStatutAuto(o);
    var av=calcAvancementGlobal(o);
    var primeAcq=calcPrimeAcquise(o);
    var coutEmp=calcCoutEmployeur(o);
    var barColor=av>=100?'#10b981':av>=60?'#f59e0b':'#ef4444';
    var typeLabels={individuel:'👤 Individuel',equipe:'👥 Équipe',exceptionnel:'⭐ Exceptionnel'};
    var statutLabels={brouillon:'📝 Brouillon',en_cours:'🟢 En cours',atteint:'✅ Atteint',partiel:'🟡 Partiel',non_atteint:'❌ Non atteint',annule:'🚫 Annulé'};
    var periodeLabels={mensuel:'Mensuel',trimestriel:'Trimestriel',annuel:'Annuel',libre:'Libre'};

    // Employé(s)
    var empHtml='';
    if(o.type==='equipe' && o.employeIds){
      empHtml='<div class="obj-card-emp">';
      o.employeIds.slice(0,3).forEach(function(eid){
        var e=_employes[eid];
        if(!e)return;
        var color=COLORS[Math.abs(hashCode(eid))%COLORS.length];
        empHtml+='<div class="obj-card-emp-av" style="background:'+color+'" title="'+(e.prenom||'')+' '+(e.nom||'')+'">'+(e.prenom||'?')[0]+'</div>';
      });
      if(o.employeIds.length>3) empHtml+='<span style="font-size:10px;color:var(--muted)">+'+((o.employeIds.length-3))+'</span>';
      empHtml+='<span class="obj-card-emp-name">'+o.employeIds.length+' membres</span></div>';
    } else if(o.employeId){
      var e=_employes[o.employeId];
      if(e){
        var color=COLORS[Math.abs(hashCode(o.employeId))%COLORS.length];
        empHtml='<div class="obj-card-emp"><div class="obj-card-emp-av" style="background:'+color+'">'+(e.prenom||'?')[0]+'</div><span class="obj-card-emp-name">'+(e.prenom||'')+' '+(e.nom||'')+'</span></div>';
      }
    }

    html+='<div class="obj-card'+(o.id===_currentObjId?' active':'')+'" onclick="openDetail(\''+o.id+'\')">';
    html+='<div class="obj-card-head"><div class="obj-card-title">'+esc(o.titre||'Sans titre')+'</div></div>';
    html+='<div class="obj-card-badges"><span class="badge badge-'+o.type+'">'+(typeLabels[o.type]||o.type)+'</span><span class="badge badge-'+statut+'">'+(statutLabels[statut]||statut)+'</span><span class="badge badge-'+(o.periodicite||'libre')+'">'+(periodeLabels[o.periodicite]||'Libre')+'</span></div>';
    html+=empHtml;
    // Progress
    html+='<div class="progress-wrap"><div class="progress-bar-bg"><div class="progress-bar-fill" style="width:'+Math.min(av,100)+'%;background:'+barColor+'"></div></div><div class="progress-labels"><span class="progress-pct" style="color:'+barColor+'">'+av.toFixed(0)+'%</span><span class="progress-target">'+(o.dateFin?fmtDateShort(o.dateFin):'—')+'</span></div></div>';
    // Prime
    if((o.prime||{}).montantBrut){
      html+='<div class="prime-line"><span class="prime-label">Prime acquise / max</span><span class="prime-val '+(primeAcq>0?'green':'')+'">'+fmtE(primeAcq)+' / '+fmtE(parseFloat(o.prime.montantBrut)||0)+'</span></div>';
      html+='<div style="display:flex;justify-content:space-between;margin-top:4px;font-size:10px;color:var(--muted)"><span>Coût employeur</span><span style="font-weight:700;color:var(--red)">'+fmtE(coutEmp)+'</span></div>';
    }
    html+='</div>';
  });
  html+='</div>';
  container.innerHTML=html;
  renderKPIs();
}

// ═══════════════════════════════════════════
//  DETAIL PANEL
// ═══════════════════════════════════════════
function openDetail(id){
  _currentObjId=id;
  var obj=_objectifs[id];
  if(!obj)return;
  renderObjGrid(); // highlight
  renderDetailPanel(obj);
  document.getElementById('detail-overlay').classList.add('show');
}

function closeDetail(){
  document.getElementById('detail-overlay').classList.remove('show');
  _currentObjId=null;
  renderObjGrid();

function calcSimPrime(obj,avSimule){
  var prime=obj.prime||{};
  var montant=parseFloat(prime.montantBrut)||0;
  if(prime.mode==='pct_salaire' && obj.employeId){
    var emp=_employes[obj.employeId];
    if(emp) montant=(parseFloat(emp.salaireBrut)||0)*montant/100;
  }
  var taux=parseFloat(prime.tauxCharges)||45;
  var mode=prime.modePalier||'tout_ou_rien';
  var brut=0;
  if(mode==='tout_ou_rien') brut=avSimule>=100?montant:0;
  else if(mode==='proportionnel') brut=montant*Math.min(avSimule,100)/100;
  else if(mode==='paliers'){
    var paliers=(prime.paliers||[]).slice().sort(function(a,b){return(parseFloat(b.seuil)||0)-(parseFloat(a.seuil)||0);});
    for(var i=0;i<paliers.length;i++){
      if(avSimule>=(parseFloat(paliers[i].seuil)||0)){brut=montant*(parseFloat(paliers[i].primePct)||0)/100;break;}
    }
  }
  return brut*(1+taux/100);
}

function updateCritAvancement(objId,idx,val){
  if(!_objectifs[objId])return;
  if(!_objectifs[objId].criteres[idx])return;
  _objectifs[objId].criteres[idx].avancement=val.replace(',','.');
  // Debounce save
  clearTimeout(window._avSaveTimer);
  window._avSaveTimer=setTimeout(function(){
    saveObjectif(objId);
    renderDetailPanel(_objectifs[objId]);
  },800);
}

async function setStatut(id,statut){
  if(!_objectifs[id])return;
  _objectifs[id].statut=statut;
  _objectifs[id].updatedAt=new Date().toISOString();
  await saveObjectifToFirestore(id);
  renderDetailPanel(_objectifs[id]);
  renderObjGrid();
  showToast('Statut mis à jour','success');
}

function setPalierMode(m){
  window._createPalierMode=m;
  ['tout_ou_rien','proportionnel','paliers'].forEach(function(k){
    var b=document.getElementById('palier-btn-'+k);
    if(b){b.style.background=k===m?'var(--rh-ghost)':'white';b.style.color=k===m?'var(--rh-main)':'var(--muted)';b.style.borderColor=k===m?'var(--rh-main)':'var(--border)';}
  });
  var sec=document.getElementById('paliers-section');

  updateSimulateur();

function updateSimulateur(){
  var montant=pf(gv('c-prime-montant'));
  var taux=parseFloat(gv('c-prime-taux'))||45;
  var mode=window._createPalierMode||'tout_ou_rien';
  var grid=document.getElementById('sim-create-grid');
  if(!grid)return;

  function simCost(avPct){
    var brut=0;
    if(mode==='tout_ou_rien') brut=avPct>=100?montant:0;
    else if(mode==='proportionnel') brut=montant*Math.min(avPct,100)/100;
    else if(mode==='paliers'){
      var rows=document.querySelectorAll('#palier-rows .palier-row');
      var paliers=[];
      rows.forEach(function(r){
        var inputs=r.querySelectorAll('input[type=number]');
        if(inputs.length>=2) paliers.push({seuil:parseFloat(inputs[0].value)||0,primePct:parseFloat(inputs[1].value)||0});
      });
      paliers.sort(function(a,b){return b.seuil-a.seuil;});
      for(var i=0;i<paliers.length;i++){
        if(avPct>=paliers[i].seuil){brut=montant*paliers[i].primePct/100;break;}
      }
    }
    return brut*(1+taux/100);
  }

  grid.innerHTML='<div class="sim-item"><div class="sim-item-label">Si 100% atteint</div><div class="sim-item-val green">'+fmtE(simCost(100))+'</div><div class="sim-item-sub">coût chargé employeur</div></div>'
    +'<div class="sim-item"><div class="sim-item-label">Si 80% atteint</div><div class="sim-item-val orange">'+fmtE(simCost(80))+'</div><div class="sim-item-sub">coût chargé employeur</div></div>'
    +'<div class="sim-item"><div class="sim-item-label">Si 50% atteint</div><div class="sim-item-val red">'+fmtE(simCost(50))+'</div><div class="sim-item-sub">coût chargé employeur</div></div>';
}

function _collectFormObj(){
  var type=window._createObjType||'individuel';
  var employeId='';var employeIds=[];
  if(type==='equipe'){
    document.querySelectorAll('#equipe-checkboxes input[type=checkbox]:checked').forEach(function(cb){employeIds.push(cb.value);});
  } else {
    employeId=gv('c-employeId');
  }
  // Recueillir critères
  var critRows=document.querySelectorAll('#crit-rows .crit-row');
  var criteres=[];
  critRows.forEach(function(r){
    var inputs=r.querySelectorAll('input');
    var sel=r.querySelector('select');
    if(inputs[0] && inputs[0].value){
      criteres.push({label:inputs[0].value,cible:inputs[1]?inputs[1].value.replace(',','.'):'',unite:sel?sel.value:'€',poids:parseFloat(inputs[2]?inputs[2].value:0)||0});
    }
  });
  return {
    type:type,titre:gv('c-titre'),description:gv('c-description'),
    employeId:employeId,employeIds:employeIds,
    periodicite:gv('c-periodicite'),dateDebut:gv('c-dateDebut'),dateFin:gv('c-dateFin'),
    criteres:criteres,
    prime:{
      montantBrut:gv('c-prime-montant').replace(',','.'),
      mode:gv('c-prime-mode'),
      modePalier:window._createPalierMode||'tout_ou_rien',
      tauxCharges:parseFloat(gv('c-prime-taux'))||45
    },
    statut:'brouillon'
  };
}

function updateCreateAlertes(){
  var container=document.getElementById('create-alertes-live');
  if(!container)return;
  var obj=_collectFormObj();
  // Pas assez d'infos → message par défaut
  if(!obj.titre && !obj.employeId && !(obj.employeIds||[]).length && !obj.prime.montantBrut){
    container.innerHTML='<div style="font-size:11px;color:var(--muted)">Remplissez le formulaire pour voir les alertes de conformité...</div>';
    return;
  }
  var alertes=checkGardeFous(obj);
  if(alertes.length===0){
    container.innerHTML='<div class="alerte-box ok"><span class="alerte-icon">✅</span><div><b>Aucune alerte détectée</b> — L\'objectif semble conforme aux règles générales. Nous recommandons tout de même une vérification CCN via l\'IA avant validation.</div></div>';
    return;
  }
  var html='';
  alertes.forEach(function(a){
    html+='<div class="alerte-box '+a.type+'"><span class="alerte-icon">'+a.icon+'</span><div>'+a.msg+'</div></div>';
  });
  container.innerHTML=html;
}

async function checkConformiteIAFromForm(){
  var container=document.getElementById('create-ia-result');

  if(!obj.titre){showToast('Renseignez au moins le titre','error');return;}

  }

  try{

async function submitObjectif(existingId){
  var titre=gv('c-titre');
  if(!titre){showToast('Titre obligatoire','error');return;}

  // Recueillir critères
  var critRows=document.querySelectorAll('#crit-rows .crit-row');
  var criteres=[];
  critRows.forEach(function(r){
    var inputs=r.querySelectorAll('input');
    var sel=r.querySelector('select');
    if(inputs[0].value){
      criteres.push({label:inputs[0].value,cible:inputs[1].value.replace(',','.'),unite:sel?sel.value:'€',poids:parseFloat(inputs[2].value)||0,avancement:''});
    }
  });

  // Recueillir paliers
  var palierRows=document.querySelectorAll('#palier-rows .palier-row');
  var paliers=[];
  palierRows.forEach(function(r){
    var inputs=r.querySelectorAll('input[type=number]');
    if(inputs.length>=2) paliers.push({seuil:parseFloat(inputs[0].value)||0,primePct:parseFloat(inputs[1].value)||0});
  });

  // Employé(s)
  var type=window._createObjType||'individuel';
  var employeId='',employeIds=[];
  if(type==='equipe'){
    document.querySelectorAll('#equipe-checkboxes input[type=checkbox]:checked').forEach(function(cb){employeIds.push(cb.value);});
  } else {
    var sel=document.getElementById('c-employeId');
    if(sel) employeId=sel.value;
  }

  var obj={
    type:type,
    titre:titre,
    description:gv('c-description'),
    employeId:employeId,
    employeIds:employeIds,
    periodicite:gv('c-periodicite'),
    dateDebut:gv('c-dateDebut'),
    dateFin:gv('c-dateFin'),
    criteres:criteres,
    prime:{
      montantBrut:gv('c-prime-montant').replace(',','.'),
      mode:gv('c-prime-mode'),
      modePalier:window._createPalierMode||'tout_ou_rien',
      paliers:paliers,
      tauxCharges:parseFloat(gv('c-prime-taux'))||45
    },
    statut:existingId?(_objectifs[existingId].statut||'brouillon'):'brouillon',
    conformite:{verifie:false,alertes:[],ccnCheck:null},
    updatedAt:new Date().toISOString()
  };

  if(!existingId) obj.createdAt=new Date().toISOString();
  else {
    obj.createdAt=_objectifs[existingId].createdAt||new Date().toISOString();
    // Conserver avancements existants
    if(_objectifs[existingId].criteres){
      obj.criteres.forEach(function(nc,i){
        var old=(_objectifs[existingId].criteres||[])[i];
        if(old && old.label===nc.label) nc.avancement=old.avancement||'';
      });
    }
  }

  try{
    if(existingId){
      await window._setDoc(window._doc(window._db,'rh',window._uid,'objectifs',existingId),obj);
      _objectifs[existingId]=Object.assign({id:existingId},obj);
      syncObjPublic(existingId, obj);
    } else {
      var ref=await window._addDoc(window._collection(window._db,'rh',window._uid,'objectifs'),obj);
      obj.id=ref.id;
      _objectifs[ref.id]=obj;
      syncObjPublic(ref.id, obj);
    }
    closeDetail();
    renderObjGrid();
    showToast(existingId?'Objectif mis à jour':'Objectif créé !','success');
  }catch(e){showToast('Erreur : '+e.message,'error');console.error(e);}
}

async function saveObjectif(id){
  await saveObjectifToFirestore(id);
  renderObjGrid();
  showToast('Sauvegardé','success');
}

async function saveObjectifToFirestore(id){
  if(!_objectifs[id]||!window._uid)return;
  var obj=Object.assign({},_objectifs[id]);
  delete obj.id;
  obj.updatedAt=new Date().toISOString();
  await window._setDoc(window._doc(window._db,'rh',window._uid,'objectifs',id),obj);
  // Sync vers collection publique (portail salarié)
  syncObjPublic(id, obj);
}

async function deleteObjectif(id){
  if(!confirm('Supprimer cet objectif ?'))return;
  try{
    await window._deleteDoc(window._doc(window._db,'rh',window._uid,'objectifs',id));
    // Supprimer aussi de la collection publique
    try{await window._deleteDoc(window._doc(window._db,'rh_objectifs_public',window._uid,'items',id));}catch(e){}
    delete _objectifs[id];
    closeDetail();
    renderObjGrid();
    showToast('Objectif supprimé','success');
  }catch(e){showToast('Erreur','error');}
}

// Sync vers rh_objectifs_public/{uid}/items/{id} (lecture publique pour espace salarié)
async function syncObjPublic(id, obj){
  if(!window._uid)return;
  try{
    // Ne publier que les objectifs non-brouillon
    if(obj.statut==='brouillon'){
      try{await window._deleteDoc(window._doc(window._db,'rh_objectifs_public',window._uid,'items',id));}catch(e){}
      return;
    }
    // Version publique allégée (sans données sensibles de conformité IA)
    var pub={
      titre:obj.titre||'', description:obj.description||'',
      type:obj.type||'individuel', periodicite:obj.periodicite||'',
      employeId:obj.employeId||'', employeIds:obj.employeIds||[],
      dateDebut:obj.dateDebut||'', dateFin:obj.dateFin||'',
      criteres:(obj.criteres||[]).map(function(c){return{label:c.label,cible:c.cible,unite:c.unite,poids:c.poids,avancement:c.avancement};}),
      prime:{montantBrut:(obj.prime||{}).montantBrut||'',mode:(obj.prime||{}).mode||'fixe',modePalier:(obj.prime||{}).modePalier||'tout_ou_rien',paliers:(obj.prime||{}).paliers||[]},
      statut:obj.statut||'en_cours',
      updatedAt:obj.updatedAt||new Date().toISOString()
    };
    await window._setDoc(window._doc(window._db,'rh_objectifs_public',window._uid,'items',id),pub);
  }catch(e){console.warn('syncObjPublic',e);}
}

async function checkConformiteIA(id){
  var obj=_objectifs[id];
  if(!obj)return;
  var container=document.getElementById('ia-result-'+id);
  if(!container)return;
  container.innerHTML='<div style="padding:16px;text-align:center;background:linear-gradient(135deg,#f5f3ff,#eff6ff);border:1.5px solid #c7d2fe;border-radius:10px;margin-top:10px"><div class="spin" style="margin:0 auto 10px"></div><div style="font-size:12px;font-weight:700;color:var(--purple)">Analyse en cours...</div><div style="font-size:11px;color:var(--muted);margin-top:4px">Vérification Code du travail et CCN applicable</div></div>';

  // Récupérer CCN du salarié
  var ccn='';
  if(obj.employeId && _employes[obj.employeId]){
    ccn=_employes[obj.employeId].ccn||'';
  }

  try{
    var token=await window._auth.currentUser.getIdToken();
    var resp=await fetch('/api/check-prime-conformite',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
      body:JSON.stringify({objectif:obj,ccn:ccn,employe:_employes[obj.employeId]||null})
    });
    var data=await resp.json();
    if(data.error){
      container.innerHTML='<div class="alerte-box danger"><span class="alerte-icon">❌</span><div>'+esc(data.error)+'</div></div>';
      return;
    }
    container.innerHTML='<div class="ia-result" style="margin-top:12px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #e2e8f0"><span style="font-size:18px">🤖</span><div><div style="font-size:13px;font-weight:700;color:var(--purple)">Analyse de conformité</div><div style="font-size:10px;color:var(--muted)">Généré le '+new Date().toLocaleDateString('fr-FR')+' · Claude IA</div></div></div>'+sanitizeIA(data.analyse||'Aucun résultat')+'</div>';
    // Sauvegarder dans l'objectif
    _objectifs[id].conformite={verifie:true,alertes:checkGardeFous(obj).map(function(a){return a.msg;}),ccnCheck:{resultat:data.analyse||'',date:new Date().toISOString()}};
    saveObjectifToFirestore(id);
  }catch(e){
    container.innerHTML='<div class="alerte-box danger"><span class="alerte-icon">❌</span><div>Erreur réseau : '+esc(e.message)+'</div></div>';
  }
}

// ═══════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════
function fmtE(n){return(parseFloat(n)||0).toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2})+' €';}
function fmtDateShort(d){if(!d)return'—';try{var dt=new Date(d);return dt.toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'});}catch(e){return d;}}
function pf(v){return parseFloat(String(v||'0').replace(',','.'))||0;}
function gv(id){var el=document.getElementById(id);return el?el.value:'';}
function esc(s){if(!s)return'';var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function sanitizeIA(raw){
  if(!raw)return'<p style="color:var(--muted)">Aucun résultat</p>';
  var html=raw;
  // Détecter si c'est du markdown (##, **, ---, |---|)
  var isMarkdown=/^#{1,4}\s|^\*\*|\n#{1,4}\s|\n---\n|\|---/.test(raw);
  if(isMarkdown){
    html=mdToHtml(raw);
  }
  // Supprimer balises dangereuses
  html=html.replace(/<script[\s\S]*?<\/script>/gi,'').replace(/<iframe[\s\S]*?<\/iframe>/gi,'').replace(/<style[\s\S]*?<\/style>/gi,'').replace(/on\w+="[^"]*"/gi,'').replace(/on\w+='[^']*'/gi,'');
  html=html.replace(/^```html\s*/i,'').replace(/```\s*$/,'').replace(/```/g,'');
  return html;
}

function mdToHtml(md){
  var lines=md.split('\n');
  var html='';
  var inList=false;
  var inTable=false;
  var tableRows=[];

  for(var i=0;i<lines.length;i++){
    var line=lines[i];
    var trimmed=line.trim();

    // Séparateur
    if(/^---+$/.test(trimmed)){
      if(inList){html+='</ul>';inList=false;}
      if(inTable){html+=renderMdTable(tableRows);inTable=false;tableRows=[];}
      html+='<hr style="border:none;border-top:1px solid #e2e8f0;margin:12px 0"/>';
      continue;
    }

    // Table
    if(trimmed.indexOf('|')>=0 && trimmed.indexOf('|')!==trimmed.lastIndexOf('|')){
      if(inList){html+='</ul>';inList=false;}
      if(/^\|[\s-:|]+\|$/.test(trimmed)) continue; // separator row
      tableRows.push(trimmed);
      inTable=true;
      // Check if next line is NOT a table row
      if(i+1>=lines.length || (lines[i+1].trim().indexOf('|')<0 || lines[i+1].trim().indexOf('|')===lines[i+1].trim().lastIndexOf('|'))){
        html+=renderMdTable(tableRows);
        inTable=false;tableRows=[];
      }
      continue;
    }
    if(inTable){html+=renderMdTable(tableRows);inTable=false;tableRows=[];}

    // Titres
    if(/^####\s/.test(trimmed)){
      if(inList){html+='</ul>';inList=false;}
      html+='<div style="font-size:11px;font-weight:700;color:var(--muted);margin:10px 0 4px">'+inline(trimmed.replace(/^####\s+/,''))+'</div>';
      continue;
    }
    if(/^###\s/.test(trimmed)){
      if(inList){html+='</ul>';inList=false;}
      var title=trimmed.replace(/^###\s+/,'');
      // Détecter les émojis de type d'alerte
      var alertStyle=detectAlertStyle(title);
      if(alertStyle){
        html+='<div style="'+alertStyle.bg+';border:1px solid '+alertStyle.border+';border-radius:8px;padding:10px 12px;margin:8px 0;font-size:12px;color:'+alertStyle.color+'"><strong>'+inline(title)+'</strong></div>';
      } else {
        html+='<div style="font-size:12px;font-weight:700;color:#1a1f36;margin:14px 0 6px;padding:8px 12px;background:rgba(248,250,255,0.6);border-left:3px solid #6366f1;border-radius:0 6px 6px 0">'+inline(title)+'</div>';
      }
      continue;
    }
    if(/^##\s/.test(trimmed)){
      if(inList){html+='</ul>';inList=false;}
      html+='<div style="font-size:13px;font-weight:800;color:#1a1f36;margin:16px 0 8px;padding:10px 14px;background:linear-gradient(135deg,#f5f3ff,#eff6ff);border-radius:8px;border-left:3px solid #6366f1">'+inline(trimmed.replace(/^##\s+/,''))+'</div>';
      continue;
    }
    if(/^#\s/.test(trimmed)){
      if(inList){html+='</ul>';inList=false;}
      html+='<div style="font-size:14px;font-weight:800;color:var(--purple);margin:16px 0 8px">'+inline(trimmed.replace(/^#\s+/,''))+'</div>';
      continue;
    }

    // Liste
    if(/^[-*]\s/.test(trimmed)){
      if(!inList){html+='<ul style="margin:4px 0 10px 4px;padding-left:14px;list-style:none">';inList=true;}
      var content=trimmed.replace(/^[-*]\s+/,'');
      // Détecter alertes dans les items
      var itemAlert=detectAlertStyle(content);
      if(itemAlert){
        html+='<li style="margin-bottom:6px;padding:8px 10px;background:'+itemAlert.bg+';border:1px solid '+itemAlert.border+';border-radius:6px;color:'+itemAlert.color+';font-size:11px;list-style:none">'+inline(content)+'</li>';
      } else {
        html+='<li style="margin-bottom:4px;font-size:12px;line-height:1.5;position:relative;padding-left:12px"><span style="position:absolute;left:0;color:#6366f1">•</span>'+inline(content)+'</li>';
      }
      continue;
    }
    if(inList && !trimmed){html+='</ul>';inList=false;continue;}
    if(inList && !/^[-*]\s/.test(trimmed)){html+='</ul>';inList=false;}

    // Ligne vide
    if(!trimmed){continue;}

    // Paragraphe
    // Détecter si c'est une alerte
    var paraAlert=detectAlertStyle(trimmed);
    if(paraAlert){
      html+='<div style="background:'+paraAlert.bg+';border:1px solid '+paraAlert.border+';border-radius:8px;padding:10px 12px;margin:6px 0;font-size:12px;color:'+paraAlert.color+';line-height:1.6">'+inline(trimmed)+'</div>';
    } else {
      html+='<p style="margin:0 0 8px;font-size:12px;line-height:1.6;color:#1a1f36">'+inline(trimmed)+'</p>';
    }
  }
  if(inList) html+='</ul>';
  if(inTable) html+=renderMdTable(tableRows);
  return html;
}

function inline(s){
  // Bold
  s=s.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  // Italic
  s=s.replace(/\*([^*]+)\*/g,'<em style="color:var(--muted)">$1</em>');
  // Code
  s=s.replace(/`([^`]+)`/g,'<code style="background:#f1f5f9;padding:1px 5px;border-radius:4px;font-size:11px">$1</code>');
  // Emojis → colored
  return s;
}

function detectAlertStyle(text){
  var t=text.toLowerCase();
  if(/🔴|❌|risque\s*(majeur|critique|élevé)|danger|problème\s*majeur/.test(t))
    return{bg:'#fee2e2',border:'#fca5a5',color:'#991b1b'};
  if(/⚠️|🟡|risque\s*(modéré|moyen)|attention|à\s*vérifier|points?\s*à\s*vérifier/.test(t))
    return{bg:'#fef3c7',border:'#fcd34d',color:'#92400e'};
  if(/✅|🟢|conforme|point[s]?\s*conforme/.test(t))
    return{bg:'#d1fae5',border:'#6ee7b7',color:'#065f46'};
  if(/💡|recommand|action\s*requise|suggestion/.test(t))
    return{bg:'#eff6ff',border:'#bfdbfe',color:'#1e40af'};
  return null;
}

function renderMdTable(rows){
  if(rows.length===0)return'';
  var html='<table style="width:100%;border-collapse:collapse;margin:8px 0;font-size:11px;border-radius:8px;overflow:hidden">';
  rows.forEach(function(row,idx){
    var cells=row.replace(/^\||\|$/g,'').split('|').map(function(c){return c.trim();});
    var tag=idx===0?'th':'td';
    var bgStyle=idx===0?'background:#f0f4ff;font-weight:700;font-size:10px;color:var(--purple);text-transform:uppercase;letter-spacing:.3px':'';
    html+='<tr>';
    cells.forEach(function(c){
      html+='<'+tag+' style="padding:7px 10px;border-bottom:1px solid #e2e8f0;text-align:left;'+bgStyle+'">'+inline(c)+'</'+tag+'>';
    });
    html+='</tr>';
  });
  html+='</table>';
  return html;
}
function todayISO(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function hashCode(s){var h=0;for(var i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;}return h;}
function showToast(msg,type){var t=document.getElementById('toast');t.textContent=msg;t.className='toast show '+(type||'');setTimeout(function(){t.className='toast';},3200);}
