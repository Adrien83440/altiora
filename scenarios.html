<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{

  --text:#0f172a;--muted:#64748b;--border:rgba(0,0,0,0.06);--bg:#f9fafb;--radius:18px;
      --glass-bg:rgba(255,255,255,0.6);--glass-bg-heavy:rgba(255,255,255,0.7);
      --glass-border:rgba(0,0,0,0.06);--glass-border-top:rgba(255,255,255,0.9);
      --glass-shine:linear-gradient(135deg,rgba(255,255,255,0.5) 0%,rgba(255,255,255,0.05) 50%,rgba(255,255,255,0) 100%);

      --glass-shadow:0 2px 8px rgba(0,0,0,0.04),0 8px 32px rgba(0,0,0,0.06);
      --glass-shadow-hover:0 4px 12px rgba(0,0,0,0.06),0 20px 60px rgba(0,0,0,0.1);

  --green:#059669;--red:#dc2626;--orange:#d97706;--purple:#7c3aed;--teal:#14b8a6;
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#f9fafb;color:var(--text);display:flex;min-height:100vh;font-size:13px;-webkit-font-smoothing:antialiased}
    body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:-1;background:radial-gradient(ellipse 60% 50% at 15% 10%,rgba(147,197,253,0.1),transparent),radial-gradient(ellipse 50% 40% at 85% 25%,rgba(196,181,253,0.08),transparent),radial-gradient(ellipse 40% 50% at 50% 85%,rgba(167,243,208,0.06),transparent)}
.main{margin-left:252px;flex:1;display:flex;flex-direction:column}
.topbar{background:rgba(255,255,255,0.72);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border-bottom:1px solid rgba(0,0,0,0.06);box-shadow:0 1px 0 rgba(255,255,255,0.8) inset,0 4px 16px rgba(0,0,0,0.03);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar h1{font-size:17px;font-weight:700}
.topbar p{font-size:12px;color:var(--muted)}
.content{padding:22px 28px;flex:1}

/* LAYOUT */
.sim-layout{display:grid;grid-template-columns:340px 1fr;gap:20px;align-items:start}

/* LEVERS PANEL */
.levers-panel{background:var(--glass-bg-heavy);backdrop-filter:var(--glass-blur);border:1px solid var(--glass-border);border-top:1px solid var(--glass-border-top);border-radius:var(--radius);box-shadow:var(--glass-shadow),var(--glass-inset);transition:transform 0.25s,box-shadow 0.25s;overflow:hidden;position:sticky;top:72px}
.levers-head{padding:16px 18px;background:linear-gradient(135deg,#0f172a,#1e293b);color:white}
.levers-head h3{font-size:14px;font-weight:800;margin-bottom:2px}
.levers-head p{font-size:10px;color:rgba(255,255,255,.5)}
.levers-body{padding:14px 18px;display:flex;flex-direction:column;gap:14px;max-height:calc(100vh - 160px);overflow-y:auto}
.lever{padding-bottom:14px;border-bottom:1px solid #f1f5f9}
.lever:last-child{border-bottom:none;padding-bottom:0}
.lever-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.lever-label{font-size:12px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:6px}
.lever-value{font-size:14px;font-weight:800;min-width:60px;text-align:right;transition:color .2s}
.lever-value.pos{color:var(--green)}.lever-value.neg{color:var(--red)}.lever-value.zero{color:var(--muted)}
.lever-slider{width:100%;height:6px;accent-color:var(--purple);cursor:pointer;border-radius:3px;-webkit-appearance:none;background:#e2e8f0;outline:none}
.lever-slider::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--purple);border:3px solid white;box-shadow:0 2px 8px rgba(99,102,241,.3);cursor:pointer}
.lever-desc{font-size:10px;color:var(--muted);margin-top:4px;line-height:1.4}
.lever-range{display:flex;justify-content:space-between;font-size:9px;color:#d1d5db;margin-top:2px}
.lever-reset{background:none;border:1px solid rgba(255,255,255,.2);border-radius:6px;color:rgba(255,255,255,.5);font-size:10px;padding:4px 10px;cursor:pointer;font-family:inherit;transition:.15s}
.lever-reset:hover{color:white;border-color:rgba(255,255,255,.4)}

/* RESULTS PANEL */
.results-panel{display:flex;flex-direction:column;gap:16px}

/* Impact KPIs */
.impact-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.impact-card{border-radius:var(--radius);padding:16px;position:relative;overflow:hidden;transition:all .3s}
.impact-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.impact-card.up{background:#f0fdf4;border:1px solid #bbf7d0}.impact-card.up::before{background:var(--green)}
.impact-card.down{background:#fef2f2;border:1px solid #fecaca}.impact-card.down::before{background:var(--red)}
.impact-card.neutral{background:white;border:1px solid var(--border)}.impact-card.neutral::before{background:var(--blue-main)}
.impact-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.impact-current{font-size:11px;color:var(--muted);margin-bottom:2px;text-decoration:line-through}
.impact-new{font-size:22px;font-weight:800;transition:color .3s}
.impact-new.up{color:var(--green)}.impact-new.down{color:var(--red)}.impact-new.neutral{color:var(--text)}
.impact-delta{font-size:11px;font-weight:700;margin-top:4px}
.impact-delta.up{color:var(--green)}.impact-delta.down{color:var(--red)}

/* Chart */
.chart-card{background:var(--glass-bg-heavy);backdrop-filter:var(--glass-blur);border:1px solid var(--glass-border);border-top:1px solid var(--glass-border-top);border-radius:var(--radius);box-shadow:var(--glass-shadow),var(--glass-inset);transition:transform 0.25s,box-shadow 0.25s;padding:18px}
.chart-title{font-size:13px;font-weight:700;margin-bottom:4px}
.chart-sub{font-size:11px;color:var(--muted);margin-bottom:14px}
.chart-wrap{position:relative;height:320px}
.chart-legend{display:flex;gap:16px;margin-top:12px;justify-content:center}
.chart-leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.chart-dot{width:10px;height:3px;border-radius:2px}

/* Detail table */
.detail-card{background:var(--glass-bg-heavy);backdrop-filter:var(--glass-blur);border:1px solid var(--glass-border);border-top:1px solid var(--glass-border-top);border-radius:var(--radius);box-shadow:var(--glass-shadow),var(--glass-inset);transition:transform 0.25s,box-shadow 0.25s;overflow:hidden}
.detail-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.detail-title{font-size:13px;font-weight:700}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:9px 14px;text-align:right;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;background:rgba(248,250,255,0.6);border-bottom:1px solid var(--border)}
th:first-child{text-align:left}
td{padding:9px 14px;border-bottom:1px solid #f1f5f9;text-align:right}
td:first-child{text-align:left;font-weight:600}
tr.row-total{background:#f0f4ff}tr.row-total td{font-weight:800}
.td-up{color:var(--green)}.td-down{color:var(--red)}

/* Loader */
.loader{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--muted);gap:10px}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--blue-main);border-radius:50%;animation:spin .7s linear infinite}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:#1a1f36;color:white;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;transform:translateY(80px);opacity:0;transition:all .3s}
.toast.show{transform:translateY(0);opacity:1}

/* Mobile */
@media(max-width:768px){
  .main{margin-left:0!important;width:100vw!important}
  .topbar{padding:10px 10px 10px 62px!important}
  .content{padding:12px 10px!important}

  .levers-panel{position:static!important}
  .impact-row{grid-template-columns:1fr 1fr!important;gap:8px!important}

  .impact-row{grid-template-columns:1fr!important}
}

<!-- Firebase -->
<script type="module">

<script src="calc-helpers.js"></script>
<script>
// ── HELPERS ──
function pf(v){return parseFloat(String(v||'0').replace(',','.'))||0}
function htCust(r){return(parseFloat(r.ht0)||0)+(parseFloat(r.ht21)||0)+(parseFloat(r.ht85)||0);}
function fmt(n){return Number(n||0).toLocaleString('fr-FR',{minimumFractionDigits:0,maximumFractionDigits:0})}
function fmtE(n){return fmt(n)+' €'}
function fmtK(n){n=Number(n||0);return Math.abs(n)>=1000?(n/1000).toFixed(1).replace('.',',')+' k€':fmt(n)+' €'}
var MONTHS=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];

// ── STATE ──
var _baseData = []; // 12 months of real data {caHT, charges, fixe, variable, credit, leasing}
var _chart = null;
var _saisonConfig = null;

function _saisonMonthStatus(m){
  var cfg=window._saisonConfig||_saisonConfig;
  if(!cfg||!cfg.active)return'ouvert';
  return(cfg.mois||{})[m+1]||'ouvert';
}
function _saisonBadge(m){
  var s=_saisonMonthStatus(m);
  if(s==='ferme')return' <span style="background:#fef2f2;color:#ef4444;font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px">Fermé</span>';
  if(s==='intersaison')return' <span style="background:#fffbeb;color:#f59e0b;font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px">Inter.</span>';
  return'';
}

// Default lever values
var _levers = {
  prixVente: 0,     // % change on CA
  volume: 0,        // % change on volume
  chargesFixes: 0,  // % change on fixed charges
  chargesVar: 0,    // % change on variable charges
  embauche: 0,      // € additional monthly cost
  perteFourn: 0,    // % increase on purchase cost (variable)
  nouveauCA: 0      // € additional monthly revenue (new product/client)
};

// ── LOAD DATA ──
/* ─── MASSE SALARIALE HELPER ─── */
function _calcMS(d) {
  // Wave 1 : délégation vers calc-helpers.js pour garantir la cohérence avec
  // pilotage (gère auto-paie, primes, dirigeant en prélèvement privé, etc.)
  if (window.CalcHelpers && window.CalcHelpers.calcMasseSalariale) {
    return window.CalcHelpers.calcMasseSalariale(d).total;
  }
  // Fallback défensif si le helper n'est pas chargé
  var ms = d && d.masseSalariale;
  if (!ms) return 0;
  var total = 0;
  if (ms.mode === 'auto' && window._rhEmployes && window._rhEmployes.length > 0) {
    window._rhEmployes.forEach(function(e) {
      var brut = parseFloat(e.salaireBrut) || 0;
      var taux = (parseFloat(e.tauxCharges) || 42) / 100;
      total += brut * (1 + taux);
    });
  } else {
    (ms.lignes || []).forEach(function(l) {
      var brut = parseFloat((l.brut || '').toString().replace(',', '.')) || 0;
      var taux = (parseFloat(l.tauxCharges) || 42) / 100;
      total += brut * (1 + taux);
    });
  }
  var dir = ms.dirigeant || {};
  if (dir.type !== 'prelevement') {
    var remDir = parseFloat((dir.remuneration || '').toString().replace(',', '.')) || 0;
    var tc = parseFloat(dir.tauxCharges); if (isNaN(tc)) tc = 45;
    total += remDir * (1 + tc / 100);
    var divid = parseFloat((dir.dividendes || '').toString().replace(',', '.')) || 0;
    var td = parseFloat(dir.tauxDividendes); if (isNaN(td)) td = 30;
    total += divid * (1 + td / 100);
  }
  return total;
}

async function loadBaseData(){
  var now = new Date();
  var year = now.getFullYear();
  // Load RH employees for masse salariale
  if (!window._rhEmployes) {
    window._rhEmployes = [];
    try {
      var empSnap = await window._getDocs(window._collection(window._db,'rh',window._uid,'employes'));
      empSnap.forEach(function(d2){ var e=d2.data(); e.id=d2.id; if(e.statut!=='archive' && e.statut!=='inactif') window._rhEmployes.push(e); });
    } catch(e) {}
  }
  var data = [];
  for(var m = 0; m < 12; m++){
    var key = year + '-' + String(m+1).padStart(2,'0');
    try {
      var snap = await window._getDoc(window._doc(window._db,'pilotage',window._uid,'months',key));
      if(snap.exists()){
        var d = snap.data();
        var caHT = 0;
        (d.ca||[]).forEach(function(r){
          var a=pf(r.ht055),b=pf(r.ht10),c=pf(r.ht20),hC=htCust(r);
          var multi=a+b+c+hC; caHT+=multi>0?multi:pf(r.montantHT);
        });
        (d.facturesPro||[]).forEach(function(r){caHT+=pf(r.ht055)+pf(r.ht10)+pf(r.ht20)+htCust(r)});
        var rentrees=(d.rentreesSupp||[]).reduce(function(s,r){return s+pf(r.montant)},0);
        caHT+=rentrees;
        var fixe=(d.chargesFixe||[]).reduce(function(s,r){return s+pf(r.montantHT)},0);
        var variable=(d.chargesVar||[]).reduce(function(s,r){return s+pf(r.montantHT)},0);
        var leasing=(d.leasing||[]).reduce(function(s,r){
          // Wave 1 : respecter la plage de dates dateDebut/dateFin des leasings
          if (r.dateDebut && r.dateFin && window.CalcHelpers) {
            var deb = window.CalcHelpers.parseYYYYMM(r.dateDebut);
            var fin = window.CalcHelpers.parseYYYYMM(r.dateFin);
            if (deb && fin && (key < deb || key > fin)) return s;
          }
          return s+pf(r.montantHT);
        },0);
        // Wave 1 : crédits via CalcHelpers.parseCredits (gère formats actuel + legacy,
        // calcule les intérêts correctement, respecte le filtre de dates)
        var creditsInfo = window.CalcHelpers
          ? window.CalcHelpers.parseCredits(d.credits||[], key)
          : { total: (d.credits||[]).reduce(function(s,r){return s+pf(r.montant)},0), principal: 0 };
        var credit = creditsInfo.total;
        var creditPrincipal = creditsInfo.principal || 0;
        var masseSal=_calcMS(d);
        data.push({month:m, key:key, caHT:caHT, fixe:fixe, variable:variable, leasing:leasing, credit:credit, creditPrincipal:creditPrincipal, masseSal:masseSal, charges:fixe+variable+leasing+credit+masseSal, hasData:caHT>0||fixe>0});
      } else {
        data.push({month:m, key:key, caHT:0, fixe:0, variable:0, leasing:0, credit:0, creditPrincipal:0, masseSal:0, charges:0, hasData:false});
      }
    }catch(e){
      data.push({month:m, key:key, caHT:0, fixe:0, variable:0, leasing:0, credit:0, creditPrincipal:0, masseSal:0, charges:0, hasData:false});
    }
  }
  return data;
}

// ── SIMULATION ──
function simulate(){
  var cfg=window._saisonConfig;
  var hasSaison=cfg&&cfg.active;
  var coeffCA=hasSaison?(parseFloat(cfg.coeffCA)||0.4):1;
  return _baseData.map(function(d){
    var status=_saisonMonthStatus(d.month);
    var saisonCAMult=!hasSaison?1:(status==='ferme'?0:status==='intersaison'?coeffCA:1);
    var saisonStaffMult=!hasSaison?1:(status==='ferme'?0:1);
    var ca = d.caHT * (1 + (_levers.prixVente + _levers.volume)/100) + _levers.nouveauCA * saisonCAMult;
    var fixe = d.fixe * (1 + _levers.chargesFixes/100) + _levers.embauche * saisonStaffMult;
    var variable = d.variable * (1 + (_levers.chargesVar + _levers.perteFourn)/100);
    var charges = fixe + variable + d.leasing + d.credit + (d.masseSal||0);
    var resultat = ca - charges;
    // Wave 2 — résultat économique : on retire le capital d'emprunt
    var cp = d.creditPrincipal || 0;
    var resultatEco = resultat + cp;
    var resultatBaseEco = (d.caHT - d.charges) + cp;
    return {month:d.month, caBase:d.caHT, caSim:ca, chargesBase:d.charges, chargesSim:charges, fixeSim:fixe, varSim:variable, resultatBase:d.caHT-d.charges, resultatSim:resultat, resultatBaseEco:resultatBaseEco, resultatSimEco:resultatEco, creditPrincipal:cp, hasData:d.hasData};
  });
}

function totals(simData){
  var base={ca:0,charges:0,resultat:0,resultatEco:0}, sim={ca:0,charges:0,resultat:0,resultatEco:0};
  simData.forEach(function(d){
    base.ca+=d.caBase; base.charges+=d.chargesBase; base.resultat+=d.resultatBase; base.resultatEco+=d.resultatBaseEco;
    sim.ca+=d.caSim; sim.charges+=d.chargesSim; sim.resultat+=d.resultatSim; sim.resultatEco+=d.resultatSimEco;
  });
  return {base:base, sim:sim,
    deltaCA:sim.ca-base.ca, deltaCharges:sim.charges-base.charges,
    deltaResultat:sim.resultat-base.resultat, deltaResultatEco:sim.resultatEco-base.resultatEco};
}

// ── RENDER ──

        ${buildLever('nouveauCA','🆕','Nouveau CA mensuel','Nouveau produit, nouveau client, nouveau canal',0,10000,'€',100)}
        ${buildLever('chargesFixes','🏗','Variation charges fixes','Loyer, assurances, abonnements...',-30,50,'%')}
        ${buildLever('embauche','👷','Embauche / coût salarial','Coût mensuel supplémentaire (salaire chargé)',0,8000,'€',100)}
        ${buildLever('chargesVar','📦','Variation charges variables','Matières premières, fournitures...',-30,50,'%')}
        ${buildLever('perteFourn','🚚','Hausse prix fournisseurs','Impact sur vos coûts d\'achat',0,50,'%')}

    </div>

      <!-- Impact KPIs -->
      <div class="impact-row">
        ${impactCard('CA Annuel', t.base.ca, t.sim.ca, t.deltaCA)}
        ${impactCard('Charges Annuelles', t.base.charges, t.sim.charges, t.deltaCharges, true)}
        ${impactCard('Résultat économique '+(window.CalcHelpers?window.CalcHelpers.tooltipIcon('resultat_economique'):''), t.base.resultatEco, t.sim.resultatEco, t.deltaResultatEco)}
        ${impactCard('Résultat trésorerie '+(window.CalcHelpers?window.CalcHelpers.tooltipIcon('resultat_tresorerie'):''), t.base.resultat, t.sim.resultat, t.deltaResultat)}
        ${impactCard('Marge nette éco.', t.base.ca>0?t.base.resultatEco/t.base.ca*100:0, t.sim.ca>0?t.sim.resultatEco/t.sim.ca*100:0, (t.sim.ca>0?t.sim.resultatEco/t.sim.ca*100:0)-(t.base.ca>0?t.base.resultatEco/t.base.ca*100:0), false, true)}
      </div>

      <!-- Chart -->
      ${(window._saisonConfig&&window._saisonConfig.active)?'<div style="padding:10px 16px;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;font-size:11px;color:#92400e;display:flex;align-items:center;gap:8px;flex-wrap:wrap"><span style="font-size:14px">🏖️</span><b>Saisonnalité active</b> — Les mois fermés n\'ont ni nouveau CA ni nouvelle embauche simulée. L\'intersaison applique les coefficients configurés. <a href="profil.html" style="color:#2563eb;font-weight:700">Configurer →</a></div>':''}
      <div class="chart-card">
        <div class="chart-title">📈 Projection mensuelle — Situation actuelle vs Scénario simulé</div>
        <div class="chart-sub">Les barres représentent le CA, les lignes le résultat net</div>
        <div class="chart-wrap"><canvas id="simChart"></canvas></div>
        <div class="chart-legend">
          <div class="chart-leg"><div class="chart-dot" style="background:rgba(79,126,248,.3)"></div>CA actuel</div>
          <div class="chart-leg"><div class="chart-dot" style="background:#60a5fa"></div>CA simulé</div>
          <div class="chart-leg"><div class="chart-dot" style="background:#d1d5db;height:2px"></div>Résultat actuel</div>
          <div class="chart-leg"><div class="chart-dot" style="background:${t.deltaResultat>=0?'#10b981':'#ef4444'};height:2px"></div>Résultat simulé</div>
        </div>
      </div>

      <!-- Detail table -->
      <div class="detail-card">
        <div class="detail-head">
          <div class="detail-title">📋 Détail mensuel comparatif</div>
        </div>
        <div style="overflow-x:auto">
          <table>
            <thead><tr><th>Mois</th><th>CA actuel</th><th>CA simulé</th><th>Δ CA</th><th>Charges act.</th><th>Charges sim.</th><th>Résultat act.</th><th>Résultat sim.</th><th>Δ Résultat</th></tr></thead>
            <tbody>
              ${simData.map(function(d){
                var dca=d.caSim-d.caBase, dr=d.resultatSim-d.resultatBase;
                return '<tr><td>'+MONTHS[d.month]+_saisonBadge(d.month)+'</td><td>'+fmtE(d.caBase)+'</td><td style="font-weight:700">'+fmtE(d.caSim)+'</td><td class="'+(dca>=0?'td-up':'td-down')+'">'+(dca>=0?'+':'')+fmtE(dca)+'</td><td>'+fmtE(d.chargesBase)+'</td><td>'+fmtE(d.chargesSim)+'</td><td class="'+(d.resultatBase>=0?'td-up':'td-down')+'">'+fmtE(d.resultatBase)+'</td><td style="font-weight:700" class="'+(d.resultatSim>=0?'td-up':'td-down')+'">'+fmtE(d.resultatSim)+'</td><td class="'+(dr>=0?'td-up':'td-down')+'" style="font-weight:700">'+(dr>=0?'+':'')+fmtE(dr)+'</td></tr>';
              }).join('')}
              <tr class="row-total"><td>TOTAL</td><td>${fmtE(t.base.ca)}</td><td>${fmtE(t.sim.ca)}</td><td class="${t.deltaCA>=0?'td-up':'td-down'}">${t.deltaCA>=0?'+':''}${fmtE(t.deltaCA)}</td><td>${fmtE(t.base.charges)}</td><td>${fmtE(t.sim.charges)}</td><td class="${t.base.resultat>=0?'td-up':'td-down'}">${fmtE(t.base.resultat)}</td><td class="${t.sim.resultat>=0?'td-up':'td-down'}">${fmtE(t.sim.resultat)}</td><td class="${t.deltaResultat>=0?'td-up':'td-down'}" style="font-size:14px">${t.deltaResultat>=0?'+':''}${fmtE(t.deltaResultat)}</td></tr>

function buildLever(id, icon, label, desc, min, max, unit, step){
  step = step || 1;
  var val = _levers[id];
  var isEur = unit === '€';
  var display = isEur ? fmtE(val) : (val>=0?'+':'')+val+'%';
  var cls = val > 0 ? 'pos' : val < 0 ? 'neg' : 'zero';
  return '<div class="lever">' +
    '<div class="lever-head"><div class="lever-label">' + icon + ' ' + label + '</div><div class="lever-value ' + cls + '" id="lv-' + id + '">' + display + '</div></div>' +
    '<input type="range" class="lever-slider" min="' + min + '" max="' + max + '" step="' + step + '" value="' + val + '" oninput="setLever(\'' + id + '\',this.value,\'' + unit + '\')"/>' +
    '<div class="lever-range"><span>' + (isEur?fmtE(min):(min>=0?'+':'')+min+'%') + '</span><span>' + (isEur?fmtE(max):'+'+max+'%') + '</span></div>' +
    '<div class="lever-desc">' + desc + '</div>' +
    '</div>';
}

function impactCard(label, base, sim, delta, inversed, isPct){
  var good = inversed ? delta <= 0 : delta >= 0;
  var cls = Math.abs(delta) < 0.01 ? 'neutral' : good ? 'up' : 'down';
  var fmtFn = isPct ? function(v){return v.toFixed(1)+'%'} : fmtK;
  var deltaFmt = isPct ? (delta>=0?'+':'')+delta.toFixed(1)+' pts' : (delta>=0?'+':'')+fmtK(delta);
  return '<div class="impact-card ' + cls + '">' +
    '<div class="impact-label">' + label + '</div>' +
    '<div class="impact-current">' + fmtFn(base) + '</div>' +
    '<div class="impact-new ' + cls + '">' + fmtFn(sim) + '</div>' +
    '<div class="impact-delta ' + cls + '">' + (cls==='up'?'▲ ':'▼ ') + deltaFmt + '</div>' +
    '</div>';
}

function setLever(id, val, unit){
  _levers[id] = parseFloat(val)||0;
  var display = unit==='€' ? fmtE(_levers[id]) : (_levers[id]>=0?'+':'')+_levers[id]+'%';
  var cls = _levers[id]>0?'pos':_levers[id]<0?'neg':'zero';
  var el = document.getElementById('lv-'+id);
  if(el){el.textContent=display;el.className='lever-value '+cls;}
  // Live update chart + KPIs without full re-render
  updateResults();
}
window.setLever = setLever;

function updateResults(){
  var simData = simulate();
  var t = totals(simData);

  // Update KPI cards
  var cards = document.querySelectorAll('.impact-card');
  var metrics = [
    {base:t.base.ca, sim:t.sim.ca, delta:t.deltaCA, inv:false, pct:false},
    {base:t.base.charges, sim:t.sim.charges, delta:t.deltaCharges, inv:true, pct:false},
    {base:t.base.resultat, sim:t.sim.resultat, delta:t.deltaResultat, inv:false, pct:false},
    {base:t.base.ca>0?t.base.resultat/t.base.ca*100:0, sim:t.sim.ca>0?t.sim.resultat/t.sim.ca*100:0, delta:(t.sim.ca>0?t.sim.resultat/t.sim.ca*100:0)-(t.base.ca>0?t.base.resultat/t.base.ca*100:0), inv:false, pct:true}
  ];
  cards.forEach(function(card,i){
    if(!metrics[i])return;
    var m=metrics[i];
    var good=m.inv?m.delta<=0:m.delta>=0;
    var cls=Math.abs(m.delta)<0.01?'neutral':good?'up':'down';
    card.className='impact-card '+cls;
    var fmtFn=m.pct?function(v){return v.toFixed(1)+'%'}:fmtK;
    card.querySelector('.impact-current').textContent=fmtFn(m.base);
    var newEl=card.querySelector('.impact-new');
    newEl.textContent=fmtFn(m.sim);newEl.className='impact-new '+cls;
    var dEl=card.querySelector('.impact-delta');
    var deltaFmt=m.pct?(m.delta>=0?'+':'')+m.delta.toFixed(1)+' pts':(m.delta>=0?'+':'')+fmtK(m.delta);
    dEl.textContent=(cls==='up'?'▲ ':'▼ ')+deltaFmt;dEl.className='impact-delta '+cls;
  });

  // Update chart
  if(_chart){
    _chart.data.datasets[0].data=simData.map(function(d){return d.caBase});
    _chart.data.datasets[1].data=simData.map(function(d){return d.caSim});
    _chart.data.datasets[2].data=simData.map(function(d){return d.resultatBase});
    _chart.data.datasets[3].data=simData.map(function(d){return d.resultatSim});
    _chart.data.datasets[3].borderColor=t.deltaResultat>=0?'#10b981':'#ef4444';
    _chart.data.datasets[3].pointBackgroundColor=simData.map(function(d){return d.resultatSim>=0?'#10b981':'#ef4444'});
    _chart.update('none');
  }

  // Update table
  var rows=document.querySelectorAll('tbody tr:not(.row-total)');
  simData.forEach(function(d,i){
    if(!rows[i])return;
    var cells=rows[i].querySelectorAll('td');
    var dca=d.caSim-d.caBase,dr=d.resultatSim-d.resultatBase;
    cells[2].textContent=fmtE(d.caSim);
    cells[3].textContent=(dca>=0?'+':'')+fmtE(dca);cells[3].className=dca>=0?'td-up':'td-down';
    cells[5].textContent=fmtE(d.chargesSim);
    cells[7].textContent=fmtE(d.resultatSim);cells[7].className=(d.resultatSim>=0?'td-up':'td-down');
    cells[8].textContent=(dr>=0?'+':'')+fmtE(dr);cells[8].className=(dr>=0?'td-up':'td-down');
  });
  // Total row
  var totalRow=document.querySelector('.row-total');
  if(totalRow){
    var tc=totalRow.querySelectorAll('td');
    tc[2].textContent=fmtE(t.sim.ca);
    tc[3].textContent=(t.deltaCA>=0?'+':'')+fmtE(t.deltaCA);tc[3].className=t.deltaCA>=0?'td-up':'td-down';
    tc[5].textContent=fmtE(t.sim.charges);
    tc[7].textContent=fmtE(t.sim.resultat);tc[7].className=t.sim.resultat>=0?'td-up':'td-down';
    tc[8].textContent=(t.deltaResultat>=0?'+':'')+fmtE(t.deltaResultat);tc[8].className=t.deltaResultat>=0?'td-up':'td-down';
  }
}

function buildChart(simData, t){
  var ctx = document.getElementById('simChart');
  if(!ctx) return;
  if(_chart) try{_chart.destroy()}catch(e){}
  _chart = new Chart(ctx, {
    type:'bar',
    data:{
      labels: MONTHS,
      datasets:[
        {type:'bar', label:'CA actuel', data:simData.map(function(d){return d.caBase}), backgroundColor:'rgba(79,126,248,.15)', borderColor:'rgba(79,126,248,.3)', borderWidth:1, borderRadius:4, order:2},
        {type:'bar', label:'CA simulé', data:simData.map(function(d){return d.caSim}), backgroundColor:'rgba(79,126,248,.6)', borderColor:'#60a5fa', borderWidth:1, borderRadius:4, order:1},
        {type:'line', label:'Résultat actuel', data:simData.map(function(d){return d.resultatBase}), borderColor:'#d1d5db', borderWidth:2, borderDash:[4,4], pointRadius:3, pointBackgroundColor:'#d1d5db', fill:false, tension:0.3, order:0},
        {type:'line', label:'Résultat simulé', data:simData.map(function(d){return d.resultatSim}), borderColor:t.deltaResultat>=0?'#10b981':'#ef4444', borderWidth:3, pointRadius:4, pointBackgroundColor:simData.map(function(d){return d.resultatSim>=0?'#10b981':'#ef4444'}), fill:false, tension:0.3, order:0}
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      interaction:{intersect:false, mode:'index'},
      plugins:{legend:{display:false},tooltip:{callbacks:{label:function(ctx){return ctx.dataset.label+' : '+fmtE(ctx.raw)}}}},
      scales:{y:{ticks:{callback:function(v){return fmtK(v)}},grid:{color:'#f1f5f9'}},x:{grid:{display:false}}}
    }
  });
}

function resetAll(){
  Object.keys(_levers).forEach(function(k){_levers[k]=0});
  renderAll();
}
window.resetAll = resetAll;

// ── INIT ──
window.initScenarios = async function(){
  _baseData = await loadBaseData();
  renderAll();
};
</script>
